<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Me and Myself - Body Parts Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("assets/background.png") no-repeat center center fixed;
  background-size:cover;
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#splash img{
  width:240px;
}

/* GAME SCREEN */
#game{
  display:none;
  width:100vw;
  height:100vh;
  position:relative;
}

/* TITLE */
#title{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:12px 20px;
  border-radius:14px;
  font-size:26px;
  font-weight:bold;
  color:#ff4d6d;
}

/* BOY IMAGE */
#boy{
  position:absolute;
  left:50%;
  top:55%;
  transform:translate(-50%,-50%);
  width:320px;
  max-width:75vw;
}

/* LABELS (BIG TOUCH BUTTONS) */
.label{
  position:absolute;
  background:white;
  padding:16px 26px;
  border-radius:18px;
  font-size:28px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(0,0,0,0.2);
  min-width:140px;
  text-align:center;
  transition:0.2s;
}

.label:active{
  transform:scale(0.95);
}

/* LEFT SIDE ALIGNMENT (SPACED PROPERLY) */
#ear{top:28%;left:4%;}
#eye{top:40%;left:4%;}
#nose{top:52%;left:4%;}
#mouth{top:64%;left:4%;}
#arm{top:76%;left:4%;}
#leg{top:88%;left:4%;}

/* GLOW CIRCLE (ON BODY PART ONLY) */
.glow-circle{
  position:absolute;
  width:55px;
  height:55px;
  border-radius:50%;
  border:5px solid yellow;
  box-shadow:0 0 18px yellow;
  animation:pulse 1s infinite;
  display:none;
  pointer-events:none;
  transform:translate(-50%,-50%);
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.3); opacity:0.7;}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game">

  <div id="title">Touch the body part</div>

  <img id="boy" src="assets/boy-body.png">

  <!-- LABEL BUTTONS -->
  <div id="ear" class="label">Ear</div>
  <div id="eye" class="label">Eye</div>
  <div id="nose" class="label">Nose</div>
  <div id="mouth" class="label">Mouth</div>
  <div id="arm" class="label">Arm</div>
  <div id="leg" class="label">Leg</div>

  <!-- GLOW -->
  <div id="glow" class="glow-circle"></div>

</div>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="block";
},5000);

const order = ["ear","eye","nose","mouth","arm","leg"];
let index = 0;

const correct = new Audio("assets/correct.mp3");
const wrong = new Audio("assets/wrong.mp3");

/* POSITION OF GLOW ON BOY BODY */
function showGlow(part){

  const pos = {
    ear:   {top:"38%", left:"52%"},
    eye:   {top:"35%", left:"50%"},
    nose:  {top:"45%", left:"50%"},
    mouth: {top:"52%", left:"50%"},
    arm:   {top:"62%", left:"45%"},
    leg:   {top:"78%", left:"50%"}
  };

  let g = document.getElementById("glow");

  g.style.display="block";
  g.style.top = pos[part].top;
  g.style.left = pos[part].left;

  setTimeout(()=>{
    g.style.display="none";
  },1500);
}

/* SPEECH */
function speak(text){
  let msg = new SpeechSynthesisUtterance(text);
  msg.rate = 0.9;
  window.speechSynthesis.speak(msg);
}

/* NEXT INSTRUCTION */
function next(){

  if(index >= order.length){
    alert("🎉 Well Done!");
    return;
  }

  let part = order[index];
  document.getElementById("title").innerText = "Touch the " + part;
  speak("Touch the " + part);
}

/* CLICK HANDLER */
function handleClick(part){

  if(part === order[index]){

    correct.play();
    showGlow(part);

    setTimeout(()=>{
      index++;
      next();
    },1500);

  } else {
    wrong.play();
  }
}

/* EVENTS */
["ear","eye","nose","mouth","arm","leg"].forEach(id=>{
  document.getElementById(id).onclick = ()=>handleClick(id);
});

/* START GAME */
next();

</script>

</body>
</html>
