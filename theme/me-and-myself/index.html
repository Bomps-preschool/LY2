<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Body Parts Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Comic Sans MS;
}

body{
  background: linear-gradient(135deg,#f5f7ff,#fff0f5);
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#splash img{
  width:clamp(160px, 25vw, 220px);
}

/* INSTRUCTION */
#instruction{
  text-align:center;
  font-size:clamp(14px, 2.5vw, 22px);
  padding:10px;
  font-weight:bold;
}

/* GAME */
#game{
  display:none;
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
}

/* BOY WRAPPER */
#boyWrapper{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:clamp(180px, 25vw, 320px);
  z-index:3;
}

#boy{
  width:100%;
}

/* ANCHORS */
.anchor{
  position:absolute;
  width:12px;
  height:12px;
}

/* Adjusted proportional positions */
#eyeAnchor{ top:18%; left:55%; }
#noseAnchor{ top:28%; left:55%; }
#mouthAnchor{ top:38%; left:55%; }
#earAnchor{ top:20%; left:35%; }
#armAnchor{ top:55%; left:75%; }
#legAnchor{ top:78%; left:55%; }

/* BOXES */
.box{
  width:clamp(55px, 8vw, 80px);
  height:clamp(55px, 8vw, 80px);
  border:3px dashed #333;
  border-radius:10px;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  position:absolute;
  font-size:18px;
  z-index:4;
  touch-action:manipulation;
}

/* LEFT */
#eyeBox{ left:2vw; top:20vh; }
#noseBox{ left:2vw; top:40vh; }
#armBox{ left:2vw; top:60vh; }

/* RIGHT */
#earBox{ right:2vw; top:20vh; }
#mouthBox{ right:2vw; top:40vh; }
#legBox{ right:2vw; top:60vh; }

/* PARTS */
#parts{
  position:absolute;
  bottom:15px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:clamp(10px, 2vw, 25px);
  z-index:5;
}

.part{
  width:clamp(55px, 10vw, 90px);
  height:clamp(55px, 10vw, 90px);
  background:white;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
  cursor:pointer;
  touch-action:manipulation;
}

.part img{
  width:60%;
}

.selected{
  border:4px solid #4CAF50;
}

/* SVG */
svg{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:2;
  pointer-events:none;
}

line{
  stroke:#444;
  stroke-width:3;
}

/* CONGRATS */
#congrats{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#fff6e5,#e6fff7);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  z-index:20;
}

#congrats h1{
  font-size:clamp(30px, 6vw, 60px);
}

button{
  margin-top:20px;
  padding:12px 25px;
  font-size:18px;
  border:none;
  background:#4CAF50;
  color:white;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<div id="instruction">
  Tap the correct body part and match it
</div>

<div id="game">

  <!-- SVG -->
  <svg id="svgLines"></svg>

  <!-- BOY -->
  <div id="boyWrapper">

    <img id="boy" src="assets/boy-body.png">

    <div class="anchor" id="eyeAnchor"></div>
    <div class="anchor" id="noseAnchor"></div>
    <div class="anchor" id="mouthAnchor"></div>
    <div class="anchor" id="earAnchor"></div>
    <div class="anchor" id="armAnchor"></div>
    <div class="anchor" id="legAnchor"></div>

  </div>

  <!-- BOXES -->
  <div class="box" id="eyeBox" data-part="eye"></div>
  <div class="box" id="noseBox" data-part="nose"></div>
  <div class="box" id="armBox" data-part="arm"></div>

  <div class="box" id="earBox" data-part="ear"></div>
  <div class="box" id="mouthBox" data-part="mouth"></div>
  <div class="box" id="legBox" data-part="leg"></div>

  <!-- PARTS -->
  <div id="parts">
    <div class="part" data-name="eye"><img src="assets/eye.png"></div>
    <div class="part" data-name="ear"><img src="assets/ear.png"></div>
    <div class="part" data-name="nose"><img src="assets/nose.png"></div>
    <div class="part" data-name="mouth"><img src="assets/mouth.png"></div>
    <div class="part" data-name="arm"><img src="assets/arm.png"></div>
    <div class="part" data-name="leg"><img src="assets/leg.png"></div>
  </div>

</div>

<!-- CONGRATS -->
<div id="congrats">
  <h1>🎉 Congratulations!</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="block";
  setTimeout(drawLines,500);
},5000);

let selected=null;
let done=0;

/* SELECT PART */
document.querySelectorAll(".part").forEach(p=>{
  p.onclick=()=>{
    selected=p.dataset.name;
    document.querySelectorAll(".part").forEach(x=>x.classList.remove("selected"));
    p.classList.add("selected");
  }
});

/* MATCH BOX */
document.querySelectorAll(".box").forEach(box=>{
  box.onclick=()=>{

    if(!selected) return;

    if(selected === box.dataset.part){
      document.getElementById("correct").play();
      box.innerHTML="✔";
      box.style.background="lightgreen";
      done++;

      selected=null;
      document.querySelectorAll(".part").forEach(x=>x.classList.remove("selected"));

      drawLines();

      if(done===6){
        document.getElementById("game").style.display="none";
        document.getElementById("congrats").style.display="flex";
      }

    } else {
      document.getElementById("wrong").play();
    }
  }
});

/* DRAW LINES */
function drawLines(){

  const svg = document.getElementById("svgLines");
  svg.innerHTML = "";

  const pairs = [
    ["eyeBox","eyeAnchor"],
    ["noseBox","noseAnchor"],
    ["armBox","armAnchor"],
    ["earBox","earAnchor"],
    ["mouthBox","mouthAnchor"],
    ["legBox","legAnchor"]
  ];

  pairs.forEach(([boxId, anchorId])=>{

    const box = document.getElementById(boxId).getBoundingClientRect();
    const anchor = document.getElementById(anchorId).getBoundingClientRect();

    const line = document.createElementNS("http://www.w3.org/2000/svg","line");

    line.setAttribute("x1", box.right);
    line.setAttribute("y1", box.top + box.height/2);

    line.setAttribute("x2", anchor.left);
    line.setAttribute("y2", anchor.top + anchor.height/2);

    svg.appendChild(line);
  });
}

window.addEventListener("resize",drawLines);

</script>

</body>
</html>
