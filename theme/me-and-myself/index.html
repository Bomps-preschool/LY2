<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Me and Myself - Body Parts Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  background:url("assets/background.png") no-repeat center center fixed;
  background-size:cover;
}

/* SPLASH */
#logoScreen{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:white;
}

#logoScreen img{
  width:220px;
}

/* GAME AREA */
#gameScreen{
  display:none;
  width:100vw;
  height:100vh;
  position:absolute;
}

/* TITLE */
#title{
  position:absolute;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:12px 20px;
  border-radius:12px;
  font-size:26px;
  font-weight:bold;
  color:#ff4d6d;
}

/* BOY IMAGE */
#boy{
  position:absolute;
  left:50%;
  top:55%;
  transform:translate(-50%,-50%);
  width:280px;
  max-width:80vw;
}

/* CLICK ZONES */
.zone{
  position:absolute;
  cursor:pointer;
}

/* POSITIONS (adjusted for responsiveness) */
#ear{ top:40%; left:52%; width:60px; height:60px; }
#eye{ top:38%; left:47%; width:60px; height:60px; }
#nose{ top:48%; left:50%; width:60px; height:60px; }
#mouth{ top:55%; left:50%; width:60px; height:60px; }
#arm{ top:60%; left:38%; width:80px; height:80px; }
#leg{ top:75%; left:50%; width:80px; height:80px; }

/* GLOW EFFECT */
.glow{
  position:absolute;
  width:120px;
  display:none;
  transform:translate(-50%,-50%);
  pointer-events:none;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="logoScreen">
  <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="gameScreen">

  <div id="title">Touch the body part</div>

  <img id="boy" src="assets/boy-body.png">

  <!-- CLICK AREAS -->
  <div id="ear" class="zone"></div>
  <div id="eye" class="zone"></div>
  <div id="nose" class="zone"></div>
  <div id="mouth" class="zone"></div>
  <div id="arm" class="zone"></div>
  <div id="leg" class="zone"></div>

</div>

<!-- GLOW IMAGE -->
<img id="glow" class="glow">

<script>

const correctSound = new Audio("assets/correct.mp3");
const wrongSound = new Audio("assets/wrong.mp3");

const map = {
  ear: {img:"assets/ear-glow.png", audio:"assets/touch-ear.mp3"},
  eye: {img:"assets/eye-glow.png", audio:"assets/touch-eye.mp3"},
  nose: {img:"assets/nose-glow.png", audio:"assets/touch-nose.mp3"},
  mouth: {img:"assets/mouth-glow.png", audio:"assets/touch-mouth.mp3"},
  arm: {img:"assets/arm-glow.png", audio:"assets/touch-arm.mp3"},
  leg: {img:"assets/leg-glow.png", audio:"assets/touch-leg.mp3"}
};

let order = ["ear","eye","nose","mouth","arm","leg"];
let current = 0;

window.onload = () => {
  setTimeout(()=>{
    document.getElementById("logoScreen").style.display="none";
    document.getElementById("gameScreen").style.display="block";
    speakNext();
  },5000);
};

function speakNext(){
  let part = order[current];
  let msg = new SpeechSynthesisUtterance("Touch the " + part);
  msg.rate = 0.9;
  window.speechSynthesis.speak(msg);
}

function handleClick(part){

  if(part === order[current]){

    correctSound.play();

    let glow = document.getElementById("glow");
    glow.src = map[part].img;
    glow.style.display="block";
    glow.style.left="50%";
    glow.style.top="50%";

    let audio = new Audio(map[part].audio);
    audio.play();

    setTimeout(()=>{
      glow.style.display="none";
      current++;
      if(current < order.length){
        speakNext();
      } else {
        alert("🎉 Well Done!");
      }
    },2000);

  } else {
    wrongSound.play();
  }
}

/* EVENT LISTENERS */
document.getElementById("ear").onclick = ()=>handleClick("ear");
document.getElementById("eye").onclick = ()=>handleClick("eye");
document.getElementById("nose").onclick = ()=>handleClick("nose");
document.getElementById("mouth").onclick = ()=>handleClick("mouth");
document.getElementById("arm").onclick = ()=>handleClick("arm");
document.getElementById("leg").onclick = ()=>handleClick("leg");

</script>

</body>
</html>
