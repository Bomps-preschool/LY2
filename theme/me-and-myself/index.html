<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Body Parts Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Comic Sans MS;
}

body{
  background: linear-gradient(135deg,#f5f7ff,#fff0f5);
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#splash img{
  width:240px;
}

/* INSTRUCTION */
#instruction{
  width:100%;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  padding:12px;
  background:#ffffffcc;
}

/* GAME */
#game{
  display:none;
  width:100%;
  height:100vh;
  flex-direction:row;
}

/* BOY AREA */
#boyArea{
  width:65%;
  display:flex;
  justify-content:center;
  align-items:center;
}

#boyWrapper{
  position:relative;
  width:360px;
}

#boy{
  width:100%;
  display:block;
}

/* BOXES */
.box{
  width:70px;
  height:70px;
  border:3px dashed #333;
  border-radius:8px;
  position:absolute;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* LEFT SIDE */
#eyeBox{ left:-140px; top:120px; }
#noseBox{ left:-140px; top:220px; }
#armBox{ left:-140px; top:340px; }

/* RIGHT SIDE */
#earBox{ right:-140px; top:120px; }
#mouthBox{ right:-140px; top:220px; }
#legBox{ right:-140px; top:340px; }

/* PARTS */
#parts{
  width:35%;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
  padding:20px;
  align-content:center;
  justify-items:center;
}

.part{
  width:110px;
  height:110px;
  background:#fff;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.12);
  cursor:pointer;
}

.part img{
  width:75px;
}

.selected{
  border:4px solid #4CAF50;
}

/* LINES */
svg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}

line{
  stroke:#333;
  stroke-width:2;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- INSTRUCTION -->
<div id="instruction">
  Tap a body part and match it to the correct box
</div>

<!-- GAME -->
<div id="game">

  <div id="boyArea">
    <div id="boyWrapper">

      <img id="boy" src="assets/boy-body.png">

      <!-- FIXED LINES -->
      <svg>
        <!-- LEFT -->
        <line x1="180" y1="140" x2="0" y2="140"></line>  <!-- eye -->
        <line x1="180" y1="240" x2="0" y2="240"></line>  <!-- nose -->
        <line x1="180" y1="360" x2="0" y2="360"></line>  <!-- arm -->

        <!-- RIGHT -->
        <line x1="180" y1="140" x2="360" y2="140"></line> <!-- ear -->
        <line x1="180" y1="240" x2="360" y2="240"></line> <!-- mouth -->
        <line x1="180" y1="360" x2="360" y2="360"></line> <!-- leg -->
      </svg>

      <!-- LEFT BOXES -->
      <div class="box" id="eyeBox"></div>
      <div class="box" id="noseBox"></div>
      <div class="box" id="armBox"></div>

      <!-- RIGHT BOXES -->
      <div class="box" id="earBox"></div>
      <div class="box" id="mouthBox"></div>
      <div class="box" id="legBox"></div>

    </div>
  </div>

  <!-- PARTS -->
  <div id="parts">
    <div class="part" data-name="eye"><img src="assets/eye.png"></div>
    <div class="part" data-name="ear"><img src="assets/ear.png"></div>
    <div class="part" data-name="nose"><img src="assets/nose.png"></div>
    <div class="part" data-name="mouth"><img src="assets/mouth.png"></div>
    <div class="part" data-name="arm"><img src="assets/arm.png"></div>
    <div class="part" data-name="leg"><img src="assets/leg.png"></div>
  </div>

</div>

<script>
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="flex";
},5000);

let selected=null;

document.querySelectorAll(".part").forEach(p=>{
  p.onclick=()=>{
    selected=p.dataset.name;
    document.querySelectorAll(".part").forEach(x=>x.classList.remove("selected"));
    p.classList.add("selected");
  }
});

document.querySelectorAll(".box").forEach(box=>{
  box.onclick=()=>{
    if(selected===box.id.replace("Box","")){
      box.style.background="lightgreen";
      box.innerHTML="✔";
    }
  }
});
</script>

</body>
</html>
