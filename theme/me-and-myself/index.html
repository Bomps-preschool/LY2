<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Body Parts - Version 1</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("assets/background.png") no-repeat center center fixed;
  background-size:cover;
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

/* GAME */
#game{
  display:none;
  width:100vw;
  height:100vh;
  position:relative;
}

/* TITLE */
#title{
  position:absolute;
  top:15px;
  width:100%;
  text-align:center;
  font-size:26px;
  font-weight:bold;
  color:#ff4d6d;
}

/* INSTRUCTION */
#instructionRow{
  position:absolute;
  top:60px;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

#instruction{
  background:white;
  padding:10px 16px;
  border-radius:12px;
  font-size:22px;
  font-weight:bold;
}

#voice{
  width:40px;
  cursor:pointer;
}

/* BOY CONTAINER */
#boy-container{
  position:absolute;
  left:50%;
  top:55%;
  transform:translate(-50%,-50%);
  width:320px;
}

#boy{
  width:100%;
  display:block;
}

/* HOTSPOTS (CLICK AREAS) */
.hotspot{
  position:absolute;
  cursor:pointer;
}

/* PRECISE HOTSPOTS OVER IMAGE */
#ear{ top:18%; left:62%; width:60px; height:60px; }
#eye{ top:16%; left:52%; width:60px; height:40px; }
#nose{ top:28%; left:52%; width:60px; height:60px; }
#mouth{ top:38%; left:52%; width:70px; height:60px; }
#arm{ top:50%; left:30%; width:90px; height:120px; }
#leg{ top:75%; left:50%; width:80px; height:120px; }

/* HIGHLIGHT */
.highlight{
  position:absolute;
  width:70px;
  height:70px;
  border-radius:50%;
  border:4px solid yellow;
  box-shadow:0 0 18px yellow;
  display:none;
  pointer-events:none;
  transform:translate(-50%,-50%);
}

/* LEFT PANEL */
#leftPanel{
  position:absolute;
  left:10px;
  top:150px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.btn{
  background:white;
  padding:10px 14px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png" width="200">
</div>

<!-- GAME -->
<div id="game">

  <div id="title">My Body Parts</div>

  <div id="instructionRow">
    <div id="instruction">Loading...</div>
    <img id="voice" src="assets/voice-icon.png" onclick="repeatVoice()">
  </div>

  <!-- BOY -->
  <div id="boy-container">

    <img id="boy" src="assets/boy-body.png">

    <!-- HIGHLIGHT -->
    <div id="highlight" class="highlight"></div>

    <!-- HOTSPOTS -->
    <div id="ear" class="hotspot"></div>
    <div id="eye" class="hotspot"></div>
    <div id="nose" class="hotspot"></div>
    <div id="mouth" class="hotspot"></div>
    <div id="arm" class="hotspot"></div>
    <div id="leg" class="hotspot"></div>

  </div>

</div>

<script>

let level=1;
let index=0;
let order=[];

/* SPLASH */
window.onload=()=>{
  setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("game").style.display="block";
    startLevel(1);
  },3000);
};

/* LEVEL */
function startLevel(lv){

  level=lv;
  index=0;

  if(level==1) order=["ear","eye","nose"];
  if(level==2) order=["mouth","arm","leg"];
  if(level==3) order=["ear","eye","nose","mouth","arm","leg"];

  nextQ();
}

/* SPEECH */
function speak(text){
  let msg=new SpeechSynthesisUtterance(text);
  msg.rate=0.9;
  window.speechSynthesis.speak(msg);
}

function repeatVoice(){
  speak(order[index]);
}

/* QUESTION */
function nextQ(){

  if(index>=order.length){
    if(level<3){
      startLevel(level+1);
    } else {
      alert("🎉 All Levels Completed!");
    }
    return;
  }

  speak("Touch the " + order[index]);
  document.getElementById("instruction").innerText="Touch the " + order[index];
}

/* FIXED HOTSPOT SYSTEM */
function activate(part){

  if(part!==order[index]) return;

  let h=document.getElementById("highlight");

  let target=document.getElementById(part);
  let rect=target.getBoundingClientRect();

  let container=document.getElementById("boy-container");
  let crect=container.getBoundingClientRect();

  let x=rect.left - crect.left + rect.width/2;
  let y=rect.top - crect.top + rect.height/2;

  h.style.left=x+"px";
  h.style.top=y+"px";
  h.style.display="block";

  setTimeout(()=>{
    h.style.display="none";
    index++;
    nextQ();
  },1000);
}

/* EVENTS */
document.querySelectorAll(".hotspot").forEach(el=>{
  el.onclick=()=>{
    activate(el.id);
  };
});

</script>

</body>
</html>
