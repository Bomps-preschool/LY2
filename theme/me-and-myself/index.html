<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Me and Myself App</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eaf6ff;
  overflow:hidden;
}

/* BACKGROUND */
.bg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.25;
  z-index:-1;
}

/* SCREEN BASE */
.screen{
  width:100vw;
  height:100vh;
  display:none;
  position:absolute;
  justify-content:center;
  align-items:center;
}

/* HOME */
#home{
  display:flex;
  flex-direction:column;
  background:white;
}

.logo{
  width:200px;
}

.playBtn{
  margin-top:20px;
  padding:12px 30px;
  font-size:22px;
  border:none;
  border-radius:12px;
  background:#4CAF50;
  color:white;
}

/* LEVEL SCREEN */
#levels{
  flex-direction:column;
  background:#fff7e6;
}

.levelCard{
  width:220px;
  background:white;
  padding:15px;
  margin:10px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  text-align:center;
  cursor:pointer;
}

/* GAME SCREEN */
#game{
  background:transparent;
}

/* TOP BAR */
.topbar{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 15px;
  align-items:center;
}

.icon{
  width:40px;
  cursor:pointer;
}

/* TITLE */
#instruction{
  position:absolute;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:10px 18px;
  border-radius:12px;
  font-size:20px;
  font-weight:bold;
  color:#ff4d6d;
}

/* BOY */
#boy{
  width:260px;
  position:absolute;
  top:55%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* LABELS */
.label{
  position:absolute;
  background:white;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* POSITIONS */
#ear{top:35%;left:12%;}
#eye{top:42%;left:12%;}
#nose{top:49%;left:12%;}
#mouth{top:56%;left:12%;}
#arm{top:63%;left:12%;}
#leg{top:70%;left:12%;}

/* GLOW CIRCLE */
.glow{
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  border:4px solid rgba(255,255,0,0.8);
  box-shadow:0 0 15px yellow;
  display:none;
  pointer-events:none;
}
</style>
</head>

<body>

<img class="bg" src="assets/background.png">

<!-- HOME -->
<div id="home" class="screen" style="display:flex;">
  <img class="logo" src="assets/innovine-logo.png">
  <button class="playBtn" onclick="showLevels()">▶ Play</button>
</div>

<!-- LEVELS -->
<div id="levels" class="screen">

  <div class="levelCard" onclick="startGame(1)">
    Level 1<br>Ear • Eye • Nose
  </div>

  <div class="levelCard" onclick="startGame(2)">
    Level 2<br>Mouth • Arm • Leg
  </div>

  <div class="levelCard" onclick="startGame(3)">
    Level 3<br>All Parts
  </div>

</div>

<!-- GAME -->
<div id="game" class="screen">

  <div class="topbar">
    <img src="assets/home-button.png" class="icon" onclick="goHome()">
    <img src="assets/voice-icon.png" class="icon" onclick="repeatVoice()">
    <img src="assets/next-button.png" class="icon" onclick="next()">
  </div>

  <div id="instruction">Touch the body part</div>

  <img id="boy" src="assets/boy-body.png">

  <div id="ear" class="label">Ear</div>
  <div id="eye" class="label">Eye</div>
  <div id="nose" class="label">Nose</div>
  <div id="mouth" class="label">Mouth</div>
  <div id="arm" class="label">Arm</div>
  <div id="leg" class="label">Leg</div>

  <div id="glow" class="glow"></div>

</div>

<script>

let level = 1;
let order = [];
let index = 0;

function showLevels(){
  document.getElementById("home").style.display="none";
  document.getElementById("levels").style.display="flex";
}

function startGame(lv){
  level = lv;
  document.getElementById("levels").style.display="none";
  document.getElementById("game").style.display="block";

  if(level===1) order=["ear","eye","nose"];
  if(level===2) order=["mouth","arm","leg"];
  if(level===3) order=["ear","eye","nose","mouth","arm","leg"];

  index=0;
  updateInstruction();
}

function updateInstruction(){
  let part = order[index];
  document.getElementById("instruction").innerText="Touch the " + part;
  speak("Touch the " + part);
}

function speak(text){
  let msg=new SpeechSynthesisUtterance(text);
  msg.rate=0.9;
  window.speechSynthesis.speak(msg);
}

function showGlow(part){
  let g=document.getElementById("glow");

  let pos={
    ear:["35%","18%"],
    eye:["42%","18%"],
    nose:["49%","18%"],
    mouth:["56%","18%"],
    arm:["63%","18%"],
    leg:["70%","18%"]
  };

  g.style.display="block";
  g.style.top=pos[part][0];
  g.style.left=pos[part][1];

  setTimeout(()=>g.style.display="none",1200);
}

function handle(part){
  if(part===order[index]){
    new Audio("assets/correct.mp3").play();
    new Audio("assets/touch-"+part+".mp3").play();

    showGlow(part);

    setTimeout(()=>{
      index++;
      if(index<order.length){
        updateInstruction();
      } else {
        alert("🎉 Well Done!");
      }
    },1200);
  } else {
    new Audio("assets/wrong.mp3").play();
  }
}

function repeatVoice(){
  updateInstruction();
}

function next(){
  index++;
  if(index<order.length){
    updateInstruction();
  } else {
    alert("Completed!");
  }
}

function goHome(){
  location.reload();
}

/* EVENTS */
["ear","eye","nose","mouth","arm","leg"].forEach(id=>{
  document.getElementById(id).onclick=()=>handle(id);
});

</script>

</body>
</html>
