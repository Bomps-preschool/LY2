<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Me and Myself - Body Parts</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("assets/background.png") no-repeat center center fixed;
  background-size:cover;
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#splash img{
  width:220px;
}

/* GAME AREA */
#game{
  display:none;
  width:100vw;
  height:100vh;
  position:relative;
}

/* TITLE */
#title{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:10px 18px;
  border-radius:12px;
  font-size:22px;
  font-weight:bold;
  color:#ff4d6d;
}

/* LEFT LABELS */
.label{
  position:absolute;
  background:white;
  padding:14px 22px;
  border-radius:16px;
  font-size:24px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(0,0,0,0.2);
  min-width:120px;
  text-align:center;
  transition:0.2s;
}

.label:active{
  transform:scale(0.95);
}

#ear{top:30%;left:5%;}
#eye{top:40%;left:5%;}
#nose{top:50%;left:5%;}
#mouth{top:60%;left:5%;}
#arm{top:70%;left:5%;}
#leg{top:80%;left:5%;}

/* BOY WRAPPER (IMPORTANT FIX) */
#boy-wrapper{
  position:absolute;
  left:50%;
  top:55%;
  transform:translate(-50%,-50%);
  width:320px;
  max-width:75vw;
}

/* BOY IMAGE */
#boy{
  width:100%;
  display:block;
}

/* FIXED GLASS GLOW (RELATIVE INSIDE IMAGE) */
#glow{
  position:absolute;
  width:45px;
  height:45px;
  border-radius:50%;
  border:4px solid yellow;
  box-shadow:0 0 18px yellow;
  display:none;
  animation:pulse 1s infinite;
  pointer-events:none;
}

/* PRECISE POSITIONS INSIDE BOY IMAGE */
.ear   { top:28%; left:65%; }
.eye   { top:25%; left:55%; }
.nose  { top:38%; left:55%; }
.mouth { top:48%; left:55%; }
.arm   { top:60%; left:40%; }
.leg   { top:82%; left:55%; }

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.3); opacity:0.6;}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game">

  <div id="title">Touch the body part</div>

  <!-- LEFT LABELS -->
  <div id="ear" class="label">Ear</div>
  <div id="eye" class="label">Eye</div>
  <div id="nose" class="label">Nose</div>
  <div id="mouth" class="label">Mouth</div>
  <div id="arm" class="label">Arm</div>
  <div id="leg" class="label">Leg</div>

  <!-- BOY -->
  <div id="boy-wrapper">

    <img id="boy" src="assets/boy-body.png">

    <div id="glow"></div>

  </div>

</div>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="block";
},5000);

const order = ["ear","eye","nose","mouth","arm","leg"];
let index = 0;

const correct = new Audio("assets/correct.mp3");
const wrong = new Audio("assets/wrong.mp3");

function speak(text){
  let msg = new SpeechSynthesisUtterance(text);
  msg.rate = 0.9;
  window.speechSynthesis.speak(msg);
}

function next(){
  if(index >= order.length){
    alert("🎉 Well Done!");
    return;
  }

  let part = order[index];
  document.getElementById("title").innerText = "Touch the " + part;
  speak("Touch the " + part);
}

/* FIXED GLOW SYSTEM (NO STOMACH BUG) */
function showGlow(part){

  const map = {
    ear   : {top:"28%", left:"65%"},
    eye   : {top:"25%", left:"55%"},
    nose  : {top:"38%", left:"55%"},
    mouth : {top:"48%", left:"55%"},
    arm   : {top:"60%", left:"40%"},
    leg   : {top:"82%", left:"55%"}
  };

  let g = document.getElementById("glow");

  g.className = "glow " + part;
  g.style.top = map[part].top;
  g.style.left = map[part].left;
  g.style.display = "block";

  setTimeout(()=>{
    g.style.display = "none";
  },1200);
}

/* CLICK HANDLER */
function handle(part){

  if(part === order[index]){

    correct.play();
    showGlow(part);

    setTimeout(()=>{
      index++;
      next();
    },1200);

  } else {
    wrong.play();
  }
}

/* EVENTS */
["ear","eye","nose","mouth","arm","leg"].forEach(id=>{
  document.getElementById(id).onclick = ()=>handle(id);
});

/* START */
next();

</script>

</body>
</html>
