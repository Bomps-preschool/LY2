<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Body Parts Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("/mnt/data/c159fb23-b3a2-4efc-8a6e-34b127ddd673.png") no-repeat center center fixed;
  background-size:cover;
  overflow:hidden;
}

/* SCREENS */
.screen{
  width:100vw;
  height:100vh;
  position:absolute;
  display:none;
  justify-content:center;
  align-items:center;
}

/* SPLASH */
#splash{
  background:white;
  display:flex;
}
#splash img{
  width:220px;
}

/* LEVEL SCREEN */
#levelScreen{
  flex-direction:column;
  background:rgba(255,255,255,0.8);
}

.levelCard{
  background:white;
  padding:18px;
  margin:10px;
  width:200px;
  text-align:center;
  border-radius:12px;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
  cursor:pointer;
}

/* GAME SCREEN */
#game{
  background:transparent;
}

/* TOP BAR */
#topBar{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 15px;
  box-sizing:border-box;
}

.icon{
  width:40px;
  cursor:pointer;
}

/* INSTRUCTION */
#instructionRow{
  position:absolute;
  top:70px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  gap:10px;
}

#instruction{
  background:white;
  padding:10px 16px;
  border-radius:12px;
  font-size:22px;
  font-weight:bold;
  color:#ff4d6d;
}

/* LEFT PANEL */
#leftPanel{
  position:absolute;
  left:10px;
  top:150px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.part{
  background:white;
  padding:10px 14px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* BOY WRAPPER (FIXED ALIGNMENT SYSTEM) */
#boy-wrapper{
  position:absolute;
  left:50%;
  top:55%;
  transform:translate(-50%,-50%);
  width:320px;
}

#boy{
  width:100%;
}

/* GLOW */
#glow{
  position:absolute;
  width:50px;
  height:50px;
  border-radius:50%;
  border:4px solid yellow;
  box-shadow:0 0 18px yellow;
  display:none;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen">
  <img src="/mnt/data/48ab77cc-bdd2-471e-847d-ec919107c595.png">
</div>

<!-- LEVEL SCREEN -->
<div id="levelScreen" class="screen">
  <div class="levelCard" onclick="startLevel(1)">
    Level 1<br>Ear Eye Nose
  </div>
  <div class="levelCard" onclick="startLevel(2)">
    Level 2<br>Mouth Arm Leg
  </div>
  <div class="levelCard" onclick="startLevel(3)">
    Level 3<br>All Parts
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">

  <div id="topBar">
    <img class="icon" src="/mnt/data/15f02931-2872-4ab9-a28b-1b097c26b515.png" onclick="goHome()">
    <img class="icon" src="/mnt/data/15f02931-2872-4ab9-a28b-1b097c26b515.png" onclick="repeatVoice()">
    <img class="icon" src="/mnt/data/15f02931-2872-4ab9-a28b-1b097c26b515.png">
  </div>

  <div id="instructionRow">
    <div id="instruction">My Body Parts</div>
    <img class="icon" src="/mnt/data/15f02931-2872-4ab9-a28b-1b097c26b515.png">
  </div>

  <div id="leftPanel">
    <div class="part">Ear</div>
    <div class="part">Eye</div>
    <div class="part">Nose</div>
    <div class="part">Mouth</div>
    <div class="part">Arm</div>
    <div class="part">Leg</div>
  </div>

  <div id="boy-wrapper">
    <img id="boy" src="assets/boy-body.png">
    <div id="glow"></div>
  </div>

</div>

<script>

let level=1;
let index=0;
let order=[];

/* START */
window.onload=()=>{
  setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("levelScreen").style.display="flex";
  },3000);
};

/* LEVEL CONTROL */
function startLevel(lv){
  level=lv;
  index=0;

  document.getElementById("levelScreen").style.display="none";
  document.getElementById("game").style.display="block";

  if(level==1) order=["ear","eye","nose"];
  if(level==2) order=["mouth","arm","leg"];
  if(level==3) order=["ear","eye","nose","mouth","arm","leg"];

  nextQ();
}

/* VOICE */
function speak(text){
  let msg=new SpeechSynthesisUtterance(text);
  msg.rate=0.9;
  window.speechSynthesis.speak(msg);
}

function repeatVoice(){
  speak(order[index]);
}

/* QUESTION */
function nextQ(){

  if(index>=order.length){
    if(level<3){
      startLevel(level+1); // AUTO NEXT LEVEL
    } else {
      alert("🎉 All Levels Completed!");
    }
    return;
  }

  speak("Touch the " + order[index]);
}

/* FIXED GLow POSITION (NO BUG NOW) */
function showGlow(part){

  const map={
    ear:{x:0.62,y:0.28},
    eye:{x:0.55,y:0.25},
    nose:{x:0.55,y:0.38},
    mouth:{x:0.55,y:0.50},
    arm:{x:0.35,y:0.60},
    leg:{x:0.55,y:0.82}
  };

  let boy=document.getElementById("boy");
  let rect=boy.getBoundingClientRect();
  let g=document.getElementById("glow");

  g.style.left=(rect.left + rect.width*map[part].x)+"px";
  g.style.top=(rect.top + rect.height*map[part].y)+"px";
  g.style.display="block";

  setTimeout(()=>g.style.display="none",1200);
}

/* CLICK */
document.querySelectorAll(".part").forEach(el=>{
  el.onclick=()=>{

    let part=el.innerText.toLowerCase();

    if(part===order[index]){
      showGlow(part);
      index++;
      nextQ();
    } else {
      alert("Try again");
    }

  };
});

/* HOME */
function goHome(){
  location.reload();
}

</script>

</body>
</html>
