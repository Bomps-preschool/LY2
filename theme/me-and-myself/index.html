<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Body Parts Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Comic Sans MS;
}

body{
  background: linear-gradient(135deg,#ffe6f2,#e6f7ff);
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#splash img{
  width:250px;
}

/* GAME LAYOUT */
#game{
  display:none;
  width:100%;
  height:100vh;
  flex-direction:row;
}

/* LEFT BOY AREA */
#boyArea{
  width:60%;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

#boy{
  width:320px;
}

/* CLICK BOXES */
.box{
  position:absolute;
  width:60px;
  height:60px;
  border:3px dashed #333;
  border-radius:10px;
}

/* positions */
#eyeBox{ top:120px; left:210px; }
#earBox{ top:140px; left:120px; }
#noseBox{ top:180px; left:170px; }
#mouthBox{ top:220px; left:170px; }
#handBox{ top:260px; left:80px; }
#legBox{ top:360px; left:170px; }

/* RIGHT PANEL */
#parts{
  width:40%;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:20px;
  padding:20px;
}

.part{
  width:100px;
  height:100px;
  background:#fff;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  cursor:pointer;
}

.part img{
  width:70px;
}

.selected{
  border:4px solid #4CAF50;
}

/* CONGRATS */
#congrats{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#fff3e6,#e6fff5);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

#congrats h1{
  font-size:60px;
}

button{
  margin-top:20px;
  padding:10px 20px;
  font-size:20px;
  border:none;
  background:#4CAF50;
  color:#fff;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game">

  <!-- BOY -->
  <div id="boyArea">
    <img id="boy" src="assets/boy-body.png">

    <div class="box" id="eyeBox" data-part="eye"></div>
    <div class="box" id="earBox" data-part="ear"></div>
    <div class="box" id="noseBox" data-part="nose"></div>
    <div class="box" id="mouthBox" data-part="mouth"></div>
    <div class="box" id="handBox" data-part="hand"></div>
    <div class="box" id="legBox" data-part="leg"></div>

  </div>

  <!-- PARTS -->
  <div id="parts">
    <div class="part" data-name="eye"><img src="assets/eye.png"></div>
    <div class="part" data-name="ear"><img src="assets/ear.png"></div>
    <div class="part" data-name="nose"><img src="assets/nose.png"></div>
    <div class="part" data-name="mouth"><img src="assets/mouth.png"></div>
    <div class="part" data-name="hand"><img src="assets/hand.png"></div>
    <div class="part" data-name="leg"><img src="assets/leg.png"></div>
  </div>

</div>

<!-- CONGRATS -->
<div id="congrats">
  <h1>🎉 Congratulations!</h1>
  <p>You matched all body parts!</p>
  <button onclick="restart()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="flex";
},5000);

let selected=null;
let done=0;

document.querySelectorAll(".part").forEach(p=>{
  p.onclick=()=>{
    selected=p.dataset.name;
    document.querySelectorAll(".part").forEach(x=>x.classList.remove("selected"));
    p.classList.add("selected");
  }
});

document.querySelectorAll(".box").forEach(box=>{
  box.onclick=()=>{

    if(!selected) return;

    if(selected===box.dataset.part){
      document.getElementById("correct").play();
      box.style.background="lightgreen";
      box.innerHTML="✔";
      done++;

      selected=null;
      document.querySelectorAll(".part").forEach(x=>x.classList.remove("selected"));

      if(done===6){
        document.getElementById("game").style.display="none";
        document.getElementById("congrats").style.display="flex";
      }

    }else{
      document.getElementById("wrong").play();
    }
  }
});

function restart(){
  location.reload();
}

</script>

</body>
</html>
