<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Body Parts Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Comic Sans MS;
}

body{
  background: linear-gradient(135deg,#f5f7ff,#fff0f5);
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#splash img{
  width:240px;
}

/* GAME */
#gameContainer{
  width:100vw;
  height:100vh;
  display:none;
  justify-content:center;
  align-items:center;
}

/* STAGE */
#gameStage{
  position:relative;
  width:1280px;
  height:720px;
  transform-origin:center center;
}

/* TITLE */
#instruction{
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  font-size:26px;
  font-weight:bold;
}

/* BOY */
#boyWrapper{
  position:absolute;
  left:50%;
  top:55%;
  transform:translate(-50%,-50%);
  width:360px;
  z-index:3;
}

#boy{
  width:100%;
}

/* ANCHORS (FIXED ACCURATE POSITIONS) */
.anchor{
  position:absolute;
  width:10px;
  height:10px;
}

#eyeAnchor{ top:22%; left:52%; }
#noseAnchor{ top:30%; left:52%; }
#mouthAnchor{ top:38%; left:52%; }
#earAnchor{ top:22%; left:38%; }
#armAnchor{ top:55%; left:75%; }
#legAnchor{ top:82%; left:52%; }

/* BOXES */
.box{
  width:95px;
  height:95px;
  border:3px dashed #333;
  border-radius:10px;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  position:absolute;
  font-size:22px;
  z-index:4;
}

/* LEFT */
#eyeBox{ left:120px; top:220px; }
#noseBox{ left:120px; top:340px; }
#armBox{ left:120px; top:460px; }

/* RIGHT */
#earBox{ right:120px; top:220px; }
#mouthBox{ right:120px; top:340px; }
#legBox{ right:120px; top:460px; }

/* PARTS */
#parts{
  position:absolute;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:22px;
  z-index:5;
}

.part{
  width:120px;
  height:120px;
  background:white;
  border-radius:18px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
  cursor:pointer;
}

.part img{
  width:70%;
}

.selected{
  border:4px solid #4CAF50;
}

/* SVG */
svg{
  position:absolute;
  width:1280px;
  height:720px;
  top:0;
  left:0;
  z-index:2;
  pointer-events:none;
}

line{
  stroke:#444;
  stroke-width:3;
}
</style>
</head>

<body>

<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<div id="gameContainer">
  <div id="gameStage">

    <div id="instruction">Tap the correct body part and match it</div>

    <svg id="svgLines"></svg>

    <!-- BOY -->
    <div id="boyWrapper">
      <img id="boy" src="assets/boy-body.png">

      <div class="anchor" id="eyeAnchor"></div>
      <div class="anchor" id="noseAnchor"></div>
      <div class="anchor" id="mouthAnchor"></div>
      <div class="anchor" id="earAnchor"></div>
      <div class="anchor" id="armAnchor"></div>
      <div class="anchor" id="legAnchor"></div>
    </div>

    <!-- BOXES -->
    <div class="box" id="eyeBox" data-part="eye"></div>
    <div class="box" id="noseBox" data-part="nose"></div>
    <div class="box" id="armBox" data-part="arm"></div>

    <div class="box" id="earBox" data-part="ear"></div>
    <div class="box" id="mouthBox" data-part="mouth"></div>
    <div class="box" id="legBox" data-part="leg"></div>

    <!-- PARTS -->
    <div id="parts">
      <div class="part" data-name="eye"><img src="assets/eye.png"></div>
      <div class="part" data-name="ear"><img src="assets/ear.png"></div>
      <div class="part" data-name="nose"><img src="assets/nose.png"></div>
      <div class="part" data-name="mouth"><img src="assets/mouth.png"></div>
      <div class="part" data-name="arm"><img src="assets/arm.png"></div>
      <div class="part" data-name="leg"><img src="assets/leg.png"></div>
    </div>

  </div>
</div>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("gameContainer").style.display="flex";
  setTimeout(drawLines,500);
},5000);

let selected=null;

document.querySelectorAll(".part").forEach(p=>{
  p.onclick=()=>{
    selected=p.dataset.name;
    document.querySelectorAll(".part").forEach(x=>x.classList.remove("selected"));
    p.classList.add("selected");
  }
});

/* 🎯 FINAL PERFECT LINE SYSTEM (EDGE TO EDGE TOUCH) */
function drawLines(){

  const svg = document.getElementById("svgLines");
  svg.innerHTML = "";

  const pairs = [
    ["eyeBox","eyeAnchor"],
    ["noseBox","noseAnchor"],
    ["armBox","armAnchor"],
    ["earBox","earAnchor"],
    ["mouthBox","mouthAnchor"],
    ["legBox","legAnchor"]
  ];

  pairs.forEach(([b,a])=>{

    const box = document.getElementById(b).getBoundingClientRect();
    const anchor = document.getElementById(a).getBoundingClientRect();

    let x1 = box.left + box.width/2;
    let y1 = box.top + box.height/2;

    let x2 = anchor.left + anchor.width/2;
    let y2 = anchor.top + anchor.height/2;

    // direction vector
    let dx = x2 - x1;
    let dy = y2 - y1;
    let len = Math.sqrt(dx*dx + dy*dy);

    // move endpoint slightly INTO the target (touch effect)
    let extend = 18;

    x2 = x2 - (dx/len)*extend;
    y2 = y2 - (dy/len)*extend;

    const line = document.createElementNS("http://www.w3.org/2000/svg","line");

    line.setAttribute("x1", x1);
    line.setAttribute("y1", y1);
    line.setAttribute("x2", x2);
    line.setAttribute("y2", y2);

    svg.appendChild(line);
  });
}

window.addEventListener("resize",drawLines);

</script>

</body>
</html>
