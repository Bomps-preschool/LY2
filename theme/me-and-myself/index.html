<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, user-scalable=no"
    >

    <meta name="theme-color" content="#b9efff">

    <title>Touch My Body</title>

    <style>
        :root {
            --navy: #234d70;
            --blue: #65c8f2;
            --yellow: #ffd85a;
            --green: #63d58b;
            --white: #ffffff;
            --shadow: 0 12px 28px rgba(36, 82, 113, 0.18);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: "Trebuchet MS", Arial, sans-serif;
            background: #dff7ff;
            touch-action: manipulation;
        }

        button {
            font-family: inherit;
        }

        button:disabled {
            cursor: default;
            opacity: 0.65;
        }

        .screen {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .screen.active {
            display: flex;
        }

        /* ==================================================
           SPLASH SCREEN
        ================================================== */

        #splashScreen {
            z-index: 100;
            flex-direction: column;
            background:
                radial-gradient(
                    circle at center,
                    #ffffff 0%,
                    #f5fcff 68%,
                    #e8f8ff 100%
                );
        }

        #innovineLogo {
            width: min(62vw, 320px);
            max-height: 230px;
            object-fit: contain;
            animation: logoAppear 1.1s ease both;
        }

        #logoFallback {
            display: none;
            color: #2384b9;
            font-size: clamp(2.3rem, 10vw, 5rem);
            font-weight: 900;
            letter-spacing: 2px;
        }

        .loading-dots {
            display: flex;
            gap: 11px;
            margin-top: 28px;
        }

        .loading-dots span {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #56c5ed;
            animation: loadingBounce 1s infinite ease-in-out;
        }

        .loading-dots span:nth-child(2) {
            background: #ffd35d;
            animation-delay: 0.15s;
        }

        .loading-dots span:nth-child(3) {
            background: #ff8eb7;
            animation-delay: 0.3s;
        }

        /* ==================================================
           START SCREEN
        ================================================== */

        #startScreen {
            flex-direction: column;
            padding: 16px;
            text-align: center;
            background:
                radial-gradient(
                    circle at 14% 16%,
                    rgba(255, 255, 255, 0.9) 0 25px,
                    transparent 27px
                ),
                radial-gradient(
                    circle at 84% 12%,
                    rgba(255, 255, 255, 0.85) 0 34px,
                    transparent 36px
                ),
                linear-gradient(
                    180deg,
                    #9fe5ff 0%,
                    #e9fbff 68%,
                    #b7e88f 69%,
                    #8ed36b 100%
                );
        }

        .floating-shape {
            position: absolute;
            pointer-events: none;
            animation: shapeFloat 4s ease-in-out infinite alternate;
        }

        .shape-one {
            top: 8%;
            left: 5%;
            font-size: clamp(2rem, 8vw, 4rem);
        }

        .shape-two {
            top: 14%;
            right: 6%;
            font-size: clamp(2rem, 8vw, 4rem);
            animation-delay: 0.8s;
        }

        .shape-three {
            bottom: 9%;
            left: 7%;
            font-size: clamp(1.8rem, 7vw, 3.6rem);
            animation-delay: 1.4s;
        }

        .start-card {
            position: relative;
            z-index: 3;
            width: min(94vw, 680px);
            max-height: 94vh;
            padding: clamp(18px, 4vw, 34px);
            border: 5px solid rgba(255, 255, 255, 0.96);
            border-radius: 36px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .topic-badge {
            padding: 8px 18px;
            border-radius: 999px;
            background: #ffeeb0;
            color: #855e00;
            font-size: clamp(0.9rem, 3vw, 1.15rem);
            font-weight: 900;
        }

        .start-title {
            margin: 12px 0 5px;
            color: var(--navy);
            font-size: clamp(2.2rem, 9vw, 4.8rem);
            line-height: 1;
            font-weight: 900;
            text-shadow: 0 4px 0 #d6f2ff;
        }

        .start-description {
            margin: 8px 0 14px;
            color: #55758c;
            font-size: clamp(1rem, 3.5vw, 1.35rem);
            line-height: 1.35;
            font-weight: 700;
        }

        .start-child {
            position: relative;
            width: clamp(155px, 42vw, 235px);
            height: clamp(190px, 39vh, 285px);
            margin: 2px 0 14px;
            border-radius: 34px;
            background:
                radial-gradient(
                    circle at 50% 34%,
                    rgba(255, 255, 255, 0.9) 0 30%,
                    transparent 31%
                ),
                linear-gradient(180deg, #dff7ff, #fef1c8);
            overflow: hidden;
        }

        .mini-head {
            position: absolute;
            top: 22px;
            left: 50%;
            width: 78px;
            height: 82px;
            transform: translateX(-50%);
            border: 4px solid #55473f;
            border-radius: 48% 48% 45% 45%;
            background: #c9895d;
        }

        .mini-hair {
            position: absolute;
            top: 18px;
            left: 50%;
            width: 83px;
            height: 39px;
            transform: translateX(-50%);
            border-radius: 50% 50% 34% 34%;
            background: #40332e;
        }

        .mini-eye {
            position: absolute;
            top: 56px;
            width: 7px;
            height: 9px;
            border-radius: 50%;
            background: #2f2926;
        }

        .mini-eye.left {
            left: calc(50% - 20px);
        }

        .mini-eye.right {
            left: calc(50% + 13px);
        }

        .mini-smile {
            position: absolute;
            top: 79px;
            left: 50%;
            width: 28px;
            height: 14px;
            transform: translateX(-50%);
            border-bottom: 4px solid #8f3f48;
            border-radius: 0 0 50% 50%;
        }

        .mini-body {
            position: absolute;
            top: 103px;
            left: 50%;
            width: 96px;
            height: 92px;
            transform: translateX(-50%);
            border: 4px solid #55473f;
            border-radius: 25px 25px 18px 18px;
            background: #9c87ea;
        }

        .mini-arm {
            position: absolute;
            top: 115px;
            width: 30px;
            height: 92px;
            border: 4px solid #55473f;
            border-radius: 20px;
            background: #c9895d;
            transform-origin: top center;
        }

        .mini-arm.left {
            left: calc(50% - 72px);
            transform: rotate(18deg);
        }

        .mini-arm.right {
            left: calc(50% + 42px);
            transform: rotate(-35deg);
            animation: miniWave 1s ease-in-out infinite alternate;
        }

        .mini-leg {
            position: absolute;
            top: 190px;
            width: 34px;
            height: 74px;
            border: 4px solid #55473f;
            border-radius: 18px;
            background: #ffd35d;
        }

        .mini-leg.left {
            left: calc(50% - 39px);
        }

        .mini-leg.right {
            left: calc(50% + 5px);
        }

        .start-button {
            min-width: min(76vw, 310px);
            min-height: 66px;
            border: 0;
            border-radius: 999px;
            padding: 14px 34px;
            background: linear-gradient(180deg, #ffe77f, #ffc53a);
            color: #5e3d00;
            box-shadow:
                0 8px 0 #df9820,
                0 14px 23px rgba(128, 81, 0, 0.2);
            font-size: clamp(1.35rem, 5vw, 2rem);
            font-weight: 900;
            cursor: pointer;
        }

        .start-button:active {
            transform: translateY(6px);
            box-shadow:
                0 2px 0 #df9820,
                0 7px 12px rgba(128, 81, 0, 0.18);
        }

        /* ==================================================
           GAME SCREEN
        ================================================== */

        #gameScreen {
            flex-direction: column;
            justify-content: flex-start;
            padding: clamp(7px, 2vw, 16px);
            background:
                radial-gradient(
                    circle at 9% 12%,
                    rgba(255, 255, 255, 0.8) 0 20px,
                    transparent 22px
                ),
                radial-gradient(
                    circle at 90% 18%,
                    rgba(255, 255, 255, 0.7) 0 28px,
                    transparent 30px
                ),
                linear-gradient(180deg, #a9eaff 0%, #ecfbff 100%);
        }

        .game-header {
            width: min(100%, 900px);
            height: clamp(48px, 8vh, 65px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-shrink: 0;
        }

        .progress-box {
            min-width: 105px;
            padding: 8px 14px;
            border: 3px solid #ffffff;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.92);
            color: var(--navy);
            box-shadow: 0 6px 14px rgba(36, 88, 124, 0.12);
            font-size: clamp(0.88rem, 3vw, 1.15rem);
            font-weight: 900;
        }

        .header-title {
            color: var(--navy);
            font-size: clamp(1rem, 3.6vw, 1.5rem);
            font-weight: 900;
            text-align: center;
        }

        .sound-button {
            width: clamp(48px, 12vw, 57px);
            height: clamp(48px, 12vw, 57px);
            flex-shrink: 0;
            border: 3px solid #ffffff;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 6px 14px rgba(36, 88, 124, 0.14);
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            cursor: pointer;
        }

        .question-card {
            position: relative;
            width: min(100%, 760px);
            min-height: clamp(92px, 15vh, 125px);
            margin: 3px auto 7px;
            padding: 12px 58px 12px 18px;
            flex-shrink: 0;
            border: 4px solid #ffffff;
            border-radius: 27px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .question-icon {
            flex-shrink: 0;
            font-size: clamp(2.3rem, 9vw, 4.4rem);
            animation: questionBounce 1.5s ease-in-out infinite;
        }

        .question-content {
            text-align: left;
        }

        .small-instruction {
            margin: 0;
            color: #628096;
            font-size: clamp(0.82rem, 3vw, 1.05rem);
            font-weight: 800;
        }

        #questionText {
            margin: 3px 0 0;
            color: var(--navy);
            font-size: clamp(1.35rem, 5vw, 2.15rem);
            line-height: 1.1;
            font-weight: 900;
        }

        .listen-button {
            position: absolute;
            top: 50%;
            right: 10px;
            width: clamp(44px, 11vw, 53px);
            height: clamp(44px, 11vw, 53px);
            transform: translateY(-50%);
            border: 0;
            border-radius: 50%;
            background: #fff0a4;
            box-shadow: 0 5px 0 #dfb43a;
            font-size: clamp(1.15rem, 4vw, 1.5rem);
            cursor: pointer;
        }

        .listen-button:active:not(:disabled) {
            transform: translateY(calc(-50% + 4px));
            box-shadow: 0 1px 0 #dfb43a;
        }

        #feedback {
            min-height: 30px;
            margin: 0;
            flex-shrink: 0;
            color: #276896;
            font-size: clamp(1rem, 3.6vw, 1.35rem);
            line-height: 1.2;
            font-weight: 900;
            text-align: center;
        }

        .body-stage {
            position: relative;
            width: min(100%, 760px);
            flex: 1;
            min-height: 0;
            margin: 5px auto 0;
            border: 5px solid rgba(255, 255, 255, 0.96);
            border-radius: 34px;
            background:
                radial-gradient(
                    circle at 50% 35%,
                    rgba(255, 255, 255, 0.75) 0 25%,
                    transparent 26%
                ),
                linear-gradient(
                    180deg,
                    #dff7ff 0%,
                    #f3fcff 68%,
                    #d7efb6 69%,
                    #b8df8e 100%
                );
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .stage-cloud {
            position: absolute;
            color: rgba(255, 255, 255, 0.9);
            pointer-events: none;
        }

        .stage-cloud.one {
            top: 8%;
            left: 5%;
            font-size: clamp(2rem, 7vw, 4rem);
        }

        .stage-cloud.two {
            top: 14%;
            right: 5%;
            font-size: clamp(1.8rem, 6vw, 3.5rem);
        }

        .stage-flower {
            position: absolute;
            bottom: 4%;
            font-size: clamp(1.6rem, 5vw, 2.8rem);
            pointer-events: none;
        }

        .stage-flower.left {
            left: 4%;
        }

        .stage-flower.right {
            right: 4%;
        }

        #bodySvg {
            position: absolute;
            left: 50%;
            bottom: 1%;
            height: 97%;
            width: auto;
            max-width: 96%;
            transform: translateX(-50%);
            overflow: visible;
            touch-action: manipulation;
        }

        .outline {
            stroke: #4f423b;
            stroke-width: 5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .body-visual {
            transform-box: fill-box;
            transform-origin: center;
            transition:
                filter 0.2s ease,
                opacity 0.2s ease;
        }

        .body-visual.correct-highlight {
            filter:
                drop-shadow(0 0 5px #ffd52f)
                drop-shadow(0 0 10px #ffbc2f);
            animation: correctPulse 0.55s ease-in-out infinite alternate;
        }

        .body-visual.hint-highlight {
            filter:
                drop-shadow(0 0 6px #ffd736)
                drop-shadow(0 0 14px #ffb52d);
            animation: hintPulse 0.65s ease-in-out infinite alternate;
        }

        .body-visual.wrong-highlight {
            filter:
                drop-shadow(0 0 5px #ff5b91)
                drop-shadow(0 0 10px #ff5b91);
            animation: bodyPartShake 0.42s ease;
        }

        .hotspot {
            fill: transparent;
            stroke: transparent;
            stroke-width: 1;
            cursor: pointer;
            pointer-events: all;
        }

        #starBurst {
            position: absolute;
            left: 50%;
            top: 50%;
            z-index: 15;
            display: none;
            transform: translate(-50%, -50%);
            font-size: clamp(3rem, 14vw, 6rem);
            pointer-events: none;
        }

        #starBurst.show {
            display: block;
            animation: starBurst 0.8s ease both;
        }

        /* ==================================================
           END SCREEN
        ================================================== */

        #endScreen {
            flex-direction: column;
            padding: 16px;
            text-align: center;
            background:
                linear-gradient(
                    180deg,
                    #98e4ff 0%,
                    #ecfbff 65%,
                    #a5df7d 66%,
                    #7dca5b 100%
                );
        }

        .end-card {
            position: relative;
            z-index: 5;
            width: min(94vw, 710px);
            max-height: 94vh;
            padding: clamp(18px, 4vw, 34px);
            border: 5px solid #ffffff;
            border-radius: 36px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 18px 38px rgba(31, 84, 122, 0.23);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .end-title {
            margin: 0;
            color: #176d9e;
            font-size: clamp(2.2rem, 9vw, 4.6rem);
            line-height: 1;
            font-weight: 900;
        }

        .end-message {
            margin: 10px 0 5px;
            color: #4c7187;
            font-size: clamp(1rem, 3.6vw, 1.4rem);
            line-height: 1.35;
            font-weight: 800;
        }

        .score-message {
            margin: 4px 0 8px;
            color: #27875b;
            font-size: clamp(1rem, 3.7vw, 1.4rem);
            font-weight: 900;
        }

        .end-stars {
            margin: 2px 0 10px;
            font-size: clamp(2.4rem, 9vw, 4.5rem);
            letter-spacing: 5px;
            animation: endStarPulse 1.2s ease-in-out infinite alternate;
        }

        .happy-child {
            position: relative;
            width: clamp(165px, 43vw, 240px);
            height: clamp(200px, 36vh, 290px);
            margin: 4px 0 15px;
            border-radius: 34px;
            background: linear-gradient(180deg, #dff7ff, #fff0c7);
            overflow: hidden;
        }

        .happy-head {
            position: absolute;
            top: 20px;
            left: 50%;
            width: 84px;
            height: 88px;
            transform: translateX(-50%);
            border: 4px solid #51433c;
            border-radius: 48%;
            background: #c9895d;
        }

        .happy-hair {
            position: absolute;
            top: 16px;
            left: 50%;
            width: 90px;
            height: 40px;
            transform: translateX(-50%);
            border-radius: 50% 50% 35% 35%;
            background: #40332e;
        }

        .happy-eye {
            position: absolute;
            top: 56px;
            width: 8px;
            height: 10px;
            border-radius: 50%;
            background: #2f2926;
        }

        .happy-eye.left {
            left: calc(50% - 21px);
        }

        .happy-eye.right {
            left: calc(50% + 13px);
        }

        .happy-mouth {
            position: absolute;
            top: 80px;
            left: 50%;
            width: 32px;
            height: 17px;
            transform: translateX(-50%);
            border-bottom: 5px solid #8d3e48;
            border-radius: 0 0 50% 50%;
        }

        .happy-body {
            position: absolute;
            top: 107px;
            left: 50%;
            width: 100px;
            height: 94px;
            transform: translateX(-50%);
            border: 4px solid #51433c;
            border-radius: 26px 26px 18px 18px;
            background: #9d86eb;
        }

        .happy-arm {
            position: absolute;
            top: 115px;
            width: 31px;
            height: 95px;
            border: 4px solid #51433c;
            border-radius: 20px;
            background: #c9895d;
            transform-origin: top center;
        }

        .happy-arm.left {
            left: calc(50% - 75px);
            transform: rotate(30deg);
        }

        .happy-arm.right {
            left: calc(50% + 44px);
            animation: endWave 0.75s ease-in-out infinite alternate;
        }

        .happy-leg {
            position: absolute;
            top: 196px;
            width: 35px;
            height: 78px;
            border: 4px solid #51433c;
            border-radius: 18px;
            background: #ffd35c;
        }

        .happy-leg.left {
            left: calc(50% - 40px);
            animation: danceLeft 0.7s ease-in-out infinite alternate;
        }

        .happy-leg.right {
            left: calc(50% + 5px);
            animation: danceRight 0.7s ease-in-out infinite alternate;
        }

        .play-again-button {
            min-width: min(76vw, 315px);
            min-height: 64px;
            border: 0;
            border-radius: 999px;
            padding: 14px 30px;
            background: linear-gradient(180deg, #70da95, #37b76a);
            color: #ffffff;
            box-shadow:
                0 8px 0 #218b4a,
                0 13px 20px rgba(31, 117, 66, 0.22);
            font-size: clamp(1.3rem, 4.8vw, 1.85rem);
            font-weight: 900;
            cursor: pointer;
        }

        .play-again-button:active {
            transform: translateY(6px);
            box-shadow:
                0 2px 0 #218b4a,
                0 6px 12px rgba(31, 117, 66, 0.2);
        }

        .confetti {
            position: absolute;
            top: -30px;
            z-index: 2;
            width: 13px;
            height: 23px;
            border-radius: 4px;
            pointer-events: none;
            animation: confettiFall linear forwards;
        }

        /* ==================================================
           ANIMATIONS
        ================================================== */

        @keyframes logoAppear {
            from {
                opacity: 0;
                transform: scale(0.7);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes loadingBounce {
            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-13px);
            }
        }

        @keyframes shapeFloat {
            from {
                transform: translateY(0) rotate(-5deg);
            }

            to {
                transform: translateY(14px) rotate(5deg);
            }
        }

        @keyframes miniWave {
            from {
                transform: rotate(-20deg);
            }

            to {
                transform: rotate(-55deg);
            }
        }

        @keyframes questionBounce {
            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        @keyframes correctPulse {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.06);
            }
        }

        @keyframes hintPulse {
            from {
                transform: scale(1);
                opacity: 0.9;
            }

            to {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        @keyframes bodyPartShake {
            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-7px);
            }

            50% {
                transform: translateX(7px);
            }

            75% {
                transform: translateX(-4px);
            }
        }

        @keyframes starBurst {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.2) rotate(-30deg);
            }

            55% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.25) rotate(12deg);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.7) rotate(30deg);
            }
        }

        @keyframes endStarPulse {
            from {
                transform: scale(0.95);
            }

            to {
                transform: scale(1.06);
            }
        }

        @keyframes endWave {
            from {
                transform: rotate(-15deg);
            }

            to {
                transform: rotate(-55deg);
            }
        }

        @keyframes danceLeft {
            from {
                transform: rotate(3deg);
            }

            to {
                transform: rotate(-8deg) translateY(-4px);
            }
        }

        @keyframes danceRight {
            from {
                transform: rotate(-3deg);
            }

            to {
                transform: rotate(8deg) translateY(-4px);
            }
        }

        @keyframes confettiFall {
            from {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }

            to {
                transform: translateY(115vh) rotate(720deg);
                opacity: 0.9;
            }
        }

        /* ==================================================
           RESPONSIVE DESIGN
        ================================================== */

        @media (max-width: 520px) {
            .header-title {
                display: none;
            }

            .question-card {
                justify-content: flex-start;
            }

            .question-icon {

    <script>
        "use strict";

        /* ==================================================

        const splashScreen =

        const endStars =
            document.getElementById("endStars");

        const wrongAudio =
            document.getElementById("wrongAudio");

        const clapAudio =
            document.getElementById("clapAudio");

        const hotspots =
            Array.from(document.querySelectorAll(".hotspot"));

        /* ==================================================
           QUESTIONS
        ================================================== */

        const bodyParts = [
            {
                name: "head",
                icon: "🙂",
                question: "Where is the head?",
                correctSpeech: "Wonderful! This is the head."
            },
            {
                name: "eyes",
                icon: "👀",
                question: "Where are the eyes?",
                correctSpeech: "Wonderful! These are the eyes."
            },
            {
                name: "ears",
                icon: "👂",
                question: "Where are the ears?",
                correctSpeech: "Wonderful! These are the ears."
            },
            {
                name: "nose",
                icon: "👃",
                question: "Where is the nose?",
                correctSpeech: "Wonderful! This is the nose."
            },
            {
                name: "mouth",
                icon: "👄",
                question: "Where is the mouth?",
                correctSpeech: "Wonderful! This is the mouth."
            },
            {
                name: "arms",
                icon: "💪",
                question: "Where are the arms?",
                correctSpeech: "Wonderful! These are the arms."
            },
            {
                name: "hands",
                icon: "👐",
                question: "Where are the hands?",
                correctSpeech: "Wonderful! These are the hands."
            },
            {
                name: "tummy",
                icon: "👕",
                question: "Where is the tummy?",
                correctSpeech: "Wonderful! This is the tummy."
            },
            {
                name: "legs",
                icon: "🦵",
                question: "Where are the legs?",
                correctSpeech: "Wonderful! These are the legs."
            },
            {
                name: "feet",
                icon: "👣",
                question: "Where are the feet?",
                correctSpeech: "Wonderful! These are the feet."
            }
        ];

        let questions = [];
        let currentQuestionIndex = 0;
        let attempts = 0;
        let score = 0;
        let interactionLocked = false;
        let soundMuted = false;

        /*
          This number changes whenever a new speech begins.
          It prevents an old or cancelled speech event from
          moving the game forward incorrectly.
        */

        let speechSequence = 0;

        /* ==================================================
           SCREEN CONTROL
        ================================================== */

        function showScreen(screenToShow) {
            [
                splashScreen,
                startScreen,
                gameScreen,
                endScreen
            ].forEach(screen => {
                screen.classList.remove("active");
            });

            screenToShow.classList.add("active");
        }

        window.addEventListener("load", () => {
            setTimeout(() => {
                showScreen(startScreen);
            }, 5000);
        });

        innovineLogo.addEventListener("error", () => {
            innovineLogo.style.display = "none";
            logoFallback.style.display = "block";
        });

        /* ==================================================
           AUDIO FILES
        ================================================== */

        function stopAudio(audioElement) {
            audioElement.pause();
            audioElement.currentTime = 0;
        }

        function playWrongSound() {
            if (soundMuted) {
                return;
            }

            stopAudio(wrongAudio);

            wrongAudio.play().catch(() => {
                // The browser may block audio before a user tap.
            });
        }

        function playClapSound() {
            if (soundMuted) {
                return;
            }

            stopAudio(clapAudio);

            clapAudio.play().catch(() => {
                // The browser may block audio before a user tap.
            });
        }

        /* ==================================================
           SOFT BACKGROUND MELODY
        ================================================== */

        let audioContext = null;
        let melodyGain = null;
        let melodyTimer = null;
        let melodyPosition = 0;

        const melodyNotes = [
            523.25,
            659.25,
            783.99,
            659.25,
            587.33,
            698.46,
            783.99,
            698.46
        ];

        function initialiseMelody() {
            if (audioContext) {
                if (audioContext.state === "suspended") {
                    audioContext.resume().catch(() => {});
                }

                return;
            }

            const AudioContextClass =
                window.AudioContext ||
                window.webkitAudioContext;

            if (!AudioContextClass) {
                return;
            }

            audioContext = new AudioContextClass();

            melodyGain = audioContext.createGain();
            melodyGain.gain.value = soundMuted ? 0 : 0.035;
            melodyGain.connect(audioContext.destination);
        }

        function playMelodyNote() {
            if (
                !audioContext ||
                !melodyGain ||
                soundMuted
            ) {
                return;
            }

            const oscillator =
                audioContext.createOscillator();

            const gainNode =
                audioContext.createGain();

            oscillator.type = "sine";

            oscillator.frequency.value =
                melodyNotes[
                    melodyPosition % melodyNotes.length
                ];

            gainNode.gain.setValueAtTime(
                0.0001,
                audioContext.currentTime
            );

            gainNode.gain.linearRampToValueAtTime(
                0.035,
                audioContext.currentTime + 0.04
            );

            gainNode.gain.exponentialRampToValueAtTime(
                0.0001,
                audioContext.currentTime + 0.3
            );

            oscillator.connect(gainNode);
            gainNode.connect(melodyGain);

            oscillator.start();

            oscillator.stop(
                audioContext.currentTime + 0.32
            );

            melodyPosition++;
        }

        function startMelody() {
            initialiseMelody();

            if (!audioContext || melodyTimer) {
                return;
            }

            playMelodyNote();

            melodyTimer = setInterval(() => {
                playMelodyNote();
            }, 560);
        }

        function lowerMelody() {
            if (!melodyGain || !audioContext) {
                return;
            }

            melodyGain.gain.setTargetAtTime(
                0.006,
                audioContext.currentTime,
                0.05
            );
        }

        function restoreMelody() {
            if (
                !melodyGain ||
                !audioContext ||
                soundMuted
            ) {
                return;
            }

            melodyGain.gain.setTargetAtTime(
                0.035,
                audioContext.currentTime,
                0.08
            );
        }

        /* ==================================================
           SPEECH
        ================================================== */

        function cancelSpeech() {
            speechSequence++;

            if ("speechSynthesis" in window) {
                window.speechSynthesis.cancel();
            }

            restoreMelody();
        }

        function speak(text, afterSpeech = null) {
            const thisSpeechSequence = ++speechSequence;

            /*
              When sound is muted or speech synthesis is not
              supported, continue the game after a short pause.
            */

            if (
                soundMuted ||
                !("speechSynthesis" in window)
            ) {
                if (typeof afterSpeech === "function") {
                    setTimeout(afterSpeech, 500);
                }

                return;
            }

            window.speechSynthesis.cancel();
            lowerMelody();

            const utterance =
                new SpeechSynthesisUtterance(text);

            utterance.lang = "en-IN";
            utterance.rate = 0.72;
            utterance.pitch = 1.08;
            utterance.volume = 1;

            let speechCompleted = false;
            let safetyTimer = null;

            function completeSpeech() {
                if (
                    speechCompleted ||
                    thisSpeechSequence !== speechSequence
                ) {
                    return;
                }

                speechCompleted = true;

                if (safetyTimer) {
                    clearTimeout(safetyTimer);
                }

                restoreMelody();

                if (typeof afterSpeech === "function") {
                    afterSpeech();
                }
            }

            utterance.onend = completeSpeech;

            utterance.onerror = event => {
                /*
                  Do not move forward when another speech
                  intentionally cancels this one.
                */

                if (
                    event.error === "canceled" ||
                    event.error === "interrupted"
                ) {
                    return;
                }

                completeSpeech();
            };

            /*
              Safety timer for devices that occasionally fail
              to fire the speech onend event.

              The game still allows enough time for the whole
              sentence to be spoken.
            */

            const estimatedDuration =
                Math.max(
                    3500,
                    text.trim().split(/\s+/).length * 700
                );

            safetyTimer = setTimeout(() => {
                completeSpeech();
            }, estimatedDuration);

            window.speechSynthesis.speak(utterance);
        }

        function speakCurrentQuestion() {
            if (interactionLocked) {
                return;
            }

            const question =
                questions[currentQuestionIndex];

            if (!question) {
                return;
            }

            speak(question.question);
        }

        /* ==================================================
           SHUFFLE
        ================================================== */

        function shuffleArray(array) {
            const copy = [...array];

            for (
                let index = copy.length - 1;
                index > 0;
                index--
            ) {
                const randomIndex =
                    Math.floor(Math.random() * (index + 1));

                [
                    copy[index],
                    copy[randomIndex]
                ] = [
                    copy[randomIndex],
                    copy[index]
                ];
            }

            return copy;
        }

        /* ==================================================
           GAME SETUP
        ================================================== */

        function resetGame() {
            cancelSpeech();

            questions = shuffleArray(bodyParts);

            currentQuestionIndex = 0;
            attempts = 0;
            score = 0;
            interactionLocked = false;

            listenButton.disabled = false;

            clearAllHighlights();
            displayQuestion();
        }

        function displayQuestion() {
            const question =
                questions[currentQuestionIndex];

            if (!question) {
                finishGame();
                return;
            }

            attempts = 0;
            interactionLocked = false;
            listenButton.disabled = false;

            clearAllHighlights();

            progressBox.textContent =
                `${currentQuestionIndex + 1} of ${questions.length}`;

            questionIcon.textContent = question.icon;
            questionText.textContent = question.question;

            feedback.textContent =
                "Look carefully and tap.";

            setTimeout(() => {
                if (!interactionLocked) {
                    speakCurrentQuestion();
                }
            }, 400);
        }

        /* ==================================================
           BODY PART HIGHLIGHTS
        ================================================== */

        function getVisualParts(partName) {
            return Array.from(
                document.querySelectorAll(
                    `[data-visual="${partName}"]`
                )
            );
        }

        function clearAllHighlights() {
            document
                .querySelectorAll(".body-visual")
                .forEach(element => {
                    element.classList.remove(
                        "correct-highlight",
                        "wrong-highlight",
                        "hint-highlight"
                    );
                });
        }

        function addHighlight(partName, className) {
            getVisualParts(partName).forEach(element => {
                element.classList.add(className);
            });
        }

        function removeHighlight(partName, className) {
            getVisualParts(partName).forEach(element => {
                element.classList.remove(className);
            });
        }

        function showStarBurst() {
            starBurst.classList.remove("show");

            void starBurst.offsetWidth;

            starBurst.classList.add("show");

            setTimeout(() => {
                starBurst.classList.remove("show");
            }, 850);
        }

        /* ==================================================
           ANSWER CHECKING
        ================================================== */

        hotspots.forEach(hotspot => {
            hotspot.addEventListener("click", event => {
                event.stopPropagation();

                checkAnswer(
                    hotspot.dataset.part
                );
            });
        });

        function checkAnswer(selectedPart) {
            if (interactionLocked) {
                return;
            }

            const question =
                questions[currentQuestionIndex];

            if (!question) {
                return;
            }

            /*
              Stop the question audio when the learner answers.
            */

            cancelSpeech();

            if (selectedPart === question.name) {
                score++;

                handleCorrectAnswer();
                return;
            }

            attempts++;

            addHighlight(
                selectedPart,
                "wrong-highlight"
            );

            playWrongSound();

            setTimeout(() => {
                removeHighlight(
                    selectedPart,
                    "wrong-highlight"
                );
            }, 500);

            if (attempts < 2) {
                feedback.textContent = "Try again!";

                speak("Let us try again.");

                return;
            }

            revealCorrectPart();
        }

        function revealCorrectPart() {
            interactionLocked = true;
            listenButton.disabled = true;

            const question =
                questions[currentQuestionIndex];

            addHighlight(
                question.name,
                "hint-highlight"
            );

            feedback.textContent =
                `This is the ${question.name}.`;

            /*
              The next question appears only after this
              complete sentence has finished.
            */

            speak(
                `Look carefully. This is the ${question.name}.`,
                () => {
                    setTimeout(() => {
                        removeHighlight(
                            question.name,
                            "hint-highlight"
                        );

                        moveToNextQuestion();
                    }, 450);
                }
            );
        }

        function handleCorrectAnswer() {
            interactionLocked = true;
            listenButton.disabled = true;

            const question =
                questions[currentQuestionIndex];

            addHighlight(
                question.name,
                "correct-highlight"
            );

            showStarBurst();
            playClapSound();

            feedback.textContent =
                question.correctSpeech;

            /*
              There is no fixed 1.6-second timer here.
              The game waits for the full sentence to finish.
            */

            speak(
                question.correctSpeech,
                () => {
                    setTimeout(() => {
                        removeHighlight(
                            question.name,
                            "correct-highlight"
                        );

                        moveToNextQuestion();
                    }, 450);
                }
            );
        }

        function moveToNextQuestion() {
            currentQuestionIndex++;

            if (
                currentQuestionIndex >=
                questions.length
            ) {
                finishGame();
            } else {
                displayQuestion();
            }
        }

        /* ==================================================
           END GAME
        ================================================== */

        function finishGame() {
            interactionLocked = true;
            listenButton.disabled = true;

            let stars = "⭐";
            let message = "Good effort!";

            if (score >= 9) {
                stars = "⭐⭐⭐";
                message = "Amazing work!";
            } else if (score >= 6) {
                stars = "⭐⭐";
                message = "Great work!";
            }

            endStars.textContent = stars;
            scoreMessage.textContent = message;

            showScreen(endScreen);
            createConfetti();
            playClapSound();

            /*
              The final message is also allowed to finish fully.
            */

            setTimeout(() => {
                speak(
                    "Wonderful! You know your body parts!"
                );
            }, 500);
        }

        function createConfetti() {
            const container =
                document.getElementById(
                    "confettiContainer"
                );

            container.innerHTML = "";

            const colours = [
                "#ff6b98",
                "#ffd34e",
                "#43c8f0",
                "#65d688",
                "#a884ff",
                "#ff9f43"
            ];

            for (let index = 0; index < 42; index++) {
                const piece =
                    document.createElement("span");

                piece.className = "confetti";

                piece.style.left =
                    `${Math.random() * 100}%`;

                piece.style.background =
                    colours[
                        Math.floor(
                            Math.random() *
                            colours.length
                        )
                    ];

                piece.style.animationDuration =
                    `${2.8 + Math.random() * 2.5}s`;

                piece.style.animationDelay =
                    `${Math.random() * 0.8}s`;

                container.appendChild(piece);
            }

            setTimeout(() => {
                container.innerHTML = "";
            }, 6500);
        }

        /* ==================================================
           BUTTON EVENTS
        ================================================== */

        startButton.addEventListener("click", () => {
            wrongAudio.load();
            clapAudio.load();

            initialiseMelody();
            startMelody();

            showScreen(gameScreen);
            resetGame();
        });

        playAgainButton.addEventListener("click", () => {
            showScreen(gameScreen);
            resetGame();
        });

        listenButton.addEventListener("click", () => {
            /*
              Feedback speech cannot be interrupted by the
              replay button.
            */

            if (interactionLocked) {
                return;
            }

            speakCurrentQuestion();
        });

        soundButton.addEventListener("click", () => {
            soundMuted = !soundMuted;

            soundButton.textContent =
                soundMuted ? "🔇" : "🔊";

            if (soundMuted) {
                cancelSpeech();

                stopAudio(wrongAudio);
                stopAudio(clapAudio);

                if (
                    melodyGain &&
                    audioContext
                ) {
                    melodyGain.gain.setTargetAtTime(
                        0,
                        audioContext.currentTime,
                        0.05
                    );
                }
            } else {
                initialiseMelody();

                if (
                    melodyGain &&
                    audioContext
                ) {
                    melodyGain.gain.setTargetAtTime(
                        0.035,
                        audioContext.currentTime,
                        0.05
                    );
                }

                if (!interactionLocked) {
                    speakCurrentQuestion();
                }
            }
        });

        /* ==================================================
           MOBILE PROTECTION
        ================================================== */

        document.addEventListener(
            "contextmenu",
            event => {
                event.preventDefault();
            }
        );

        document.addEventListener(
            "touchmove",
            event => {
                event.preventDefault();
            },
            {
                passive: false
            }
        );

        document.addEventListener(
            "gesturestart",
            event => {
                event.preventDefault();
            }
        );
    </script>

</body>
</html>
