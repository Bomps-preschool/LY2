<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Me and Myself - Body Parts</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("assets/background.png") no-repeat center center fixed;
  background-size:cover;
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#splash img{
  width:220px;
}

/* GAME */
#game{
  display:none;
  width:100vw;
  height:100vh;
  position:relative;
}

/* TITLE */
#title{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:10px 18px;
  border-radius:12px;
  font-size:24px;
  font-weight:bold;
  color:#ff4d6d;
}

/* BOY */
#boy{
  position:absolute;
  left:50%;
  top:55%;
  transform:translate(-50%,-50%);
  width:260px;
  max-width:70vw;
}

/* LABELS */
.label{
  position:absolute;
  background:white;
  padding:8px 12px;
  border-radius:10px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

/* POSITIONING */
#ear{ top:25%; left:15%; }
#eye{ top:35%; left:15%; }
#nose{ top:45%; left:15%; }
#mouth{ top:55%; left:15%; }
#arm{ top:65%; left:15%; }
#leg{ top:75%; left:15%; }

/* GLOW */
#glow{
  position:absolute;
  width:120px;
  display:none;
  pointer-events:none;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game">

  <div id="title">Touch the body part</div>

  <img id="boy" src="assets/boy-body.png">

  <div id="ear" class="label">Ear</div>
  <div id="eye" class="label">Eye</div>
  <div id="nose" class="label">Nose</div>
  <div id="mouth" class="label">Mouth</div>
  <div id="arm" class="label">Arm</div>
  <div id="leg" class="label">Leg</div>

</div>

<img id="glow">

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="block";
  nextRound();
},5000);

const order = ["ear","eye","nose","mouth","arm","leg"];
let index = 0;

const correct = new Audio("assets/correct.mp3");
const wrong = new Audio("assets/wrong.mp3");

const glowMap = {
  ear:"assets/ear-glow.png",
  eye:"assets/eye-glow.png",
  nose:"assets/nose-glow.png",
  mouth:"assets/mouth-glow.png",
  arm:"assets/arm-glow.png",
  leg:"assets/leg-glow.png"
};

const voiceMap = {
  ear:"assets/touch-ear.mp3",
  eye:"assets/touch-eye.mp3",
  nose:"assets/touch-nose.mp3",
  mouth:"assets/touch-mouth.mp3",
  arm:"assets/touch-arm.mp3",
  leg:"assets/touch-leg.mp3"
};

function speak(text){
  let msg = new SpeechSynthesisUtterance(text);
  msg.rate = 0.9;
  window.speechSynthesis.speak(msg);
}

function nextRound(){
  if(index >= order.length){
    alert("🎉 Well Done!");
    return;
  }
  let part = order[index];
  document.getElementById("title").innerText = "Touch the " + part;
  speak("Touch the " + part);
}

function showGlow(part){
  let glow = document.getElementById("glow");
  glow.src = glowMap[part];
  glow.style.display="block";
  glow.style.left="50%";
  glow.style.top="55%";

  new Audio(voiceMap[part]).play();

  setTimeout(()=>{
    glow.style.display="none";
    index++;
    nextRound();
  },2000);
}

/* EVENTS */
document.querySelectorAll(".label").forEach(el=>{
  el.addEventListener("click",()=>{
    let part = el.id;

    if(part === order[index]){
      correct.play();
      showGlow(part);
    } else {
      wrong.play();
    }
  });
});

</script>

</body>
</html>
