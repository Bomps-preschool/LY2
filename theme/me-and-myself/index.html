<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Body Parts Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Comic Sans MS;
}

body{
  background: linear-gradient(135deg,#f5f7ff,#fff0f5);
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#splash img{
  width:240px;
}

/* INSTRUCTION */
#instruction{
  width:100%;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  padding:12px;
  background:#ffffffcc;
}

/* GAME LAYOUT */
#game{
  display:none;
  width:100%;
  height:100vh;
  flex-direction:row;
}

/* LEFT PANEL */
#left{
  width:25%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:60px;
}

/* CENTER */
#center{
  width:50%;
  display:flex;
  justify-content:center;
  align-items:center;
}

#boy{
  width:320px;
}

/* RIGHT PANEL */
#right{
  width:25%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:60px;
}

/* BOX */
.box{
  width:80px;
  height:80px;
  border:3px dashed #333;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* PARTS */
.part{
  width:100px;
  height:100px;
  background:white;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.12);
  cursor:pointer;
}

.part img{
  width:70px;
}

.selected{
  border:4px solid #4CAF50;
}

/* CONGRATS */
#congrats{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#fff3e6,#e6fff5);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#congrats h1{
  font-size:60px;
}

button{
  margin-top:20px;
  padding:12px 25px;
  font-size:20px;
  border:none;
  background:#4CAF50;
  color:white;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- INSTRUCTION -->
<div id="instruction">
  Tap the body part and match it correctly
</div>

<!-- GAME -->
<div id="game">

  <!-- LEFT SIDE BOXES -->
  <div id="left">
    <div class="box" data-part="eye"></div>
    <div class="box" data-part="nose"></div>
    <div class="box" data-part="arm"></div>
  </div>

  <!-- CENTER BOY -->
  <div id="center">
    <img id="boy" src="assets/boy-body.png">
  </div>

  <!-- RIGHT SIDE BOXES -->
  <div id="right">
    <div class="box" data-part="ear"></div>
    <div class="box" data-part="mouth"></div>
    <div class="box" data-part="leg"></div>
  </div>

</div>

<!-- CONGRATS -->
<div id="congrats">
  <h1>🎉 Congratulations!</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

/* SPLASH SCREEN */
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="flex";
},5000);

/* GAME LOGIC */
let selected=null;
let done=0;

document.querySelectorAll(".part").forEach(p=>{
  p.onclick=()=>{
    selected=p.dataset.name;
    document.querySelectorAll(".part").forEach(x=>x.classList.remove("selected"));
    p.classList.add("selected");
  }
});

/* BOX CLICK */
document.querySelectorAll(".box").forEach(box=>{
  box.onclick=()=>{

    if(!selected) return;

    if(selected===box.dataset.part){
      document.getElementById("correct").play();
      box.style.background="lightgreen";
      box.innerHTML="✔";
      done++;

      selected=null;
      document.querySelectorAll(".part").forEach(x=>x.classList.remove("selected"));

      if(done===6){
        document.getElementById("game").style.display="none";
        document.getElementById("congrats").style.display="flex";
      }

    } else {
      document.getElementById("wrong").play();
    }
  }
});

</script>

</body>
</html>
