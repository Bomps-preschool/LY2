<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Body Parts Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Comic Sans MS;
}

body{
  background: linear-gradient(135deg,#f5f7ff,#fff0f5);
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#splash img{
  width:200px;
}

/* GAME CONTAINER */
#gameContainer{
  width:100vw;
  height:100vh;
  display:none;
  justify-content:center;
  align-items:center;
}

/* STAGE */
#gameStage{
  position:relative;
  width:1280px;
  height:720px;
  transform-origin:center center;
}

/* TITLE */
#instruction{
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

/* BOY */
#boyWrapper{
  position:absolute;
  left:50%;
  top:55%;
  transform:translate(-50%,-50%);
  width:260px;
  z-index:3;
}

#boy{
  width:100%;
}

/* ANCHORS */
.anchor{
  position:absolute;
  width:10px;
  height:10px;
}

/* BODY POINTS */
#eyeAnchor{ top:18%; left:55%; }
#noseAnchor{ top:28%; left:55%; }
#mouthAnchor{ top:38%; left:55%; }
#earAnchor{ top:20%; left:35%; }
#armAnchor{ top:55%; left:75%; }
#legAnchor{ top:78%; left:55%; }

/* BOXES (CLOSER) */
.box{
  width:70px;
  height:70px;
  border:3px dashed #333;
  border-radius:10px;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  position:absolute;
  font-size:18px;
  z-index:4;
}

/* LEFT SIDE (closer) */
#eyeBox{ left:160px; top:220px; }
#noseBox{ left:160px; top:340px; }
#armBox{ left:160px; top:460px; }

/* RIGHT SIDE (closer) */
#earBox{ right:160px; top:220px; }
#mouthBox{ right:160px; top:340px; }
#legBox{ right:160px; top:460px; }

/* PARTS */
#parts{
  position:absolute;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:18px;
  z-index:5;
}

.part{
  width:80px;
  height:80px;
  background:white;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
  cursor:pointer;
}

.part img{
  width:55%;
}

.selected{
  border:4px solid #4CAF50;
}

/* SVG FIXED LAYER */
svg{
  position:absolute;
  width:1280px;
  height:720px;
  top:0;
  left:0;
  z-index:2;
  pointer-events:none;
}

line{
  stroke:#444;
  stroke-width:3;
}

/* CONGRATS */
#congrats{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#fff6e5,#e6fff7);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:20;
}

button{
  margin-top:20px;
  padding:12px 25px;
  font-size:18px;
  border:none;
  background:#4CAF50;
  color:white;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="gameContainer">
  <div id="gameStage">

    <div id="instruction">Tap the correct body part and match it</div>

    <svg id="svgLines"></svg>

    <!-- BOY -->
    <div id="boyWrapper">
      <img id="boy" src="assets/boy-body.png">

      <div class="anchor" id="eyeAnchor"></div>
      <div class="anchor" id="noseAnchor"></div>
      <div class="anchor" id="mouthAnchor"></div>
      <div class="anchor" id="earAnchor"></div>
      <div class="anchor" id="armAnchor"></div>
      <div class="anchor" id="legAnchor"></div>

    </div>

    <!-- BOXES -->
    <div class="box" id="eyeBox" data-part="eye"></div>
    <div class="box" id="noseBox" data-part="nose"></div>
    <div class="box" id="armBox" data-part="arm"></div>

    <div class="box" id="earBox" data-part="ear"></div>
    <div class="box" id="mouthBox" data-part="mouth"></div>
    <div class="box" id="legBox" data-part="leg"></div>

    <!-- PARTS -->
    <div id="parts">
      <div class="part" data-name="eye"><img src="assets/eye.png"></div>
      <div class="part" data-name="ear"><img src="assets/ear.png"></div>
      <div class="part" data-name="nose"><img src="assets/nose.png"></div>
      <div class="part" data-name="mouth"><img src="assets/mouth.png"></div>
      <div class="part" data-name="arm"><img src="assets/arm.png"></div>
      <div class="part" data-name="leg"><img src="assets/leg.png"></div>
    </div>

  </div>
</div>

<!-- CONGRATS -->
<div id="congrats">
  <h1>🎉 Great Job!</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("gameContainer").style.display="flex";
  scaleGame();
  setTimeout(drawLines,500);
},5000);

/* SCALE GAME */
function scaleGame(){
  const stage = document.getElementById("gameStage");

  const scale = Math.min(
    window.innerWidth / 1280,
    window.innerHeight / 720
  );

  stage.style.transform = `scale(${scale})`;
}

window.addEventListener("resize",()=>{
  scaleGame();
  drawLines();
});

/* GAME LOGIC */
let selected=null;
let done=0;

document.querySelectorAll(".part").forEach(p=>{
  p.onclick=()=>{
    selected=p.dataset.name;
    document.querySelectorAll(".part").forEach(x=>x.classList.remove("selected"));
    p.classList.add("selected");
  }
});

document.querySelectorAll(".box").forEach(box=>{
  box.onclick=()=>{

    if(!selected) return;

    if(selected === box.dataset.part){
      document.getElementById("correct").play();
      box.innerHTML="✔";
      box.style.background="lightgreen";
      done++;

      selected=null;
      document.querySelectorAll(".part").forEach(x=>x.classList.remove("selected"));

      drawLines();

      if(done===6){
        document.getElementById("gameContainer").style.display="none";
        document.getElementById("congrats").style.display="flex";
      }

    } else {
      document.getElementById("wrong").play();
    }
  }
});

/* 🔥 FINAL FIXED LINE SYSTEM (STAGE-BASED) */
function getPos(el, stage){
  const r = el.getBoundingClientRect();
  const s = stage.getBoundingClientRect();

  const scaleX = 1280 / s.width;
  const scaleY = 720 / s.height;

  return {
    x: (r.left - s.left + r.width/2) * scaleX,
    y: (r.top - s.top + r.height/2) * scaleY
  };
}

/* DRAW LINES */
function drawLines(){

  const svg = document.getElementById("svgLines");
  const stage = document.getElementById("gameStage");

  svg.innerHTML = "";

  const pairs = [
    ["eyeBox","eyeAnchor"],
    ["noseBox","noseAnchor"],
    ["armBox","armAnchor"],
    ["earBox","earAnchor"],
    ["mouthBox","mouthAnchor"],
    ["legBox","legAnchor"]
  ];

  pairs.forEach(([b,a])=>{

    const box = document.getElementById(b);
    const anchor = document.getElementById(a);

    const p1 = getPos(box, stage);
    const p2 = getPos(anchor, stage);

    const line = document.createElementNS("http://www.w3.org/2000/svg","line");

    line.setAttribute("x1", p1.x);
    line.setAttribute("y1", p1.y);
    line.setAttribute("x2", p2.x);
    line.setAttribute("y2", p2.y);

    svg.appendChild(line);
  });
}

</script>

</body>
</html>
