<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Body Parts Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#dff6ff;
  overflow:hidden;
}

/* SCREEN */
.screen{
  width:100vw;
  height:100vh;
  position:absolute;
  display:none;
}

/* LOGO */
#logoScreen{
  display:flex;
  justify-content:center;
  align-items:center;
  background:white;
}
#logoScreen img{ width:220px; }

/* LEVEL SCREEN */
#levelScreen{
  background:#fff8e6;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.levelCard{
  background:white;
  padding:20px;
  margin:10px;
  border-radius:15px;
  width:200px;
  text-align:center;
  font-weight:bold;
  box-shadow:0 5px 12px rgba(0,0,0,0.15);
  cursor:pointer;
}

/* GAME SCREEN */
#gameScreen{
  background:#eaf6ff;
}

/* TOP BAR */
#topBar{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 15px;
  box-sizing:border-box;
}

.icon{
  width:40px;
  cursor:pointer;
}

/* TITLE */
#title{
  position:absolute;
  top:60px;
  width:100%;
  text-align:center;
  font-size:26px;
  font-weight:bold;
  color:#ff4d6d;
}

/* INSTRUCTION */
#instruction{
  position:absolute;
  top:100px;
  width:100%;
  text-align:center;
  font-size:22px;
  background:white;
  display:inline-block;
  padding:10px;
  border-radius:12px;
}

/* LEFT PANEL */
#leftPanel{
  position:absolute;
  left:10px;
  top:160px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.part{
  background:white;
  padding:10px 14px;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

/* BOY */
#boy{
  position:absolute;
  left:50%;
  top:55%;
  transform:translate(-50%,-50%);
  width:280px;
}

/* GLOW */
#glow{
  position:absolute;
  width:50px;
  height:50px;
  border-radius:50%;
  border:4px solid yellow;
  box-shadow:0 0 15px yellow;
  display:none;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<!-- LOGO -->
<div id="logoScreen" class="screen">
  <img src="assets/innovine-logo.png">
</div>

<!-- LEVEL -->
<div id="levelScreen" class="screen">
  <div class="levelCard" onclick="startLevel(1)">Level 1<br>Ear Eye Nose</div>
  <div class="levelCard" onclick="startLevel(2)">Level 2<br>Mouth Arm Leg</div>
  <div class="levelCard" onclick="startLevel(3)">Level 3<br>All Parts</div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">

  <div id="topBar">
    <img src="assets/home-button.png" class="icon" onclick="goHome()">
    <img src="assets/voice-icon.png" class="icon" onclick="repeatVoice()">
    <img src="assets/next-button.png" class="icon" onclick="nextQ()">
  </div>

  <div id="title">My Body Parts</div>
  <div id="instruction">Loading...</div>

  <div id="leftPanel">
    <div class="part">Ear</div>
    <div class="part">Eye</div>
    <div class="part">Nose</div>
    <div class="part">Mouth</div>
    <div class="part">Arm</div>
    <div class="part">Leg</div>
  </div>

  <img id="boy" src="assets/boy-body.png">
  <div id="glow"></div>

</div>

<script>

let level=1;
let index=0;
let order=[];

/* START FLOW */
window.onload = ()=>{
  document.getElementById("logoScreen").style.display="flex";
  setTimeout(()=>{
    document.getElementById("logoScreen").style.display="none";
    document.getElementById("levelScreen").style.display="flex";
  },5000);
};

/* LEVEL SETUP */
function startLevel(lv){
  level=lv;
  document.getElementById("levelScreen").style.display="none";
  document.getElementById("gameScreen").style.display="block";

  if(level==1) order=["ear","eye","nose"];
  if(level==2) order=["mouth","arm","leg"];
  if(level==3) order=["ear","eye","nose","mouth","arm","leg"];

  index=0;
  loadQ();
}

/* SPEECH */
function speak(t){
  let msg=new SpeechSynthesisUtterance(t);
  msg.rate=0.9;
  window.speechSynthesis.speak(msg);
}

/* QUESTION */
function loadQ(){
  let q=order[index];
  document.getElementById("instruction").innerText="Touch the "+q;
  speak("Touch the "+q);
}

/* GLOW FIXED (NO SHIFT ISSUE) */
function showGlow(part){

  const map={
    ear:{x:0.62,y:0.28},
    eye:{x:0.55,y:0.25},
    nose:{x:0.55,y:0.38},
    mouth:{x:0.55,y:0.50},
    arm:{x:0.35,y:0.60},
    leg:{x:0.55,y:0.82}
  };

  let boy=document.getElementById("boy");
  let rect=boy.getBoundingClientRect();

  let g=document.getElementById("glow");

  g.style.left=(rect.left + rect.width*map[part].x)+"px";
  g.style.top=(rect.top + rect.height*map[part].y)+"px";

  g.style.display="block";

  setTimeout(()=>g.style.display="none",1200);
}

/* CLICK HANDLER */
document.querySelectorAll(".part").forEach(el=>{
  el.onclick=()=>{
    let part=el.innerText.toLowerCase();

    if(part===order[index]){
      showGlow(part);
      index++;
      setTimeout(()=>{
        if(index<order.length){
          loadQ();
        }else{
          alert("🎉 Level Completed!");
        }
      },1200);
    }else{
      alert("Try again");
    }
  }
});

/* NAV */
function nextQ(){
  alert("Use correct answer");
}
function repeatVoice(){
  loadQ();
}
function goHome(){
  location.reload();
}

</script>

</body>
</html>
