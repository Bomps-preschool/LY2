<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Body Parts Match Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Comic Sans MS;
}

body{
  background: linear-gradient(135deg,#f6f8ff,#fff1f5);
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#splash img{
  width:220px;
}

/* INSTRUCTION */
#instruction{
  text-align:center;
  font-size:22px;
  padding:10px;
  font-weight:bold;
}

/* GAME LAYOUT */
#game{
  display:none;
  width:100%;
  height:100vh;
  position:relative;
}

/* CENTER BOY */
#boy{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:260px;
  z-index:2;
}

/* BOX STYLE */
.box{
  width:75px;
  height:75px;
  border:3px dashed #333;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:white;
  position:absolute;
  font-size:22px;
}

/* LEFT SIDE POSITIONS */
#eyeBox{ left:40px; top:120px; }
#noseBox{ left:40px; top:250px; }
#armBox{ left:40px; top:380px; }

/* RIGHT SIDE POSITIONS */
#earBox{ right:40px; top:120px; }
#mouthBox{ right:40px; top:250px; }
#legBox{ right:40px; top:380px; }

/* PARTS PANEL */
#parts{
  position:absolute;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:25px;
}

.part{
  width:90px;
  height:90px;
  background:white;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
  cursor:pointer;
}

.part img{
  width:60px;
}

.selected{
  border:4px solid #4CAF50;
}

/* SVG ARROWS */
svg{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  pointer-events:none;
  z-index:1;
}

line{
  stroke:#444;
  stroke-width:3;
}

/* CONGRATS */
#congrats{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#fff6e5,#e6fff7);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

#congrats h1{
  font-size:60px;
}

button{
  margin-top:20px;
  padding:12px 25px;
  font-size:20px;
  border:none;
  background:#4CAF50;
  color:white;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<div id="instruction">
  Tap a body part and match it to the correct box
</div>

<!-- GAME -->
<div id="game">

  <!-- BOY -->
  <img id="boy" src="assets/boy-body.png">

  <!-- ARROWS (IMPORTANT: outside boy, no overlap) -->
  <svg>
    <!-- LEFT SIDE -->
    <line x1="120" y1="150" x2="40" y2="150"></line> <!-- eye -->
    <line x1="120" y1="260" x2="40" y2="260"></line> <!-- nose -->
    <line x1="120" y1="380" x2="40" y2="380"></line> <!-- arm -->

    <!-- RIGHT SIDE -->
    <line x1="520" y1="150" x2="600" y2="150"></line> <!-- ear -->
    <line x1="520" y1="260" x2="600" y2="260"></line> <!-- mouth -->
    <line x1="520" y1="380" x2="600" y2="380"></line> <!-- leg -->
  </svg>

  <!-- LEFT BOXES -->
  <div class="box" id="eyeBox" data-part="eye"></div>
  <div class="box" id="noseBox" data-part="nose"></div>
  <div class="box" id="armBox" data-part="arm"></div>

  <!-- RIGHT BOXES -->
  <div class="box" id="earBox" data-part="ear"></div>
  <div class="box" id="mouthBox" data-part="mouth"></div>
  <div class="box" id="legBox" data-part="leg"></div>

  <!-- PARTS -->
  <div id="parts">
    <div class="part" data-name="eye"><img src="assets/eye.png"></div>
    <div class="part" data-name="ear"><img src="assets/ear.png"></div>
    <div class="part" data-name="nose"><img src="assets/nose.png"></div>
    <div class="part" data-name="mouth"><img src="assets/mouth.png"></div>
    <div class="part" data-name="arm"><img src="assets/arm.png"></div>
    <div class="part" data-name="leg"><img src="assets/leg.png"></div>
  </div>

</div>

<!-- CONGRATS -->
<div id="congrats">
  <h1>🎉 Congratulations!</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="block";
},5000);

let selected=null;
let done=0;

document.querySelectorAll(".part").forEach(p=>{
  p.onclick=()=>{
    selected=p.dataset.name;
    document.querySelectorAll(".part").forEach(x=>x.classList.remove("selected"));
    p.classList.add("selected");
  }
});

document.querySelectorAll(".box").forEach(box=>{
  box.onclick=()=>{

    if(!selected) return;

    if(selected === box.dataset.part){
      document.getElementById("correct").play();
      box.innerHTML="✔";
      box.style.background="lightgreen";
      done++;

      selected=null;
      document.querySelectorAll(".part").forEach(x=>x.classList.remove("selected"));

      if(done===6){
        document.getElementById("game").style.display="none";
        document.getElementById("congrats").style.display="flex";
      }

    } else {
      document.getElementById("wrong").play();
    }
  }
});

</script>

</body>
</html>
