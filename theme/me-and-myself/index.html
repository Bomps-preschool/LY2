<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Body Parts Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Comic Sans MS;
}

body{
  background: linear-gradient(135deg,#f5f7ff,#fff0f5);
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#splash img{
  width:240px;
}

/* INSTRUCTION */
#instruction{
  width:100%;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  padding:12px;
  background:#ffffffcc;
}

/* GAME */
#game{
  display:none;
  width:100%;
  height:100vh;
  flex-direction:row;
}

/* BOY AREA */
#boyArea{
  width:65%;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* WRAPPER */
#boyWrapper{
  position:relative;
  width:360px;
}

#boy{
  width:100%;
  display:block;
}

/* BOX STYLE */
.box{
  width:65px;
  height:65px;
  border:3px dashed #333;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:transparent;
}

/* LEFT COLUMN (Eye, Nose, Arm) */
.leftCol{
  position:absolute;
  left:-140px;
  top:120px;
  display:flex;
  flex-direction:column;
  gap:60px;
}

/* RIGHT COLUMN (Ear, Mouth, Leg) */
.rightCol{
  position:absolute;
  right:-140px;
  top:80px;
  display:flex;
  flex-direction:column;
  gap:60px;
}

/* LINES SVG */
#lines{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}

/* PARTS */
#parts{
  width:35%;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
  padding:20px;
  align-content:center;
  justify-items:center;
}

.part{
  width:110px;
  height:110px;
  background:#fff;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.12);
  cursor:pointer;
}

.part img{
  width:75px;
}

.selected{
  border:4px solid #4CAF50;
}

/* CONGRATS */
#congrats{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#fff3e6,#e6fff5);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

#congrats h1{
  font-size:55px;
}

button{
  margin-top:20px;
  padding:12px 25px;
  font-size:20px;
  border:none;
  background:#4CAF50;
  color:white;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- INSTRUCTION -->
<div id="instruction">
  Tap a body part and then tap the correct place on the boy
</div>

<!-- GAME -->
<div id="game">

  <div id="boyArea">

    <div id="boyWrapper">
      <img id="boy" src="assets/boy-body.png">

      <!-- SVG for lines -->
      <svg id="lines">
        <line id="eyeLine" stroke="#000" stroke-width="2" />
        <line id="earLine" stroke="#000" stroke-width="2" />
        <line id="noseLine" stroke="#000" stroke-width="2" />
        <line id="mouthLine" stroke="#000" stroke-width="2" />
        <line id="handLine" stroke="#000" stroke-width="2" />
        <line id="legLine" stroke="#000" stroke-width="2" />
      </svg>

      <!-- LEFT COLUMN -->
      <div class="leftCol">
        <div class="box" data-part="eye"></div>
        <div class="box" data-part="nose"></div>
        <div class="box" data-part="arm"></div>
      </div>

      <!-- RIGHT COLUMN -->
      <div class="rightCol">
        <div class="box" data-part="ear"></div>
        <div class="box" data-part="mouth"></div>
        <div class="box" data-part="leg"></div>
      </div>

    </div>
  </div>

  <!-- PARTS -->
  <div id="parts">
    <div class="part" data-name="eye"><img src="assets/eye.png"></div>
    <div class="part" data-name="ear"><img src="assets/ear.png"></div>
    <div class="part" data-name="nose"><img src="assets/nose.png"></div>
    <div class="part" data-name="mouth"><img src="assets/mouth.png"></div>
    <div class="part" data-name="arm"><img src="assets/arm.png"></div>
    <div class="part" data-name="leg"><img src="assets/leg.png"></div>
  </div>

</div>

<!-- CONGRATS -->
<div id="congrats">
  <h1>🎉 Congratulations!</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="flex";
},5000);

let selected=null;
let done=0;

// tap part selection
document.querySelectorAll(".part").forEach(p=>{
  p.onclick=()=>{
    selected=p.dataset.name;
    document.querySelectorAll(".part").forEach(x=>x.classList.remove("selected"));
    p.classList.add("selected");
  }
});

// tap box placement
document.querySelectorAll(".box").forEach(box=>{
  box.onclick=()=>{
    if(!selected) return;

    if(selected===box.dataset.part){
      document.getElementById("correct").play();
      box.style.background="lightgreen";
      box.innerHTML="✔";
      done++;
      selected=null;
      document.querySelectorAll(".part").forEach(x=>x.classList.remove("selected"));

      if(done===6){
        document.getElementById("game").style.display="none";
        document.getElementById("congrats").style.display="flex";
      }
    }else{
      document.getElementById("wrong").play();
    }
  }
});

// draw connecting lines
function updateLines(){
  const body = document.getElementById('boy');
  const rectBoy = body.getBoundingClientRect();

  const boxes = {
    eye: document.getElementById('eyeBox'),
    ear: document.getElementById('earBox'),
    nose: document.getElementById('noseBox'),
    mouth: document.getElementById('mouthBox'),
    hand: document.getElementById('handBox'),
    leg: document.getElementById('legBox')
  };

  const lines = {
    eye: document.getElementById('eyeLine'),
    ear: document.getElementById('earLine'),
    nose: document.getElementById('noseLine'),
    mouth: document.getElementById('mouthLine'),
    hand: document.getElementById('handLine'),
    leg: document.getElementById('legLine')
  };

  Object.keys(boxes).forEach(part=>{
    const box = boxes[part];
    const line = lines[part];

    let startX = rectBoy.width/2;
    let startY = rectBoy.height*0.2;
    switch(part){
      case 'eye': startY = rectBoy.height*0.2; break;
      case 'ear': startY = rectBoy.height*0.2; break;
      case 'nose': startY = rectBoy.height*0.3; break;
      case 'mouth': startY = rectBoy.height*0.35; break;
      case 'hand': startY = rectBoy.height*0.5; break;
      case 'leg': startY = rectBoy.height*0.75; break;
    }

    const endX = box.offsetLeft + box.offsetWidth/2;
    const endY = box.offsetTop + box.offsetHeight/2;

    line.setAttribute('x1', startX);
    line.setAttribute('y1', startY);
    line.setAttribute('x2', endX);
    line.setAttribute('y2', endY);
  });
}

setTimeout(updateLines,100);
window.addEventListener('resize',updateLines);

</script>
</body>
</html>
