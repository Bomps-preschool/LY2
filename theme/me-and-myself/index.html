<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Body Parts Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Comic Sans MS;
}

body{
  background: linear-gradient(135deg,#f5f7ff,#fff0f5);
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#splash img{
  width:240px;
}

/* INSTRUCTION */
#instruction{
  width:100%;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  padding:12px;
  background:#ffffffcc;
}

/* GAME */
#game{
  display:none;
  width:100%;
  height:100vh;
  flex-direction:row;
}

/* BOY AREA */
#boyArea{
  width:65%;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* WRAPPER */
#boyWrapper{
  position:relative;
  width:360px;
}

#boy{
  width:100%;
  display:block;
}

/* BOX STYLE */
.box{
  width:70px;
  height:70px;
  border:3px dashed #333;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:transparent;
  position:relative;
  z-index:2;
}

/* LEFT COLUMN */
.leftCol{
  position:absolute;
  left:-140px;
  top:120px;
  display:flex;
  flex-direction:column;
  gap:70px;
}

/* RIGHT COLUMN */
.rightCol{
  position:absolute;
  right:-140px;
  top:80px;
  display:flex;
  flex-direction:column;
  gap:70px;
}

/* ⭐ VISUAL LINES (FIXED & ALWAYS VISIBLE) */

.box::before{
  content:"";
  position:absolute;
  width:120px;
  height:2px;
  background:#333;
  top:50%;
  left:-120px;
  transform:translateY(-50%);
  z-index:1;
}

/* right side lines */
.rightCol .box::before{
  left:auto;
  right:-120px;
}

/* PARTS */
#parts{
  width:35%;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
  padding:20px;
  align-content:center;
  justify-items:center;
}

.part{
  width:110px;
  height:110px;
  background:#fff;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.12);
  cursor:pointer;
}

.part img{
  width:75px;
}

.selected{
  border:4px solid #4CAF50;
}

/* CONGRATS */
#congrats{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#fff3e6,#e6fff5);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

#congrats h1{
  font-size:55px;
}

button{
  margin-top:20px;
  padding:12px 25px;
  font-size:20px;
  border:none;
  background:#4CAF50;
  color:white;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- INSTRUCTION -->
<div id="instruction">
  Tap a body part and then tap the correct place on the boy
</div>

<!-- GAME -->
<div id="game">

  <div id="boyArea">
    <div id="boyWrapper">

      <img id="boy" src="assets/boy-body.png">

      <!-- LEFT -->
      <div class="leftCol">
        <div class="box" data-part="eye"></div>
        <div class="box" data-part="nose"></div>
        <div class="box" data-part="arm"></div>
      </div>

      <!-- RIGHT -->
      <div class="rightCol">
        <div class="box" data-part="ear"></div>
        <div class="box" data-part="mouth"></div>
        <div class="box" data-part="leg"></div>
      </div>

    </div>
  </div>

  <!-- PARTS -->
  <div id="parts">
    <div class="part" data-name="eye"><img src="assets/eye.png"></div>
    <div class="part" data-name="ear"><img src="assets/ear.png"></div>
    <div class="part" data-name="nose"><img src="assets/nose.png"></div>
    <div class="part" data-name="mouth"><img src="assets/mouth.png"></div>
    <div class="part" data-name="arm"><img src="assets/arm.png"></div>
    <div class="part" data-name="leg"><img src="assets/leg.png"></div>
  </div>

</div>

<!-- CONGRATS -->
<div id="congrats">
  <h1>🎉 Congratulations!</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<script>

/* SPLASH */
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="flex";
},5000);

/* GAME LOGIC */
let selected=null;
let done=0;

document.querySelectorAll(".part").forEach(p=>{
  p.onclick=()=>{
    selected=p.dataset.name;
    document.querySelectorAll(".part").forEach(x=>x.classList.remove("selected"));
    p.classList.add("selected");
  }
});

document.querySelectorAll(".box").forEach(box=>{
  box.onclick=()=>{

    if(!selected) return;

    if(selected===box.dataset.part){
      box.style.background="lightgreen";
      box.innerHTML="✔";
      done++;

      selected=null;
      document.querySelectorAll(".part").forEach(x=>x.classList.remove("selected"));

      if(done===6){
        document.getElementById("game").style.display="none";
        document.getElementById("congrats").style.display="flex";
      }

    }
  }
});

</script>

</body>
</html>
