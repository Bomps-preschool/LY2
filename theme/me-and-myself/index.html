<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Body Parts Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Comic Sans MS;
}

body{
  background: linear-gradient(135deg,#f5f7ff,#ffeef5);
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#splash img{
  width:250px;
}

/* TOP INSTRUCTION */
#instruction{
  width:100%;
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
  background:#ffffffcc;
}

/* GAME AREA */
#game{
  display:none;
  width:100%;
  height:100vh;
  flex-direction:row;
}

/* LEFT SIDE BOY */
#boyArea{
  width:65%;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

#boy{
  width:380px;
}

/* BOXES OVER BOY (ALIGNED WITH ARROWS) */
.box{
  position:absolute;
  width:70px;
  height:70px;
  border:3px dashed #333;
  border-radius:10px;
  background:transparent;
}

/* 👇 Adjusted positions to match reference image */
#eyeBox{ top:110px; left:220px; }
#earBox{ top:130px; left:120px; }
#noseBox{ top:170px; left:190px; }
#mouthBox{ top:210px; left:190px; }
#handBox{ top:260px; left:90px; }
#legBox{ top:360px; left:200px; }

/* RIGHT SIDE PARTS */
#parts{
  width:35%;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  padding:20px;
  align-content:center;
  justify-items:center;
}

.part{
  width:110px;
  height:110px;
  background:#fff;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
  cursor:pointer;
  transition:0.2s;
}

.part img{
  width:75px;
}

.selected{
  border:4px solid #4CAF50;
  transform:scale(1.05);
}

/* CONGRATS */
#congrats{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#fff3e6,#e6fff5);
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

#congrats h1{
  font-size:60px;
}

button{
  margin-top:20px;
  padding:12px 25px;
  font-size:20px;
  border:none;
  background:#4CAF50;
  color:white;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- INSTRUCTION -->
<div id="instruction">
  Tap a body part and then tap the correct place on the boy
</div>

<!-- GAME -->
<div id="game">

  <!-- BOY SIDE -->
  <div id="boyArea">

    <img id="boy" src="assets/boy-body.png">

    <div class="box" id="eyeBox" data-part="eye"></div>
    <div class="box" id="earBox" data-part="ear"></div>
    <div class="box" id="noseBox" data-part="nose"></div>
    <div class="box" id="mouthBox" data-part="mouth"></div>
    <div class="box" id="handBox" data-part="hand"></div>
    <div class="box" id="legBox" data-part="leg"></div>

  </div>

  <!-- PARTS SIDE -->
  <div id="parts">
    <div class="part" data-name="eye"><img src="assets/eye.png"></div>
    <div class="part" data-name="ear"><img src="assets/ear.png"></div>
    <div class="part" data-name="nose"><img src="assets/nose.png"></div>
    <div class="part" data-name="mouth"><img src="assets/mouth.png"></div>
    <div class="part" data-name="hand"><img src="assets/arm.png"></div>
    <div class="part" data-name="leg"><img src="assets/leg.png"></div>
  </div>

</div>

<!-- CONGRATS -->
<div id="congrats">
  <h1>🎉 Congratulations!</h1>
  <button onclick="restart()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="flex";
},5000);

let selected=null;
let done=0;

document.querySelectorAll(".part").forEach(p=>{
  p.onclick=()=>{
    selected=p.dataset.name;
    document.querySelectorAll(".part").forEach(x=>x.classList.remove("selected"));
    p.classList.add("selected");
  }
});

document.querySelectorAll(".box").forEach(box=>{
  box.onclick=()=>{

    if(!selected) return;

    if(selected===box.dataset.part){
      document.getElementById("correct").play();
      box.style.background="lightgreen";
      box.innerHTML="✔";
      done++;

      selected=null;

      if(done===6){
        document.getElementById("game").style.display="none";
        document.getElementById("congrats").style.display="flex";
      }

    }else{
      document.getElementById("wrong").play();
    }
  }
});

function restart(){
  location.reload();
}

</script>

</body>
</html>
