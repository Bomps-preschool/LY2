<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Around Us</title>

<style>

/* 🌈 ANIMATED BACKGROUND */
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  background: linear-gradient(270deg,#dff6ff,#e8f9ff,#f0fff4);
  background-size:600% 600%;
  animation: bgFlow 12s ease infinite;
}

@keyframes bgFlow{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* SPLASH */
#splash{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* GAME */
#game{
  display:none;
  width:100vw;
  height:100vh;
  position:relative;
  text-align:center;
}

/* TITLE */
#topTitle{
  margin-top:12px;
  font-size:28px;
  font-weight:bold;
  color:#2e7d32;
}

#subTitle{
  font-size:16px;
  color:#444;
}

/* INSTRUCTION */
#instruction{
  margin-top:8px;
  font-size:20px;
  font-weight:bold;
  color:#ff4d6d;
}

/* 🖼️ IMAGE FIX (RESPONSIVE) */
#mainImage{
  margin-top:18px;
  width:90%;
  max-width:420px;
  max-height:55vh;
  object-fit:contain;
  border-radius:16px;
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
  transition:0.5s ease;
}

/* BUTTONS */
#btnRow{
  margin-top:18px;
  display:flex;
  justify-content:center;
  gap:50px;
}

.btn{
  width:90px;
  cursor:pointer;
  transition:0.2s;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
}

.btn:active{
  transform:scale(0.85);
}

/* TRY AGAIN */
#overlayMsg{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:38px;
  font-weight:bold;
  color:#ff3b3b;
  background:white;
  padding:20px 30px;
  border-radius:14px;
  display:none;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
  animation: pop 0.3s ease;
}

@keyframes pop{
  from{transform:translate(-50%,-50%) scale(0.5);opacity:0}
  to{transform:translate(-50%,-50%) scale(1);opacity:1}
}

/* 🏆 GOOD JOB SCREEN FIX (CENTERED) */
#end{
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:42px;
  font-weight:bold;
  color:#2e7d32;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

.star{
  font-size:50px;
  animation: float 2s infinite ease-in-out;
}

@keyframes float{
  0%{transform:translateY(0px)}
  50%{transform:translateY(-10px)}
  100%{transform:translateY(0px)}
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png" width="220">
</div>

<!-- GAME -->
<div id="game">

  <div id="topTitle">
    Safety Around Us<br>
    <span id="subTitle">
      Click ✔ if safe and ✖ if unsafe
    </span>
  </div>

  <div id="instruction">Loading...</div>

  <img id="mainImage" src="">

  <div id="btnRow">
    <img class="btn" src="assets/tick.png" onclick="answer('safe')">
    <img class="btn" src="assets/cross.png" onclick="answer('unsafe')">
  </div>

  <div id="overlayMsg">TRY AGAIN</div>

</div>

<!-- END SCREEN -->
<div id="end">
  <div class="star">⭐</div>
  GOOD JOB!
  <div class="star">⭐</div>
</div>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="block";
  loadGame();
},3000);

const data = [
  {img:"assets/child-crossing-road.png", ans:"safe", audio:"Crossing zebra crossing is safe or unsafe?"},
  {img:"assets/playing-with-fire.png", ans:"unsafe", audio:"Playing with fire is safe or unsafe?"},
  {img:"assets/putting-finger-in-the-plug.png", ans:"unsafe", audio:"Electric socket is safe or unsafe?"},
  {img:"assets/hurt-with-scissor.png", ans:"unsafe", audio:"Scissors are safe or unsafe?"},
  {img:"assets/wearing-seat-belt-in-car.png", ans:"safe", audio:"Seat belt is safe or unsafe?"},
  {img:"assets/climbing-on-the-ladder.png", ans:"unsafe", audio:"Climbing ladder is safe or unsafe?"}
];

let index=0;
let locked=false;

function speak(text){
  let msg=new SpeechSynthesisUtterance(text);
  msg.rate=0.9;
  window.speechSynthesis.speak(msg);
}

function loadGame(){

  if(index>=data.length){
    document.getElementById("game").style.display="none";
    document.getElementById("end").style.display="flex";
    return;
  }

  locked=false;

  let img=document.getElementById("mainImage");
  img.style.opacity=0;

  setTimeout(()=>{
    img.src=data[index].img;
    img.style.opacity=1;
  },200);

  document.getElementById("instruction").innerText=data[index].audio;

  speak(data[index].audio);
}

function answer(choice){

  if(locked) return;

  let correct=data[index].ans;

  if(choice===correct){

    document.getElementById("overlayMsg").style.display="none";
    speak("Correct");

    setTimeout(()=>{
      index++;
      loadGame();
    },1000);

  }else{

    locked=true;

    document.getElementById("overlayMsg").style.display="block";
    speak("Try again");

    setTimeout(()=>{
      document.getElementById("overlayMsg").style.display="none";
      locked=false;
    },3000);
  }
}

</script>

</body>
</html>
