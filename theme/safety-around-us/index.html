<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Around Us</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#dff6ff;
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* SCREEN COMMON */
.screen{
  width:100vw;
  height:100vh;
  position:absolute;
  display:none;
  flex-direction:column;
  align-items:center;
}

/* GAME TITLE */
#title{
  margin-top:20px;
  font-size:26px;
  font-weight:bold;
  color:#ff4d6d;
}

/* GRID */
.grid{
  margin-top:30px;
  width:95%;
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:15px;
}

/* CARD */
.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
  cursor:pointer;
  position:relative;
}

/* IMAGE */
.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

/* RESULT ICON */
.icon{
  position:absolute;
  top:5px;
  right:5px;
  width:35px;
  display:none;
}

/* BUTTONS (SAFE/UNSAFE FEEDBACK) */
.btnRow{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:15px;
}

.btn{
  padding:10px 18px;
  font-size:18px;
  font-weight:bold;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.safe{
  background:#4caf50;
  color:white;
}

.unsafe{
  background:#f44336;
  color:white;
}

/* END SCREEN */
#end{
  justify-content:center;
  font-size:30px;
  font-weight:bold;
  color:#2e7d32;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png" width="220">
</div>

<!-- GAME SCREEN -->
<div id="game" class="screen">

  <div id="title">Safety Around Us</div>

  <!-- GRID OF 6 IMAGES -->
  <div class="grid">

    <div class="card" data-answer="safe">
      <img src="assets/child-crossing-road.png">
      <img class="icon" src="assets/tick.png">
    </div>

    <div class="card" data-answer="unsafe">
      <img src="assets/playing-with-fire.png">
      <img class="icon" src="assets/cross.png">
    </div>

    <div class="card" data-answer="unsafe">
      <img src="assets/putting-finger-in-the-plug.png">
      <img class="icon" src="assets/cross.png">
    </div>

    <div class="card" data-answer="unsafe">
      <img src="assets/hurt-with-scissor.png">
      <img class="icon" src="assets/cross.png">
    </div>

    <div class="card" data-answer="safe">
      <img src="assets/wearing-seat-belt-in-car.png">
      <img class="icon" src="assets/tick.png">
    </div>

    <div class="card" data-answer="unsafe">
      <img src="assets/climbing-on-the-ladder.png">
      <img class="icon" src="assets/cross.png">
    </div>

  </div>

</div>

<!-- END SCREEN -->
<div id="end" class="screen">
  🎉 Great Job! 🎉
</div>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="flex";
},3000);

const correct = new Audio("assets/correct.mp3");
const wrong = new Audio("assets/wrong.mp3");

let score=0;

document.querySelectorAll(".card").forEach(card=>{
  card.onclick=()=>{

    let answer=card.getAttribute("data-answer");
    let icon=card.querySelector(".icon");

    icon.style.display="block";

    if(answer==="safe"){
      correct.play();
      card.style.border="3px solid green";
      score++;
    } else {
      wrong.play();
      card.style.border="3px solid red";
    }

    checkEnd();
  }
});

function checkEnd(){
  let all=document.querySelectorAll(".card");
  let done=true;

  all.forEach(c=>{
    if(c.querySelector(".icon").style.display==="none"){
      done=false;
    }
  });

  setTimeout(()=>{
    document.getElementById("game").style.display="none";
    document.getElementById("end").style.display="flex";
  },1500);
}

</script>

</body>
</html>
