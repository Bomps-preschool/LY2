<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Around Us</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#dff6ff;
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* GAME */
#game{
  display:none;
  width:100vw;
  height:100vh;
  position:relative;
  text-align:center;
}

/* ⭐ TITLE */
#topTitle{
  margin-top:15px;
  font-size:28px;
  font-weight:bold;
  color:#2e7d32;
  line-height:1.3;
}

/* ⭐ NEW SUB INSTRUCTION */
#subTitle{
  font-size:18px;
  font-weight:normal;
  color:#333;
  display:block;
  margin-top:5px;
}

/* INSTRUCTION */
#instruction{
  margin-top:10px;
  font-size:22px;
  font-weight:bold;
  color:#ff4d6d;
  padding:0 10px;
}

/* IMAGE */
#mainImage{
  margin-top:30px;
  width:70%;
  max-width:450px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* BUTTONS */
#btnRow{
  margin-top:25px;
  display:flex;
  justify-content:center;
  gap:40px;
}

.btn{
  width:90px;
  cursor:pointer;
  transition:0.2s;
}

.btn:active{
  transform:scale(0.9);
}

/* TRY AGAIN */
#overlayMsg{
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:34px;
  font-weight:bold;
  color:#ff3b3b;
  display:none;
  background:white;
  padding:20px 30px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* END */
#end{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
  font-size:32px;
  font-weight:bold;
  color:#2e7d32;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png" width="220">
</div>

<!-- GAME -->
<div id="game">

  <!-- TITLE + NEW INSTRUCTION -->
  <div id="topTitle">
    Safety Around Us<br>

    <!-- ✔ ✖ instruction added as requested -->
    <span id="subTitle">
      Click on ✔ if the action is safe and click on ✖ if the action is unsafe
    </span>
  </div>

  <div id="instruction">Loading...</div>

  <img id="mainImage" src="">

  <div id="btnRow">
    <img class="btn" src="assets/tick.png" onclick="answer('safe')">
    <img class="btn" src="assets/cross.png" onclick="answer('unsafe')">
  </div>

  <div id="overlayMsg">TRY AGAIN</div>

</div>

<!-- END -->
<div id="end">
  🎉 Great Job! 🎉
</div>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="block";
  loadGame();
},3000);

/* GAME DATA */
const data = [
  {
    img:"assets/child-crossing-road.png",
    ans:"safe",
    audio:"Crossing the road using zebra crossing is safe or unsafe?"
  },
  {
    img:"assets/playing-with-fire.png",
    ans:"unsafe",
    audio:"Playing with fire is safe or unsafe?"
  },
  {
    img:"assets/putting-finger-in-the-plug.png",
    ans:"unsafe",
    audio:"Putting fingers in electric socket is safe or unsafe?"
  },
  {
    img:"assets/hurt-with-scissor.png",
    ans:"unsafe",
    audio:"Playing with scissors is safe or unsafe?"
  },
  {
    img:"assets/wearing-seat-belt-in-car.png",
    ans:"safe",
    audio:"Wearing seat belt in car is safe or unsafe?"
  },
  {
    img:"assets/climbing-on-the-ladder.png",
    ans:"unsafe",
    audio:"Climbing on unstable ladder is safe or unsafe?"
  }
];

let index=0;
let locked=false;

/* SPEECH */
function speak(text){
  let msg=new SpeechSynthesisUtterance(text);
  msg.rate=0.9;
  window.speechSynthesis.speak(msg);
}

/* LOAD GAME */
function loadGame(){

  if(index>=data.length){
    document.getElementById("game").style.display="none";
    document.getElementById("end").style.display="flex";
    return;
  }

  locked=false;

  document.getElementById("mainImage").src=data[index].img;
  document.getElementById("instruction").innerText=data[index].audio;

  speak(data[index].audio);
}

/* ANSWER LOGIC */
function answer(choice){

  if(locked) return;

  let correct=data[index].ans;

  if(choice===correct){

    document.getElementById("overlayMsg").style.display="none";
    speak("Correct");

    setTimeout(()=>{
      index++;
      loadGame();
    },1000);

  }else{

    locked=true;

    document.getElementById("overlayMsg").style.display="block";
    speak("Try again");

    setTimeout(()=>{
      document.getElementById("overlayMsg").style.display="none";
      locked=false;
    },3000);
  }
}

</script>

</body>
</html>
