<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Around Us</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#dff6ff;
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* GAME */
#game{
  display:none;
  width:100vw;
  height:100vh;
  position:relative;
  text-align:center;
}

/* INSTRUCTION */
#instruction{
  margin-top:20px;
  font-size:26px;
  font-weight:bold;
  color:#ff4d6d;
}

/* IMAGE */
#mainImage{
  margin-top:30px;
  width:70%;
  max-width:450px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* BUTTONS */
#btnRow{
  margin-top:25px;
  display:flex;
  justify-content:center;
  gap:40px;
}

.btn{
  width:90px;
  cursor:pointer;
  transition:0.2s;
}

.btn:active{
  transform:scale(0.9);
}

/* RESULT TEXT */
#result{
  margin-top:20px;
  font-size:22px;
  font-weight:bold;
}

/* END */
#end{
  display:none;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
  font-size:32px;
  font-weight:bold;
  color:#2e7d32;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png" width="220">
</div>

<!-- GAME -->
<div id="game">

  <div id="instruction">Is this safe or unsafe?</div>

  <img id="mainImage" src="">

  <div id="btnRow">
    <img class="btn" src="assets/tick.png" onclick="answer('safe')">
    <img class="btn" src="assets/cross.png" onclick="answer('unsafe')">
  </div>

  <div id="result"></div>

</div>

<!-- END -->
<div id="end">
  🎉 Great Job! 🎉
</div>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="block";
  loadGame();
},3000);

/* IMAGES + ANSWERS */
const data = [
  {img:"assets/child-crossing-road.png", ans:"safe"},
  {img:"assets/playing-with-fire.png", ans:"unsafe"},
  {img:"assets/putting-finger-in-the-plug.png", ans:"unsafe"},
  {img:"assets/hurt-with-scissor.png", ans:"unsafe"},
  {img:"assets/wearing-seat-belt-in-car.png", ans:"safe"},
  {img:"assets/climbing-on-the-ladder.png", ans:"unsafe"}
];

let index=0;
let score=0;

function loadGame(){

  if(index>=data.length){
    document.getElementById("game").style.display="none";
    document.getElementById("end").style.display="flex";
    return;
  }

  document.getElementById("mainImage").src=data[index].img;
  document.getElementById("result").innerText="";
}

const correct = new Audio("assets/correct.mp3");
const wrong = new Audio("assets/wrong.mp3");

function answer(choice){

  let correctAns=data[index].ans;

  if(choice===correctAns){
    correct.play();
    document.getElementById("result").innerText="✔ Correct!";
    document.getElementById("result").style.color="green";
    score++;
  }else{
    wrong.play();
    document.getElementById("result").innerText="✖ Try Again!";
    document.getElementById("result").style.color="red";
  }

  setTimeout(()=>{
    index++;
    loadGame();
  },1200);
}

</script>

</body>
</html>
