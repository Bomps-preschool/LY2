<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Where Does It Go? - Transportation Game</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}
  html,body{width:100%;height:100%;overflow:hidden;background:#e0f7fa;}
  .screen{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100vh;}
  .screen.active{display:flex;}
  button{cursor:pointer;font:inherit;border:none;}
  img{user-drag:none;-webkit-user-drag:none;pointer-events:none;}
  /* Splash */
  #splashScreen{background:#fff;gap:20px;}
  #splashScreen h1{font-size:2.2rem;color:#0277bd;}
  /* Start */
  #startScreen{gap:18px;}
  #startScreen .primary-btn{padding:14px 26px;background:#ffca28;color:#000;font-weight:bold;border-radius:12px;font-size:1.2rem;}
  /* Game */
  #gameScreen{flex-direction:column;width:100%;height:100%;}
  .topbar{display:flex;justify-content:space-between;align-items:center;width:100%;padding:10px;background:#0277bd;color:#fff;font-weight:bold;}
  .game-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;padding:10px;}
  .vehicle{width:120px;max-width:30%;transition:all 0.7s;}
  .zones{display:flex;justify-content:space-around;width:100%;max-width:600px;gap:10px;}
  .zone{width:90px;height:90px;border-radius:15px;background:#fff3e0;display:flex;align-items:center;justify-content:center;font-size:2.5rem;box-shadow:0 4px 8px rgba(0,0,0,0.2);}
  .zone.correct{background:#c8e6c9;}
  .zone.wrong{background:#ffcdd2;}
  #feedback{position:absolute;top:10%;font-weight:bold;font-size:1.4rem;color:#fff;padding:6px 12px;border-radius:12px;display:none;}
  /* End */
  #endScreen{background:#e0f7fa;gap:15px;text-align:center;}
  #endScreen .primary-btn{padding:12px 24px;background:#ffca28;color:#000;font-weight:bold;border-radius:12px;font-size:1.2rem;}
</style>
</head>
<body>

<!-- SPLASH -->
<section id="splashScreen" class="screen active">
  <h1>Where Does It Go?</h1>
  <p>Learning Air, Water, and Road Transport!</p>
</section>

<!-- START -->
<section id="startScreen" class="screen">
  <h1>Let's Start!</h1>
  <button id="startBtn" class="primary-btn">Start Game</button>
</section>

<!-- GAME -->
<section id="gameScreen" class="screen">
  <div class="topbar">
    <div id="round">Round 1/9</div>
    <div id="score">⭐ 0</div>
  </div>
  <div class="game-main">
    <img id="vehicleImg" class="vehicle" src="" alt="Vehicle">
    <div id="questionText" style="font-weight:bold;font-size:1.4rem;text-align:center;"></div>
    <div class="zones">
      <div class="zone" id="zone-air">✈️</div>
      <div class="zone" id="zone-water">🛳️</div>
      <div class="zone" id="zone-road">🚗</div>
    </div>
  </div>
  <div id="feedback"></div>
</section>

<!-- END -->
<section id="endScreen" class="screen">
  <h1>Well Done!</h1>
  <p id="finalScoreEnd"></p>
  <button id="playAgainBtn" class="primary-btn">Play Again</button>
</section>

<!-- Audio -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>
const VEHICLES = [
  {name:"Airplane",type:"air",image:"assets/airplane.png"},
  {name:"Helicopter",type:"air",image:"assets/helicopter.png"},
  {name:"Boat",type:"water",image:"assets/boat.png"},
  {name:"Ship",type:"water",image:"assets/ship.png"},
  {name:"Car",type:"road",image:"assets/car.png"},
  {name:"Bus",type:"road",image:"assets/bus.png"},
];

let questions = [];
VEHICLES.forEach(v=>{
  questions.push({vehicle:v,answer:v.type});
});
questions = questions.sort(()=>Math.random()-0.5);

let current=0;
let score=0;

const splash = document.getElementById("splashScreen");
const startScreen = document.getElementById("startScreen");
const gameScreen = document.getElementById("gameScreen");
const endScreen = document.getElementById("endScreen");
const startBtn = document.getElementById("startBtn");
const playAgainBtn = document.getElementById("playAgainBtn");
const vehicleImg = document.getElementById("vehicleImg");
const questionText = document.getElementById("questionText");
const zones = {air:document.getElementById("zone-air"),water:document.getElementById("zone-water"),road:document.getElementById("zone-road")};
const feedback = document.getElementById("feedback");
const roundText = document.getElementById("round");
const scoreText = document.getElementById("score");
const finalScoreEnd = document.getElementById("finalScoreEnd");
const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

function showScreen(s){[splash,startScreen,gameScreen,endScreen].forEach(sc=>sc.classList.remove("active"));s.classList.add("active");}

startBtn.addEventListener("click",()=>{startGame();});
playAgainBtn.addEventListener("click",()=>{startGame();});

function startGame(){
  current=0;
  score=0;
  updateScore();
  showScreen(gameScreen);
  nextQuestion();
}

function updateScore(){scoreText.textContent="⭐ "+score;}
function updateRound(){roundText.textContent="Round "+(current+1)+"/"+questions.length;}

function nextQuestion(){
  feedback.style.display="none";
  let q = questions[current];
  vehicleImg.src = q.vehicle.image;
  questionText.textContent = `Where does the ${q.vehicle.name} go?`;
  updateRound();
  Object.values(zones).forEach(z=>{z.classList.remove("correct","wrong");});
}

Object.values(zones).forEach(z=>{
  z.addEventListener("click",()=>{
    let q = questions[current];
    if(z.id.split("-")[1]===q.answer){
      score++;updateScore();
      z.classList.add("correct");
      correctSound.play();
      feedback.style.display="block";feedback.textContent="Correct!";
      setTimeout(()=>{current++;if(current>=questions.length){endGame();}else{nextQuestion();}},1200);
    }else{
      z.classList.add("wrong");
      wrongSound.play();
      feedback.style.display="block";feedback.textContent="Try Again!";
    }
  });
});

function endGame(){
  showScreen(endScreen);
  finalScoreEnd.textContent="Your Score: "+score+"/"+questions.length;
}

// Optional: Splash auto to start
setTimeout(()=>{showScreen(startScreen);},3000);
</script>
</body>
</html>
