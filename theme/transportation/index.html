<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Sorting Game</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    font-family: 'Arial', sans-serif;
    background-color: #d0f0f7;
    overflow: hidden;
  }
  .slide {
    width: 100%;
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    position: relative;
  }
  .active { display: flex; }
  #logo-slide img {
    max-width: 50%;
  }
  #instruction {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: #ffffb3;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 1.2em;
    text-align: center;
  }
  #game-slide {
    flex-direction: column;
  }
  #background {
    width: 90%;
    max-width: 1200px;
    height: auto;
  }
  #vehicles {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 15px;
    gap: 10px;
  }
  .vehicle-box {
    background: #ffffff;
    padding: 10px;
    border-radius: 15px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .vehicle-box img {
    max-width: 80px;
    height: auto;
  }
  .vehicle-box:active { transform: scale(1.1); }
  #good-job {
    font-size: 2em;
    text-align: center;
  }
  #play-again {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 1.2em;
    border: none;
    border-radius: 10px;
    background: #ffeb3b;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- Logo Slide -->
<div class="slide active" id="logo-slide">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Slide -->
<div class="slide" id="game-slide">
  <div id="instruction">Tap a vehicle, then tap the correct transport zone</div>
  <img src="assets/background.png" id="background" alt="Transport Zones">
  <div id="vehicles">
    <div class="vehicle-box" data-type="air"><img src="assets/airplane.png" alt="Airplane"></div>
    <div class="vehicle-box" data-type="air"><img src="assets/helicopter.png" alt="Helicopter"></div>
    <div class="vehicle-box" data-type="road"><img src="assets/car.png" alt="Car"></div>
    <div class="vehicle-box" data-type="road"><img src="assets/bus.png" alt="Bus"></div>
    <div class="vehicle-box" data-type="road"><img src="assets/truck.png" alt="Truck"></div>
    <div class="vehicle-box" data-type="water"><img src="assets/boat.png" alt="Boat"></div>
    <div class="vehicle-box" data-type="water"><img src="assets/ship.png" alt="Ship"></div>
  </div>
</div>

<!-- Good Job Slide -->
<div class="slide" id="end-slide">
  <div id="good-job">Good Job!</div>
  <button id="play-again">Play Again</button>
</div>

<audio id="correct-sound" src="assets/correct.mp3"></audio>
<audio id="wrong-sound" src="assets/wrong.mp3"></audio>
<audio id="excellent-sound" src="assets/excellent.mp3"></audio>
<audio id="clap-sound" src="assets/claps.mp3"></audio>

<script>
let currentVehicle = null;
const logoSlide = document.getElementById('logo-slide');
const gameSlide = document.getElementById('game-slide');
const endSlide = document.getElementById('end-slide');
const vehicles = document.querySelectorAll('.vehicle-box');
const correctSound = document.getElementById('correct-sound');
const wrongSound = document.getElementById('wrong-sound');
const excellentSound = document.getElementById('excellent-sound');
const clapSound = document.getElementById('clap-sound');

const zones = {
  air: { top: 10, left: 50, width: 400, height: 150 },
  road: { top: 160, left: 50, width: 400, height: 150 },
  water: { top: 310, left: 50, width: 400, height: 150 }
};

// Show logo for 5 seconds
setTimeout(() => {
  logoSlide.classList.remove('active');
  gameSlide.classList.add('active');
}, 5000);

// Vehicle selection
vehicles.forEach(vehicle => {
  vehicle.addEventListener('click', () => {
    currentVehicle = vehicle;
  });
});

// Tap on background to drop vehicle
gameSlide.addEventListener('click', e => {
  if(!currentVehicle) return;

  const rect = gameSlide.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const type = currentVehicle.getAttribute('data-type');
  const zone = zones[type];

  if(x > zone.left && x < zone.left + zone.width &&
     y > zone.top && y < zone.top + zone.height) {

    // Move vehicle
    currentVehicle.style.position = 'absolute';
    currentVehicle.style.left = `${zone.left + 20}px`;
    currentVehicle.style.top = `${zone.top + 20}px`;

    clapSound.play();
    clapSound.onended = () => {
      correctSound.play();
      // Check if all vehicles placed
      if([...vehicles].every(v => v.style.position === 'absolute')) {
        setTimeout(() => {
          gameSlide.classList.remove('active');
          endSlide.classList.add('active');
        }, 1000);
      }
    }

  } else {
    wrongSound.play();
  }

  currentVehicle = null;
});

// Play again
document.getElementById('play-again').addEventListener('click', () => {
  endSlide.classList.remove('active');
  gameSlide.classList.add('active');
  vehicles.forEach(v => {
    v.style.position = '';
    v.style.left = '';
    v.style.top = '';
  });
});
</script>

</body>
</html>
