<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Sorting Game</title>
<style>
body {
  margin: 0;
  font-family: 'Arbutus', cursive;
  background: #b2e0ff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
#splash, #game, #endScreen {
  width: 100%;
  height: 100vh;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#splash img { width: 200px; height: auto; }
#instructionBox {
  position: absolute;
  top: 10px;
  background-color: #fff9a1;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 1.2em;
  text-align: center;
  z-index: 10;
}
/* Adjusted background size */
#backgroundContainer {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  max-width: 900px;  /* slightly smaller width */
  width: 90%;
  height: 90%;       /* slightly smaller height */
  background: url('assets/background.png') no-repeat center center;
  background-size: contain;
}
#vehicleTray {
  position: absolute;
  bottom: 20px;
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  justify-content: center;
  z-index: 20;
}
.vehicle {
  width: 80px;
  height: 80px;
  background: white;
  border-radius: 10px;
  padding: 5px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}
.vehicle img {
  width: 70px;
  height: 70px;
}
.zone {
  position: absolute;
}
#airZone { top: 30px; left: 20px; width: 300px; height: 300px; }
#roadZone { top: 30px; left: 360px; width: 300px; height: 300px; }
#waterZone { top: 30px; left: 670px; width: 300px; height: 300px; }

#endScreen {
  background: #fff3b0;
  color: #000;
  font-size: 2em;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
#endScreen button {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 1.2em;
  border: none;
  border-radius: 10px;
  background: #ffd93d;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Screen -->
<div id="game">
  <div id="instructionBox">Tap a vehicle, then tap the correct transport zone</div>
  <!-- Zones -->
  <div id="airZone" class="zone"></div>
  <div id="roadZone" class="zone"></div>
  <div id="waterZone" class="zone"></div>

  <!-- Vehicles Tray -->
  <div id="vehicleTray">
    <div class="vehicle" data-type="air" id="airplane"><img src="assets/airplane.png" alt="Airplane"></div>
    <div class="vehicle" data-type="water" id="boat"><img src="assets/boat.png" alt="Boat"></div>
    <div class="vehicle" data-type="road" id="car"><img src="assets/car.png" alt="Car"></div>
    <div class="vehicle" data-type="air" id="helicopter"><img src="assets/helicopter.png" alt="Helicopter"></div>
    <div class="vehicle" data-type="road" id="bus"><img src="assets/bus.png" alt="Bus"></div>
    <div class="vehicle" data-type="water" id="ship"><img src="assets/ship.png" alt="Ship"></div>
    <div class="vehicle" data-type="road" id="truck"><img src="assets/truck.png" alt="Truck"></div>
  </div>
</div>

<!-- End Screen -->
<div id="endScreen">
  <div>Good Job!</div>
  <button id="playAgain">Play Again</button>
</div>

<audio id="rightSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>

<script>
let selectedVehicle = null;
let zones = { air: document.getElementById('airZone'), road: document.getElementById('roadZone'), water: document.getElementById('waterZone') };
let vehicles = document.querySelectorAll('.vehicle');
let game = document.getElementById('game');
let splash = document.getElementById('splash');
let endScreen = document.getElementById('endScreen');
let playAgainBtn = document.getElementById('playAgain');
let correctSound = document.getElementById('rightSound');
let wrongSound = document.getElementById('wrongSound');
let clapSound = document.getElementById('clap');
let placedCount = { air:0, road:0, water:0 };

// Splash Screen for 5s
splash.style.display = 'flex';
setTimeout(() => {
  splash.style.display = 'none';
  game.style.display = 'flex';
}, 5000);

// Vehicle click
vehicles.forEach(v => {
  v.addEventListener('click', () => {
    selectedVehicle = v;
    vehicles.forEach(ve => ve.style.opacity = '0.5');
    v.style.opacity = '1';
  });
});

// Zone click logic
Object.entries(zones).forEach(([zoneName, zone]) => {
  zone.addEventListener('click', () => {
    if (!selectedVehicle) return;
    const vehicleName = selectedVehicle.dataset.vehicle;
    const correctZone = (vehicleName === 'airplane' || vehicleName === 'helicopter') ? 'air'
                         : (vehicleName === 'car' || vehicleName === 'bus' || vehicleName === 'truck') ? 'road'
                         : 'water';

    if (zoneName === correctZone) {
      // Place the vehicle in the zone vertically
      const clone = selectedVehicle.cloneNode(true);
      clone.style.position = 'absolute';
      clone.style.left = '10px';
      clone.style.top = (10 + placedCount[zoneName]*90) + 'px';
      zone.appendChild(clone);
      placedCount[zoneName]++;
      correctSound.play();
      clapSound.play();
      selectedVehicle.remove();
      selectedVehicle = null;
      vehicles.forEach(ve => ve.style.opacity = '1');

      const totalPlaced = placedCount.air + placedCount.road + placedCount.water;
      if (totalPlaced === 7) {
        setTimeout(() => {
          game.style.display = 'none';
          endScreen.style.display = 'flex';
        }, 500);
      }
    } else {
      wrongSound.play();
      selectedVehicle = null;
      vehicles.forEach(ve => ve.style.opacity = '1');
    }
  });
});

// Play Again logic
playAgainBtn.addEventListener('click', () => {
  endScreen.style.display = 'none';
  game.style.display = 'flex';
  Object.keys(zones).forEach(z => {
    zones[z].innerHTML = '';
  });
  document.querySelectorAll('#vehicleTray .vehicle').forEach(v => {
    v.style.display = 'flex';
  });
  placedCount = { air:0, road:0, water:0 };
  selectedVehicle = null;
});
</script>
</body>
</html>
