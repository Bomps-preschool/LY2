<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Game – LY2</title>
<style>
body {
  margin: 0;
  font-family: 'Arbutus', cursive;
  background: #b2e0ff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}
#splash, #game, #endScreen {
  display: none;
  width: 100%;
  height: 100vh;
  position: absolute;
  top: 0;
  left: 0;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  max-height: 100vh;
  overflow: hidden;
}
#logoScreen img, #splash img {
  width: 35vw;
  max-width: 300px;
  height: auto;
}
#instructionBox {
  position: absolute;
  top: 1vh;
  width: 95%;
  background-color: #fff9a1;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: clamp(14px,2.5vw,20px);
  text-align: center;
  z-index: 10;
}
#backgroundContainer {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  max-width: 1000px;
  width: 80%;
  height: 70vh;
  max-height: 80vh;
  background: url('assets/background.png') no-repeat center center;
  background-size: cover;
}
#vehicleTray {
  position: relative;
  bottom: auto;
  left: auto;
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 1vh;
  z-index: 20;
}
.vehicle {
  width: clamp(50px, 10vw, 80px);
  height: clamp(50px, 10vw, 80px);
  background: white;
  border-radius: 10px;
  padding: 5px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}
.vehicle img {
  width: 100%;
  height: 100%;
}
.zone {
  position: absolute;
  width: clamp(150px, 20vw, 300px);
  height: clamp(150px, 20vw, 300px);
}
#airZone div, #roadZone div, #waterZone div {
  position: absolute;
  top: -20px;
  font-size: 1.5em;
  font-weight: bold;
  color: #003366;
}
#airZone div { left: 40px; }
#roadZone div { left: 50px; }
#waterZone div { left: 65px; }

#endScreen {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #fff3b0;
  color: #000;
  font-size: 2em;
  text-align: center;
  height: 100vh;
}
#endScreen button {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 1.2em;
  border: none;
  border-radius: 10px;
  background: #ffd93d;
  cursor: pointer;
}

/* Confetti */
.confetti {
  position: absolute;
  width: 3vw;
  height: 3vw;
  max-width: 20px;
  max-height: 20px;
  background-size: contain;
  z-index: 20;
  animation: fall linear infinite;
}
@keyframes fall {
  0% { transform: translate(0,0) rotate(0deg); opacity:1; }
  100% { transform: translate(var(--x,0vw),100vh) rotate(360deg); opacity:0; }
}
</style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Screen -->
<div id="game">
  <div id="instructionBox">Tap a vehicle, then tap the correct transport zone</div>
  <div id="backgroundContainer">
    
    <!-- Zones with labels -->
    <div class="zone" id="airZone">
      <div>Air Transport</div>
    </div>
    <div class="zone" id="roadZone">
      <div>Road Transport</div>
    </div>
    <div class="zone" id="waterZone">
      <div>Water Transport</div>
    </div>

    <div id="vehicleTray">
      <div class="vehicle" data-vehicle="airplane"><img src="assets/airplane.png"></div>
      <div class="vehicle" data-vehicle="boat"><img src="assets/boat.png"></div>
      <div class="vehicle" data-vehicle="car"><img src="assets/car.png"></div>
      <div class="vehicle" data-vehicle="helicopter"><img src="assets/helicopter.png"></div>
      <div class="vehicle" data-vehicle="bus"><img src="assets/bus.png"></div>
      <div class="vehicle" data-vehicle="ship"><img src="assets/ship.png"></div>
      <div class="vehicle" data-vehicle="truck"><img src="assets/truck.png"></div>
    </div>
  </div>
</div>

<!-- End Screen -->
<div id="endScreen">
  <div>Good Job!</div>
  <button id="playAgain">Play Again</button>
</div>

<audio id="rightSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>

<script>
const splash = document.getElementById('splash');
const game = document.getElementById('game');
const endScreen = document.getElementById('endScreen');
const vehicles = document.querySelectorAll('.vehicle');
const zones = {
  air: document.getElementById('airZone'),
  road: document.getElementById('roadZone'),
  water: document.getElementById('waterZone')
};
const rightSound = document.getElementById('rightSound');
const wrongSound = document.getElementById('wrongSound');
const clapSound = document.getElementById('clapSound');

let selectedVehicle = null;
let placedVehicles = { air: [], road: [], water: [] };

// Show splash first
splash.style.display = 'flex';
setTimeout(() => {
  splash.style.display = 'none';
  game.style.display = 'flex';
}, 5000);

// Vehicle click
vehicles.forEach(v => {
  v.addEventListener('click', () => {
    selectedVehicle = v;
    vehicles.forEach(ve => ve.style.opacity = '0.5');
    v.style.opacity = '1';
  });
});

// Zone click
Object.entries(zones).forEach(([zoneName, zone]) => {
  zone.addEventListener('click', () => {
    if (!selectedVehicle) return;
    const vehicleName = selectedVehicle.dataset.vehicle;
    const correctZone = (vehicleName === 'airplane' || vehicleName === 'helicopter') ? 'air'
                         : (vehicleName === 'car' || vehicleName === 'bus' || vehicleName === 'truck') ? 'road'
                         : 'water';

    if (zoneName === correctZone) {
      // Place the vehicle in the zone
      const clone = selectedVehicle.cloneNode(true);
      clone.style.position = 'absolute';
      clone.style.top = (20 + placedVehicles[zoneName].length * 90) + 'px';
      clone.style.left = '20px';
      zone.appendChild(clone);

      rightSound.play();
      clapSound.play();

      // Remove original vehicle from tray
      selectedVehicle.remove();
      selectedVehicle = null;
      vehicles.forEach(ve => ve.style.opacity = '1');

      // Track placed vehicles
      placedVehicles[zoneName].push(clone);

      // Check if all vehicles placed
      const totalPlaced = placedVehicles.air.length + placedVehicles.road.length + placedVehicles.water.length;
      if (totalPlaced === 7) {
        setTimeout(() => {
          game.style.display = 'none';
          endScreen.style.display = 'flex';
        }, 500);
      }

    } else {
      // Play wrong sound
      wrongSound.play();
      selectedVehicle = null;
      vehicles.forEach(ve => ve.style.opacity = '1');
    }
  });
});

document.getElementById('playAgain').addEventListener('click', () => {
  endScreen.style.display = 'none';
  game.style.display = 'flex';
  Object.keys(zones).forEach(z => {
    zones[z].innerHTML = `<div style="position:absolute; top:5px; left:5px; font-size:1.5em; font-weight:bold; color:#003366;">${z.charAt(0).toUpperCase() + z.slice(1)} Transport</div>`;
  });
  document.querySelectorAll('#vehicleTray .vehicle').forEach(v => { v.style.display = 'flex'; });
  vehicles.forEach(v => { document.getElementById('vehicleTray').appendChild(v); v.style.opacity='1'; });
  placedVehicles = { air: [], road: [], water: [] };
  selectedVehicle = null;
});
</script>
</body>
</html>
