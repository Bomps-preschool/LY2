<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Game</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    font-family: 'Arial Rounded MT Bold', sans-serif;
    overflow-x: hidden;
  }
  #logoScreen, #gameScreen, #endScreen {
    width: 100%;
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  #logoScreen img {
    width: 300px;
  }

  /* Updated game screen with background */
  #gameScreen {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    position: relative;
    overflow: hidden;
    background: url('assets/background.png') no-repeat center top;
    background-size: cover;
  }

  #instruction {
    font-size: 2em;
    margin-top: 10px;
    text-align: center;
  }

  .zone {
    width: 100%;
    text-align: center;
    position: relative;
    margin-bottom: 5px;
  }
  .zone h2 {
    margin: 5px 0;
    font-size: 1.8em;
    color: black;
  }
  .drop-container {
    width: 100%;
    min-height: 100px;
    position: relative;
    display: flex;
    justify-content: space-evenly;
    align-items: center;
  }
  #vehicleTray {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
  }
  .vehicle {
    width: 80px;
    cursor: grab;
  }

  #endScreen {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background-color: #c1f0c1;
  }
  #endScreen h1 {
    font-size: 3em;
    margin-bottom: 20px;
  }
  #playAgain {
    padding: 15px 30px;
    font-size: 1.5em;
    background-color: yellow;
    border: none;
    cursor: pointer;
    border-radius: 10px;
  }
</style>
</head>
<body>

<!-- Logo Screen -->
<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Screen -->
<div id="gameScreen">
  <div id="instruction">Drag the vehicle to the correct transport zone</div>

  <!-- Zones with drop containers -->
  <div class="zone" id="airZone">
    <h2>Air Transport</h2>
    <div class="drop-container" id="airDrop"></div>
  </div>
  <div class="zone" id="roadZone">
    <h2>Road Transport</h2>
    <div class="drop-container" id="roadDrop"></div>
  </div>
  <div class="zone" id="waterZone">
    <h2>Water Transport</h2>
    <div class="drop-container" id="waterDrop"></div>
  </div>

  <div id="vehicleTray">
    <img src="assets/airplane.png" id="airplane" class="vehicle" draggable="true">
    <img src="assets/helicopter.png" id="helicopter" class="vehicle" draggable="true">
    <img src="assets/car.png" id="car" class="vehicle" draggable="true">
    <img src="assets/bus.png" id="bus" class="vehicle" draggable="true">
    <img src="assets/truck.png" id="truck" class="vehicle" draggable="true">
    <img src="assets/boat.png" id="boat" class="vehicle" draggable="true">
    <img src="assets/ship.png" id="ship" class="vehicle" draggable="true">
  </div>
</div>

<!-- End Screen -->
<div id="endScreen">
  <h1>Good Job!</h1>
  <button id="playAgain">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="excellentSound" src="assets/excellent.mp3"></audio>

<script>
const logoScreen = document.getElementById('logoScreen');
const gameScreen = document.getElementById('gameScreen');
const endScreen = document.getElementById('endScreen');
const playAgain = document.getElementById('playAgain');

const correctSound = document.getElementById('correctSound');
const wrongSound = document.getElementById('wrongSound');
const excellentSound = document.getElementById('excellentSound');

const dropContainers = {
  airplane: document.getElementById('airDrop'),
  helicopter: document.getElementById('airDrop'),
  car: document.getElementById('roadDrop'),
  bus: document.getElementById('roadDrop'),
  truck: document.getElementById('roadDrop'),
  boat: document.getElementById('waterDrop'),
  ship: document.getElementById('waterDrop')
};

let correctCount = 0;
const totalVehicles = Object.keys(dropContainers).length;

// Show logo first
logoScreen.style.display = 'flex';
setTimeout(() => {
  logoScreen.style.display = 'none';
  gameScreen.style.display = 'flex';
}, 5000);

// Drag & Drop
document.querySelectorAll('.vehicle').forEach(vehicle => {
  vehicle.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text', vehicle.id);
  });
});

Object.keys(dropContainers).forEach(id => {
  const container = dropContainers[id];
  container.addEventListener('dragover', e => e.preventDefault());
  container.addEventListener('drop', e => {
    e.preventDefault();
    const vehicleId = e.dataTransfer.getData('text');
    if(vehicleId === id){
      const vehicle = document.getElementById(vehicleId);
      vehicle.draggable = false;
      vehicle.style.width = '70px';
      vehicle.style.cursor = 'default';
      container.appendChild(vehicle);
      correctSound.play();
      excellentSound.play();
      correctCount++;
      if(correctCount === totalVehicles){
        gameScreen.style.display = 'none';
        endScreen.style.display = 'flex';
      }
    } else {
      wrongSound.play();
    }
  });
});

playAgain.addEventListener('click', () => location.reload());
</script>

</body>
</html>
