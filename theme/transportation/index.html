<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Game</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    font-family: 'Comic Sans MS', cursive;
    overflow-x: hidden;
    background-color: #cce7ff;
}

#logoSlide, #gameSlide, #congratsSlide {
    width: 100%;
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#logoSlide img { width: 300px; }

#gameSlide {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px;
}

#vehicles {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 30%;
}

#vehicles img {
    width: 120px;
    cursor: grab;
}

#zones {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 65%;
    background-image: url('assets/background-zones.png');
    background-size: cover;
    background-position: center;
    border-radius: 15px;
    padding: 20px;
}

.zone {
    border: 2px dashed #0077b6;
    height: 150px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 1.5rem;
    border-radius: 10px;
    color: #000;
    background-color: rgba(255,255,255,0.5);
    position: relative;
}

.zone h2 {
    position: absolute;
    top: 5px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.5rem;
}

#congratsSlide {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background-color: #e0ffd8;
}

#congratsSlide h1 { font-size: 3rem; margin-bottom: 20px; }

#playAgainBtn {
    padding: 15px 30px;
    font-size: 1.5rem;
    cursor: pointer;
    border-radius: 10px;
    border: none;
    background-color: #00b894;
    color: white;
}

.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background-color: gold;
    animation: fall 3s linear forwards;
    z-index: 1000;
}

@keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }

@media(max-width:768px){
    #gameSlide { flex-direction: column; align-items: center; }
    #vehicles, #zones { width: 90%; }
    #vehicles img { width: 90px; }
    .zone { height: 120px; font-size: 1.2rem; }
}
</style>
</head>
<body>

<!-- Slide 1: Logo -->
<div id="logoSlide">
    <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Slide 2: Drag & Drop -->
<div id="gameSlide">
    <div id="vehicles">
        <img src="assets/airplane.png" draggable="true" data-zone="Air">
        <img src="assets/helicopter.png" draggable="true" data-zone="Air">
        <img src="assets/car.png" draggable="true" data-zone="Road">
        <img src="assets/bus.png" draggable="true" data-zone="Road">
        <img src="assets/truck.png" draggable="true" data-zone="Road">
        <img src="assets/boat.png" draggable="true" data-zone="Water">
        <img src="assets/ship.png" draggable="true" data-zone="Water">
    </div>
    <div id="zones">
        <div class="zone" data-zone="Air"><h2>Air Transport</h2></div>
        <div class="zone" data-zone="Road"><h2>Road Transport</h2></div>
        <div class="zone" data-zone="Water"><h2>Water Transport</h2></div>
    </div>
</div>

<!-- Slide 3: Congrats -->
<div id="congratsSlide">
    <h1>Good Job!</h1>
    <button id="playAgainBtn">Play Again</button>
</div>

<!-- Audio -->
<audio id="correctAudio" src="assets/excellent.mp3"></audio>
<audio id="wrongAudio" src="assets/wrong.mp3"></audio>

<script>
const logoSlide = document.getElementById('logoSlide');
const gameSlide = document.getElementById('gameSlide');
const congratsSlide = document.getElementById('congratsSlide');
const vehicles = document.querySelectorAll('#vehicles img');
const zones = document.querySelectorAll('.zone');
const correctAudio = document.getElementById('correctAudio');
const wrongAudio = document.getElementById('wrongAudio');
const playAgainBtn = document.getElementById('playAgainBtn');

let correctCount = 0;

// Show logo for 5 seconds
logoSlide.style.display = 'flex';
setTimeout(()=> {
    logoSlide.style.display = 'none';
    gameSlide.style.display = 'flex';
}, 5000);

// Drag & drop
vehicles.forEach(v => {
    v.addEventListener('dragstart', e => {
        e.dataTransfer.setData('text', v.dataset.zone + '|' + v.src);
    });
});

zones.forEach(zone => {
    zone.addEventListener('dragover', e => e.preventDefault());
    zone.addEventListener('drop', e => {
        e.preventDefault();
        const data = e.dataTransfer.getData('text').split('|');
        const type = data[0];
        const src = data[1];
        const vehicle = [...vehicles].find(v => v.src.endsWith(src.split('/').pop()));

        if(type === zone.dataset.zone){
            zone.appendChild(vehicle);
            vehicle.draggable = false;
            correctAudio.currentTime = 0;
            correctAudio.play();
            correctCount++;
            if(correctCount === vehicles.length) showCongrats();
        } else {
            wrongAudio.currentTime = 0;
            wrongAudio.play();
        }
    });
});

function showCongrats(){
    gameSlide.style.display = 'none';
    congratsSlide.style.display = 'flex';
    launchConfetti();
}

function launchConfetti(){
    for(let i=0; i<100; i++){
        const confetti = document.createElement('div');
        confetti.classList.add('confetti');
        confetti.style.left = Math.random()*100 + 'vw';
        confetti.style.background = `hsl(${Math.random()*360},70%,60%)`;
        confetti.style.width = confetti.style.height = (5 + Math.random()*10) + 'px';
        document.body.appendChild(confetti);
        setTimeout(()=> confetti.remove(), 3000);
    }
}

playAgainBtn.addEventListener('click', () => {
    location.reload();
});
</script>
</body>
</html>
