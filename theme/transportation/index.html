<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Game</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    font-family: 'Arial Rounded MT Bold', sans-serif;
    background-color: #a0e1f7;
    overflow-x: hidden;
  }
  #logoScreen, #gameScreen, #endScreen {
    width: 100%;
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  #logoScreen img {
    width: 300px;
  }
  #gameScreen {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    position: relative;
  }
  #instruction {
    font-size: 2em;
    margin-top: 10px;
    text-align: center;
  }
  #background {
    width: 100%;
    max-width: 1200px;
    height: auto;
    position: relative;
    margin-top: 20px;
  }
  .zone {
    position: absolute;
    border: 2px dashed rgba(0,0,0,0.3);
  }
  #vehicleTray {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
  }
  .vehicle {
    width: 80px;
    cursor: grab;
  }
  #endScreen {
    background-color: #c1f0c1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  #endScreen h1 {
    font-size: 3em;
    margin-bottom: 20px;
  }
  #playAgain {
    padding: 15px 30px;
    font-size: 1.5em;
    background-color: yellow;
    border: none;
    cursor: pointer;
    border-radius: 10px;
  }
</style>
</head>
<body>

<!-- Logo Screen -->
<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Screen -->
<div id="gameScreen">
  <div id="instruction">Drag the vehicle to the correct transport zone</div>
  <img id="background" src="assets/background.png" alt="Background">

  <!-- Zones positioned according to background image -->
  <div class="zone" id="airZone" style="top: 5%; left: 10%; width: 25%; height: 20%;"></div>
  <div class="zone" id="roadZone" style="top: 30%; left: 10%; width: 80%; height: 20%;"></div>
  <div class="zone" id="waterZone" style="top: 60%; left: 10%; width: 80%; height: 20%;"></div>

  <div id="vehicleTray">
    <img src="assets/airplane.png" id="airplane" class="vehicle" draggable="true">
    <img src="assets/helicopter.png" id="helicopter" class="vehicle" draggable="true">
    <img src="assets/car.png" id="car" class="vehicle" draggable="true">
    <img src="assets/bus.png" id="bus" class="vehicle" draggable="true">
    <img src="assets/truck.png" id="truck" class="vehicle" draggable="true">
    <img src="assets/boat.png" id="boat" class="vehicle" draggable="true">
    <img src="assets/ship.png" id="ship" class="vehicle" draggable="true">
  </div>
</div>

<!-- End Screen -->
<div id="endScreen">
  <h1>Good Job!</h1>
  <button id="playAgain">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="excellentSound" src="assets/excellent.mp3"></audio>

<script>
const logoScreen = document.getElementById('logoScreen');
const gameScreen = document.getElementById('gameScreen');
const endScreen = document.getElementById('endScreen');
const playAgain = document.getElementById('playAgain');

const correctSound = document.getElementById('correctSound');
const wrongSound = document.getElementById('wrongSound');
const excellentSound = document.getElementById('excellentSound');

const zones = {
  airplane: document.getElementById('airZone'),
  helicopter: document.getElementById('airZone'),
  car: document.getElementById('roadZone'),
  bus: document.getElementById('roadZone'),
  truck: document.getElementById('roadZone'),
  boat: document.getElementById('waterZone'),
  ship: document.getElementById('waterZone')
};

document.addEventListener('DOMContentLoaded', () => {
  logoScreen.style.display = 'flex';
  setTimeout(() => {
    logoScreen.style.display = 'none';
    gameScreen.style.display = 'flex';
  }, 5000);
});

let correctCount = 0;
const totalVehicles = Object.keys(zones).length;

document.querySelectorAll('.vehicle').forEach(vehicle => {
  vehicle.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text', vehicle.id);
  });
});

Object.values(zones).forEach(zone => {
  zone.addEventListener('dragover', e => e.preventDefault());
  zone.addEventListener('drop', e => {
    e.preventDefault();
    const vehicleId = e.dataTransfer.getData('text');
    const vehicle = document.getElementById(vehicleId);

    if (zones[vehicleId] === zone) {
      const rect = zone.getBoundingClientRect();
      vehicle.style.position = 'absolute';
      vehicle.style.left = (rect.left + window.scrollX + 10) + 'px';
      vehicle.style.top = (rect.top + window.scrollY + 10) + 'px';
      vehicle.style.cursor = 'default';
      vehicle.draggable = false;
      correctSound.play();
      excellentSound.play();
      correctCount++;
      if (correctCount === totalVehicles) {
        gameScreen.style.display = 'none';
        endScreen.style.display = 'flex';
      }
    } else {
      wrongSound.play();
    }
  });
});

playAgain.addEventListener('click', () => location.reload());
</script>

</body>
</html>
