<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Game</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    font-family: 'Comic Sans MS', sans-serif;
    overflow-x: hidden;
    background: #cce7ff;
  }

  .container {
    display: flex;
    flex-direction: row;
    height: 100vh;
    width: 100%;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
  }

  /* Vehicles on left */
  #vehicles {
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
    width: 25%;
  }

  #vehicles img {
    width: 120px;
    cursor: grab;
  }

  /* Transport zones on right */
  #transports {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 70%;
  }

  .zone {
    flex: 1;
    border: 2px dashed #0077b6;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 18px;
    position: relative;
    color: #fff;
    text-shadow: 1px 1px 2px #000;
  }

  .zone h3 {
    position: absolute;
    top: 5px;
    left: 50%;
    transform: translateX(-50%);
    padding: 3px 10px;
    border-radius: 5px;
    background-color: rgba(0,0,0,0.3);
  }

  .vehicle.correct { border: 3px solid green; border-radius: 10px; }
  .vehicle.wrong { animation: shake 0.5s; }
  @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } 100% { transform: translateX(0); } }

  #confettiCanvas { position: fixed; top:0; left:0; pointer-events: none; width: 100%; height: 100%; }
  #playAgainBtn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 25px; background-color: #fcbf49; border:none; border-radius: 10px; font-size: 1.2rem; cursor: pointer; display:none; }

  @media(max-width:768px){
    .container { flex-direction: column; height:auto; }
    #vehicles, #transports { width:90%; flex-direction: row; flex-wrap: wrap; justify-content:center; gap:20px; }
    #vehicles img { width: 90px; }
    .zone { height: 150px; font-size: 16px; }
  }
</style>
</head>
<body>

<div class="container">
  <div id="vehicles">
    <img src="assets/airplane.png" draggable="true" data-zone="air">
    <img src="assets/helicopter.png" draggable="true" data-zone="air">
    <img src="assets/car.png" draggable="true" data-zone="road">
    <img src="assets/bus.png" draggable="true" data-zone="road">
    <img src="assets/truck.png" draggable="true" data-zone="road">
    <img src="assets/boat.png" draggable="true" data-zone="water">
    <img src="assets/ship.png" draggable="true" data-zone="water">
  </div>

  <div id="transports">
    <div class="zone" id="airZone" data-zone="air" style="background-image:url('assets/background-air.png'); background-size:cover; background-position:center;"><h3>Air Transport</h3></div>
    <div class="zone" id="roadZone" data-zone="road" style="background-image:url('assets/background-road.png'); background-size:cover; background-position:center;"><h3>Road Transport</h3></div>
    <div class="zone" id="waterZone" data-zone="water" style="background-image:url('assets/background-water.png'); background-size:cover; background-position:center;"><h3>Water Transport</h3></div>
  </div>
</div>

<canvas id="confettiCanvas"></canvas>
<button id="playAgainBtn">Play Again</button>

<audio id="correctAudio" src="assets/excellent.mp3"></audio>
<audio id="wrongAudio" src="assets/wrong.mp3"></audio>

<script>
const vehicles = document.querySelectorAll('#vehicles img');
const zones = document.querySelectorAll('.zone');
const correctAudio = document.getElementById('correctAudio');
const wrongAudio = document.getElementById('wrongAudio');
const playAgainBtn = document.getElementById('playAgainBtn');
let placedCount = 0;

// Drag & Drop
vehicles.forEach(v => {
  v.addEventListener('dragstart', e => { e.dataTransfer.setData('text', v.dataset.zone + '|' + v.src); });
});

zones.forEach(z => {
  z.addEventListener('dragover', e => e.preventDefault());
  z.addEventListener('drop', e => {
    e.preventDefault();
    const data = e.dataTransfer.getData('text').split('|');
    const type = data[0];
    const src = data[1];
    const vehicle = [...vehicles].find(v => v.src.endsWith(src.split('/').pop()));

    if(type === z.dataset.zone){
      z.appendChild(vehicle);
      vehicle.classList.add('correct');
      vehicle.draggable = false;
      correctAudio.play();
      placedCount++;
      if(placedCount === vehicles.length){
        launchConfetti();
        playAgainBtn.style.display = 'block';
      }
    } else {
      vehicle.classList.add('wrong');
      wrongAudio.play();
      setTimeout(()=>vehicle.classList.remove('wrong'), 500);
    }
  });
});

// Play Again
playAgainBtn.addEventListener('click', ()=> location.reload());

// Confetti
function launchConfetti(){
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const confetti = [];
  for(let i=0;i<150;i++){
    confetti.push({
      x: Math.random()*canvas.width,
      y: Math.random()*-canvas.height,
      r: Math.random()*6+4,
      color: `hsl(${Math.random()*360},70%,60%)`,
      tilt: Math.random()*10-10
    });
  }

  let angle = 0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confetti.forEach(c => {
      ctx.beginPath();
      ctx.lineWidth = c.r;
      ctx.strokeStyle = c.color;
      ctx.moveTo(c.x+c.tilt+c.r/2, c.y);
      ctx.lineTo(c.x+c.tilt, c.y+c.tilt+c.r/2);
      ctx.stroke();
    });
    update();
    requestAnimationFrame(draw);
  }

  function update(){
    angle += 0.01;
    confetti.forEach(c=>{
      c.y += Math.cos(angle+c.r)+1;
      c.x += Math.sin(angle)*2;
      if(c.y>canvas.height){
        c.y = -10;
        c.x = Math.random()*canvas.width;
      }
    });
  }

  draw();
}
</script>

</body>
</html>
