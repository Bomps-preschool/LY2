<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Game</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    background-color: #f0f8ff;
  }
  .slide {
    width: 100vw;
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .active { display: flex; }

  /* Splash Slide */
  #splash img {
    width: 250px;
    height: auto;
  }

  /* Game Slide */
  #game {
    flex-direction: row;
    padding: 20px;
  }
  #vehicles {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
    justify-content: center;
    align-items: center;
  }
  #vehicles img {
    width: 120px;
    cursor: grab;
  }
  #game-area {
    flex: 2;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #game-area img {
    width: 90%;
    height: auto;
    pointer-events: none;
  }
  .drop-zone {
    position: absolute;
    border: 2px dashed transparent;
  }

  /* End Slide */
  #end {
    flex-direction: column;
    font-size: 2em;
    color: #2e8b57;
    text-align: center;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- Splash Slide -->
<div class="slide active" id="splash">
  <img src="theme/transportation/assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Slide -->
<div class="slide" id="game">
  <div id="vehicles">
    <div draggable="true" data-target="airplane"><img src="theme/transportation/assets/airplane.png" alt="Airplane"><p>Airplane</p></div>
    <div draggable="true" data-target="car"><img src="theme/transportation/assets/car.png" alt="Car"><p>Car</p></div>
    <div draggable="true" data-target="bus"><img src="theme/transportation/assets/bus.png" alt="Bus"><p>Bus</p></div>
    <div draggable="true" data-target="truck"><img src="theme/transportation/assets/truck.png" alt="Truck"><p>Truck</p></div>
    <div draggable="true" data-target="boat"><img src="theme/transportation/assets/boat.png" alt="Boat"><p>Boat</p></div>
    <div draggable="true" data-target="helicopter"><img src="theme/transportation/assets/helicopter.png" alt="Helicopter"><p>Helicopter</p></div>
    <div draggable="true" data-target="ship"><img src="theme/transportation/assets/ship.png" alt="Ship"><p>Ship</p></div>
  </div>
  <div id="game-area">
    <img src="theme/transportation/assets/background-zones.png" alt="Background Zones">
    <!-- Drop zones -->
    <div class="drop-zone" id="zone-airplane" style="top:10%; left:60%; width:100px; height:100px;"></div>
    <div class="drop-zone" id="zone-car" style="top:60%; left:20%; width:100px; height:100px;"></div>
    <div class="drop-zone" id="zone-bus" style="top:50%; left:40%; width:100px; height:100px;"></div>
    <div class="drop-zone" id="zone-truck" style="top:70%; left:50%; width:100px; height:100px;"></div>
    <div class="drop-zone" id="zone-boat" style="top:30%; left:80%; width:100px; height:100px;"></div>
    <div class="drop-zone" id="zone-helicopter" style="top:15%; left:70%; width:100px; height:100px;"></div>
    <div class="drop-zone" id="zone-ship" style="top:35%; left:75%; width:100px; height:100px;"></div>
  </div>
</div>

<!-- End Slide -->
<div class="slide" id="end">
  <h1>Good Job!</h1>
  <canvas id="confetti"></canvas>
</div>

<audio id="audio-correct" src="theme/transportation/assets/correct.mp3"></audio>
<audio id="audio-wrong" src="theme/transportation/assets/wrong.mp3"></audio>
<audio id="audio-excellent" src="theme/transportation/assets/excellent.mp3"></audio>

<script>
const slides = document.querySelectorAll('.slide');
let currentSlide = 0;

// Function to go to next slide
function nextSlide() {
  slides[currentSlide].classList.remove('active');
  currentSlide++;
  if(currentSlide < slides.length) {
    slides[currentSlide].classList.add('active');
  }
}

// Splash for 5 seconds
setTimeout(nextSlide, 5000);

// Drag & Drop Logic
const draggables = document.querySelectorAll('#vehicles div');
const dropZones = document.querySelectorAll('.drop-zone');
let completed = 0;

draggables.forEach(item => {
  item.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', item.dataset.target);
  });
});

dropZones.forEach(zone => {
  zone.addEventListener('dragover', e => e.preventDefault());
  zone.addEventListener('drop', e => {
    e.preventDefault();
    const dragged = e.dataTransfer.getData('text/plain');
    if(zone.id === 'zone-' + dragged) {
      const el = document.querySelector(`[data-target="${dragged}"]`);
      el.style.display = 'none';
      document.getElementById('audio-correct').play();
      completed++;
      if(completed === draggables.length) {
        document.getElementById('audio-excellent').play();
        showEndSlide();
      }
    } else {
      document.getElementById('audio-wrong').play();
    }
  });
});

// End Slide with confetti
function showEndSlide() {
  slides[currentSlide].classList.remove('active');
  currentSlide = slides.length - 1;
  slides[currentSlide].classList.add('active');
  launchConfetti();
}

// Simple confetti effect
function launchConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const confetti = [];
  for(let i=0;i<150;i++){
    confetti.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      r: Math.random()*6+4,
      d: Math.random()*20+10,
      color: ['#ff6666','#ffcc66','#66ff66','#66ccff','#cc66ff'][Math.floor(Math.random()*5)],
      tilt: Math.random()*10-10,
      tiltAngleIncrement: Math.random()*0.07+0.05
    });
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confetti.forEach((c,i)=>{
      ctx.beginPath();
      ctx.lineWidth = c.r;
      ctx.strokeStyle = c.color;
      ctx.moveTo(c.x + c.tilt + c.r/2, c.y);
      ctx.lineTo(c.x + c.tilt, c.y + c.tilt + c.r/2);
      ctx.stroke();
      c.tilt += c.tiltAngleIncrement;
      c.y += (Math.cos(c.d) + 3 + c.r/2)/2;
      if(c.y > canvas.height){c.y = -10;c.x = Math.random()*canvas.width;}
    });
    requestAnimationFrame(draw);
  }
  draw();
}
</script>

</body>
</html>
