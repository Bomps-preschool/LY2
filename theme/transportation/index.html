<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Game</title>
<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: #b3e0ff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}
#game-container {
  width: 100%;
  max-width: 1000px;
  text-align: center;
  position: relative;
}
#logo-slide, #game-slide, #good-job-slide {
  display: none;
}
#logo-slide img {
  width: 300px;
  margin-top: 50px;
}
#instruction-box {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: #ffff99;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 18px;
  z-index: 10;
}
#background-img {
  width: 100%;
  margin-top: 60px;
  border-radius: 15px;
  position: relative;
}
#vehicles-container {
  display: flex;
  justify-content: center;
  margin-top: 10px;
  flex-wrap: wrap;
  gap: 10px;
}
.vehicle-box {
  width: 100px;
  height: 100px;
  background: #fff;
  border-radius: 15px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: transform 0.2s;
  position: relative;
  z-index: 5;
}
.vehicle-box img {
  max-width: 80%;
  max-height: 80%;
}
.vehicle-box:hover {
  transform: scale(1.1);
}
#good-job-slide {
  background: #fff2cc;
  padding: 20px;
  border-radius: 15px;
}
#play-again-btn {
  margin-top: 20px;
  padding: 10px 20px;
  background: #ffd633;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 18px;
}
.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  background: red;
  z-index: 20;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="game-container">
  <!-- Logo Slide -->
  <div id="logo-slide">
    <img src="assets/innovine-logo.png" alt="Innovine Logo">
  </div>

  <!-- Game Slide -->
  <div id="game-slide">
    <div id="instruction-box">Tap a vehicle, then tap the correct transport zone</div>
    <img id="background-img" src="assets/background.png" alt="Transportation Background">
    <div id="vehicles-container">
      <div class="vehicle-box" data-type="air"><img src="assets/airplane.png"></div>
      <div class="vehicle-box" data-type="air"><img src="assets/helicopter.png"></div>
      <div class="vehicle-box" data-type="road"><img src="assets/car.png"></div>
      <div class="vehicle-box" data-type="road"><img src="assets/bus.png"></div>
      <div class="vehicle-box" data-type="road"><img src="assets/truck.png"></div>
      <div class="vehicle-box" data-type="water"><img src="assets/boat.png"></div>
      <div class="vehicle-box" data-type="water"><img src="assets/ship.png"></div>
    </div>
  </div>

  <!-- Good Job Slide -->
  <div id="good-job-slide">
    <h1>Good Job!</h1>
    <button id="play-again-btn">Play Again</button>
  </div>
</div>

<audio id="correct-sound" src="assets/correct.mp3"></audio>
<audio id="wrong-sound" src="assets/wrong.mp3"></audio>
<audio id="clap-sound" src="assets/claps.mp3"></audio>

<script>
let currentVehicle = null;
let vehicles = document.querySelectorAll('.vehicle-box');
let logoSlide = document.getElementById('logo-slide');
let gameSlide = document.getElementById('game-slide');
let goodJobSlide = document.getElementById('good-job-slide');
let correctSound = document.getElementById('correct-sound');
let wrongSound = document.getElementById('wrong-sound');
let clapSound = document.getElementById('clap-sound');
let backgroundImg = document.getElementById('background-img');

function showSlide(slide) {
  logoSlide.style.display = 'none';
  gameSlide.style.display = 'none';
  goodJobSlide.style.display = 'none';
  slide.style.display = 'block';
}

function startGame() {
  showSlide(logoSlide);
  setTimeout(() => showSlide(gameSlide), 5000);
}

vehicles.forEach(v => {
  v.addEventListener('click', () => {
    currentVehicle = v;
    vehicles.forEach(veh => veh.style.border = ''); // Reset borders
    v.style.border = '3px solid #ffd633';
  });
});

backgroundImg.addEventListener('click', (e) => {
  if (!currentVehicle) return;

  let rect = backgroundImg.getBoundingClientRect();
  let x = e.clientX - rect.left; 
  let width = rect.width;
  let type = currentVehicle.dataset.type;

  let zone = null;
  if (x < width / 3) zone = 'air';
  else if (x < 2 * width / 3) zone = 'road';
  else zone = 'water';

  if (zone === type) {
    clapSound.play();
    // Move vehicle to center of zone
    let newX = 0;
    if (zone === 'air') newX = width/6;
    else if (zone === 'road') newX = width/2;
    else newX = 5*width/6;
    currentVehicle.style.position = 'absolute';
    currentVehicle.style.left = newX - 50 + 'px';
    currentVehicle.style.top = '150px';
    currentVehicle.style.border = '';
    currentVehicle = null;

    if ([...vehicles].every(v => parseInt(v.style.top) > 0)) {
      setTimeout(() => showSlide(goodJobSlide), 1000);
    }
  } else {
    wrongSound.play();
  }
});

document.getElementById('play-again-btn').addEventListener('click', () => {
  vehicles.forEach(v => {
    v.style.display = 'flex';
    v.style.position = '';
    v.style.left = '';
    v.style.top = '';
  });
  startGame();
});

startGame();
</script>

</body>
</html>
