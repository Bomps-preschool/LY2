<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Sorting Game</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', cursive, sans-serif;
    background: #e0f7fa;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  #gameContainer {
    position: relative;
    width: 95vw;
    max-width: 1200px;
    height: 90vh;
    background: url('assets/background-zones.png') no-repeat center center;
    background-size: contain;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  #instruction {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    font-size: 2vw;
    font-weight: bold;
    color: #000;
    text-shadow: 1px 1px 2px #fff;
  }
  .zone {
    position: absolute;
  }
  #airZone { top: 5%; left: 10%; width: 80%; height: 25%; }
  #roadZone { top: 35%; left: 10%; width: 80%; height: 25%; }
  #waterZone { top: 65%; left: 10%; width: 80%; height: 25%; }
  #tray {
    position: absolute;
    bottom: 5%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 15px;
  }
  .vehicle {
    width: 80px;
    cursor: grab;
  }
</style>
</head>
<body>

<div id="gameContainer">
  <div id="instruction">Drag the vehicle to the correct transport zone</div>

  <div id="airZone" class="zone"></div>
  <div id="roadZone" class="zone"></div>
  <div id="waterZone" class="zone"></div>

  <div id="tray">
    <img src="assets/airplane.png" id="airplane" class="vehicle" draggable="true" data-zone="airZone">
    <img src="assets/helicopter.png" id="helicopter" class="vehicle" draggable="true" data-zone="airZone">
    <img src="assets/car.png" id="car" class="vehicle" draggable="true" data-zone="roadZone">
    <img src="assets/bus.png" id="bus" class="vehicle" draggable="true" data-zone="roadZone">
    <img src="assets/truck.png" id="truck" class="vehicle" draggable="true" data-zone="roadZone">
    <img src="assets/boat.png" id="boat" class="vehicle" draggable="true" data-zone="waterZone">
    <img src="assets/ship.png" id="ship" class="vehicle" draggable="true" data-zone="waterZone">
  </div>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>
const vehicles = document.querySelectorAll('.vehicle');
const zones = { airZone: document.getElementById('airZone'),
                roadZone: document.getElementById('roadZone'),
                waterZone: document.getElementById('waterZone') };

vehicles.forEach(vehicle => {
  vehicle.addEventListener('dragstart', dragStart);
});

Object.values(zones).forEach(zone => {
  zone.addEventListener('dragover', dragOver);
  zone.addEventListener('drop', drop);
});

let dragged;

function dragStart(e) { dragged = e.target; }

function dragOver(e) { e.preventDefault(); }

function drop(e) {
  e.preventDefault();
  const correctZone = dragged.dataset.zone;
  if (e.target.id === correctZone || e.target.closest(`#${correctZone}`)) {
    zones[correctZone].appendChild(dragged);
    dragged.style.position = 'absolute';
    dragged.style.left = (Math.random() * (zones[correctZone].offsetWidth - dragged.offsetWidth)) + 'px';
    dragged.style.top = (Math.random() * (zones[correctZone].offsetHeight - dragged.offsetHeight)) + 'px';
    document.getElementById('correct').play();
    document.getElementById('clap').play();
  } else {
    document.getElementById('wrong').play();
  }
}
</script>

</body>
</html>
