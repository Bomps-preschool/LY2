<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Game – LY2</title>
<style>
body {
  margin: 0;
  font-family: 'Arbutus', cursive;
  background: #b2e0ff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
#splash, #game, #endScreen {
  width: 100%;
  height: 100vh;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#splash img {
  width: 200px;
  height: auto;
}
#instructionBox {
  position: absolute;
  top: 10px;
  background-color: #fff9a1;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 1.2em;
  text-align: center;
  z-index: 10;
}
#backgroundContainer {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  max-width: 1000px;
  width: 100%;
}
#background {
  width: 100%;
  max-width: 1000px;
  display: block;
}
#vehicleTray {
  position: absolute;
  bottom: 20px;
  display: flex;
  gap: 15px;
  z-index: 20;
}
.vehicle {
  width: 80px;
  height: 80px;
  background: white;
  border-radius: 10px;
  padding: 5px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}
.vehicle img {
  width: 70px;
  height: 70px;
}
.zone {
  position: absolute;
}
#airZone { top: 30px; left: 20px; width: 300px; height: 300px; }
#roadZone { top: 30px; left: 340px; width: 300px; height: 300px; }
#waterZone { top: 30px; left: 660px; width: 300px; height: 300px; }

#endScreen {
  background: #fff3b0;
  color: #000;
  font-size: 2em;
  text-align: center;
}
#endScreen button {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 1.2em;
  border: none;
  border-radius: 10px;
  background: #ffd93d;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Screen -->
<div id="game">
  <div id="instructionBox">Tap a vehicle, then tap the correct transport zone</div>
  <div id="backgroundContainer">
    <img id="background" src="assets/background.png" alt="Background">
    <div class="zone" id="airZone"></div>
    <div class="zone" id="roadZone"></div>
    <div class="zone" id="waterZone"></div>
    <div id="vehicleTray">
      <div class="vehicle" data-vehicle="airplane"><img src="assets/airplane.png"></div>
      <div class="vehicle" data-vehicle="boat"><img src="assets/boat.png"></div>
      <div class="vehicle" data-vehicle="car"><img src="assets/car.png"></div>
      <div class="vehicle" data-vehicle="helicopter"><img src="assets/helicopter.png"></div>
      <div class="vehicle" data-vehicle="bus"><img src="assets/bus.png"></div>
      <div class="vehicle" data-vehicle="ship"><img src="assets/ship.png"></div>
      <div class="vehicle" data-vehicle="truck"><img src="assets/truck.png"></div>
    </div>
  </div>
</div>

<!-- End Screen -->
<div id="endScreen">
  <div>Good Job!</div>
  <button onclick="restartGame()">Play Again</button>
</div>

<audio id="rightSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>

<script>
const splash = document.getElementById('splash');
const game = document.getElementById('game');
const endScreen = document.getElementById('endScreen');
const vehicles = document.querySelectorAll('.vehicle');
const zones = {
  air: document.getElementById('airZone'),
  road: document.getElementById('roadZone'),
  water: document.getElementById('waterZone')
};
const rightSound = document.getElementById('rightSound');
const wrongSound = document.getElementById('wrongSound');
const clapSound = document.getElementById('clapSound');

let selectedVehicle = null;
let placedVehicles = { air: [], road: [], water: [] };

// Show splash first
splash.style.display = 'flex';
setTimeout(() => {
  splash.style.display = 'none';
  game.style.display = 'flex';
}, 5000);

// Vehicle click
vehicles.forEach(v => {
  v.addEventListener('click', () => {
    selectedVehicle = v;
    vehicles.forEach(ve => ve.style.opacity = '0.5');
    v.style.opacity = '1';
  });
});

// Zone click
Object.entries(zones).forEach(([zoneName, zone]) => {
  zone.addEventListener('click', () => {
    if (!selectedVehicle) return;
    const vehicleName = selectedVehicle.dataset.vehicle;
    const correctZone = (vehicleName === 'airplane' || vehicleName === 'helicopter') ? 'air'
                         : (vehicleName === 'car' || vehicleName === 'bus' || vehicleName === 'truck') ? 'road'
                         : 'water';

    if (zoneName === correctZone) {
      // Place the vehicle in the zone
      const clone = selectedVehicle.cloneNode(true);
      clone.style.position = 'absolute';
      clone.style.top = (20 + placedVehicles[zoneName].length * 90) + 'px'; // stack vertically
      clone.style.left = '20px';
      zone.appendChild(clone);

      rightSound.play();
      clapSound.play();

      // Remove original vehicle from tray
      selectedVehicle.remove();
      selectedVehicle = null;
      vehicles.forEach(ve => ve.style.opacity = '1');

      // Track placed vehicles
      placedVehicles[zoneName].push(clone);

      // Check if all vehicles placed
      const totalPlaced = placedVehicles.air.length + placedVehicles.road.length + placedVehicles.water.length;
      if (totalPlaced === 7) {
        setTimeout(() => {
          game.style.display = 'none';
          endScreen.style.display = 'flex';
        }, 500);
      }

    } else {
      wrongSound.play();
      selectedVehicle = null;
      vehicles.forEach(ve => ve.style.opacity = '1');
    }
  });
});

function restartGame() {
  endScreen.style.display = 'none';
  game.style.display = 'flex';
  // Reset tray
  vehicles.forEach(v => {
    document.getElementById('vehicleTray').appendChild(v);
    v.style.position = '';
    v.style.top = '';
    v.style.left = '';
    v.style.opacity = '1';
  });
  placedVehicles = { air: [], road: [], water: [] };
  selectedVehicle = null;
}
</script>
</body>
</html>
