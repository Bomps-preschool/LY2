<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Transportation Sorting Game</title>
<style>
  body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    background: #cce6ff;
    overflow: hidden; /* Prevent scrolling */
  }

  #logoScreen {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #fff;
  }

  #gameScreen {
    display: none;
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  #background {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('assets/background.png') no-repeat center top;
    background-size: contain;
    z-index: 1;
  }

  #vehicleTray {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 2;
  }

  .vehicle {
    width: 80px;
    cursor: grab;
  }

  .zone {
    position: absolute;
  }

  #airZone { top: 50px; left: 10%; width: 80%; height: 100px; }
  #roadZone { top: 200px; left: 10%; width: 80%; height: 120px; }
  #waterZone { top: 360px; left: 10%; width: 80%; height: 100px; }

  #instruction {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    font-size: 2rem;
    z-index: 3;
  }

  #goodJob {
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
    background: #d4ffcc;
    font-size: 3rem;
    font-weight: bold;
    text-align: center;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 5;
  }

  #playAgainBtn {
    margin-top: 20px;
    font-size: 1.5rem;
    padding: 10px 20px;
    background: #ffeb3b;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }

</style>
</head>
<body>

<!-- Innovine Logo -->
<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Screen -->
<div id="gameScreen">
  <div id="background"></div>
  <div id="instruction">Drag the vehicle to the correct transport zone</div>

  <!-- Vehicle Tray -->
  <div id="vehicleTray">
    <img src="assets/airplane.png" class="vehicle" draggable="true" data-zone="airZone">
    <img src="assets/helicopter.png" class="vehicle" draggable="true" data-zone="airZone">
    <img src="assets/car.png" class="vehicle" draggable="true" data-zone="roadZone">
    <img src="assets/bus.png" class="vehicle" draggable="true" data-zone="roadZone">
    <img src="assets/truck.png" class="vehicle" draggable="true" data-zone="roadZone">
    <img src="assets/boat.png" class="vehicle" draggable="true" data-zone="waterZone">
    <img src="assets/ship.png" class="vehicle" draggable="true" data-zone="waterZone">
  </div>

  <!-- Invisible Drop Zones -->
  <div id="airZone" class="zone"></div>
  <div id="roadZone" class="zone"></div>
  <div id="waterZone" class="zone"></div>
</div>

<!-- Good Job Screen -->
<div id="goodJob">
  Good Job!
  <button id="playAgainBtn">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>

<script>
  const logoScreen = document.getElementById('logoScreen');
  const gameScreen = document.getElementById('gameScreen');
  const goodJob = document.getElementById('goodJob');
  const playAgainBtn = document.getElementById('playAgainBtn');

  const vehicles = document.querySelectorAll('.vehicle');
  const zones = document.querySelectorAll('.zone');

  const correctSound = document.getElementById('correctSound');
  const wrongSound = document.getElementById('wrongSound');
  const clapSound = document.getElementById('clapSound');

  let correctCount = 0;

  // Show game after 5s logo
  setTimeout(() => {
    logoScreen.style.display = 'none';
    gameScreen.style.display = 'block';
  }, 5000);

  vehicles.forEach(v => {
    v.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text', v.dataset.zone);
      e.dataTransfer.setData('vehicleId', v.src);
    });
  });

  zones.forEach(zone => {
    zone.addEventListener('dragover', e => e.preventDefault());
    zone.addEventListener('drop', e => {
      e.preventDefault();
      const zoneId = e.dataTransfer.getData('text');
      const vehicleSrc = e.dataTransfer.getData('vehicleId');
      const dragged = Array.from(vehicles).find(v => v.src === vehicleSrc);

      if(zoneId === zone.id && !dragged.dataset.placed) {
        // Correct drop
        dragged.dataset.placed = 'true';
        dragged.style.pointerEvents = 'none';
        dragged.style.position = 'absolute';
        dragged.style.left = e.clientX - dragged.width/2 + 'px';
        dragged.style.top = e.clientY - dragged.height/2 + 'px';
        correctSound.play();
        clapSound.play();

        // Wait until clap finishes to increment
        clapSound.onended = () => {
          correctCount++;
          if(correctCount === vehicles.length) {
            gameScreen.style.display = 'none';
            goodJob.style.display = 'flex';
          }
        };
      } else {
        wrongSound.play();
      }
    });
  });

  playAgainBtn.addEventListener('click', () => {
    window.location.reload();
  });
</script>
</body>
</html>
