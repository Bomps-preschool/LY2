<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Game</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #cce7ff;
    display: flex;
    justify-content: space-between;
    height: 100vh;
    overflow: hidden;
  }

  /* Vehicles container */
  #vehicles {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding-left: 20px;
    width: 45%;
  }

  .vehicle {
    width: 120px;
    cursor: grab;
    user-select: none;
  }

  /* Transport drop zones */
  #transports {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    gap: 40px;
    padding-right: 20px;
    width: 45%;
  }

  .dropzone {
    border: 2px dashed #0077b6;
    width: 200px;
    height: 150px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 18px;
    background: #e0f7ff;
    border-radius: 10px;
    text-align: center;
    padding: 5px;
  }

  .dropzone.correct {
    border: 2px solid green;
    background: #c0ffc0;
  }

  .dropzone.incorrect {
    border: 2px solid red;
    background: #ffc0c0;
  }

  /* Mobile adjustments */
  @media (max-width: 768px) {
    body {
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
    }
    #vehicles, #transports {
      width: 90%;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 10px;
    }
    .dropzone {
      width: 150px;
      height: 120px;
      font-size: 16px;
    }
    .vehicle {
      width: 100px;
    }
  }
</style>
</head>
<body>

<div id="vehicles">
  <img src="assets/airplane.png" draggable="true" id="airplane" class="vehicle" data-type="air">
  <img src="assets/helicopter.png" draggable="true" id="helicopter" class="vehicle" data-type="air">
  <img src="assets/car.png" draggable="true" id="car" class="vehicle" data-type="road">
  <img src="assets/bus.png" draggable="true" id="bus" class="vehicle" data-type="road">
  <img src="assets/boat.png" draggable="true" id="boat" class="vehicle" data-type="water">
  <img src="assets/ship.png" draggable="true" id="ship" class="vehicle" data-type="water">
  <img src="assets/truck.png" draggable="true" id="truck" class="vehicle" data-type="road">
</div>

<div id="transports">
  <div class="dropzone" data-type="air">Air Transport</div>
  <div class="dropzone" data-type="road">Road Transport</div>
  <div class="dropzone" data-type="water">Water Transport</div>
</div>

<script>
const vehicles = document.querySelectorAll('.vehicle');
const dropzones = document.querySelectorAll('.dropzone');

vehicles.forEach(v => {
  v.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text', v.id);
  });
});

dropzones.forEach(zone => {
  zone.addEventListener('dragover', e => {
    e.preventDefault();
  });

  zone.addEventListener('drop', e => {
    e.preventDefault();
    const vehicleId = e.dataTransfer.getData('text');
    const vehicle = document.getElementById(vehicleId);
    const vehicleType = vehicle.dataset.type;

    if (zone.dataset.type === vehicleType) {
      zone.classList.add('correct');
      zone.appendChild(vehicle);
      vehicle.setAttribute('draggable', 'false');
    } else {
      zone.classList.add('incorrect');
      setTimeout(() => zone.classList.remove('incorrect'), 800);
    }
  });
});
</script>
</body>
</html>
