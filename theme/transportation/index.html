<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Sorting Game</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    font-family: 'Comic Sans MS', cursive;
    background-color: #d0ebff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  #gameContainer {
    width: 95%;
    height: 95%;
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
  }
  #vehicles {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .vehicle {
    width: 100px;
    cursor: grab;
  }
  #zones {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 60%;
  }
  .zone {
    flex: 1;
    border: 2px dashed #0077b6;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background-size: cover;
    background-position: center;
  }
  .zone h2 {
    position: absolute;
    top: 5px;
    left: 10px;
    font-size: 1.5rem;
    color: #000;
  }
  #congratsScreen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(200,255,200,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    display: none;
    z-index: 1000;
  }
  #congratsScreen h1 {
    font-size: 3rem;
    margin-bottom: 20px;
  }
  #playAgain {
    padding: 10px 20px;
    font-size: 1.5rem;
    cursor: pointer;
    border: none;
    background-color: #00b894;
    color: white;
    border-radius: 10px;
  }
  /* Confetti style */
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background-color: gold;
    z-index: 2000;
    animation: fall 3s linear forwards;
  }
  @keyframes fall {
    to {transform: translateY(100vh) rotate(360deg);}
  }
</style>
</head>
<body>

<div id="gameContainer">
  <div id="vehicles">
    <img src="assets/airplane.png" class="vehicle" draggable="true" data-zone="Air" id="airplane">
    <img src="assets/helicopter.png" class="vehicle" draggable="true" data-zone="Air" id="helicopter">
    <img src="assets/car.png" class="vehicle" draggable="true" data-zone="Road" id="car">
    <img src="assets/bus.png" class="vehicle" draggable="true" data-zone="Road" id="bus">
    <img src="assets/truck.png" class="vehicle" draggable="true" data-zone="Road" id="truck">
    <img src="assets/boat.png" class="vehicle" draggable="true" data-zone="Water" id="boat">
    <img src="assets/ship.png" class="vehicle" draggable="true" data-zone="Water" id="ship">
  </div>
  <div id="zones">
    <div class="zone" id="airZone" data-zone="Air" style="background-image: url('assets/background-air.png');">
      <h2>Air Transport</h2>
    </div>
    <div class="zone" id="roadZone" data-zone="Road" style="background-image: url('assets/background-road.png');">
      <h2>Road Transport</h2>
    </div>
    <div class="zone" id="waterZone" data-zone="Water" style="background-image: url('assets/background-water.png');">
      <h2>Water Transport</h2>
    </div>
  </div>
</div>

<div id="congratsScreen">
  <h1>Congratulations!</h1>
  <button id="playAgain">Play Again</button>
</div>

<audio id="correctAudio" src="assets/excellent.mp3"></audio>
<audio id="wrongAudio" src="assets/wrong.mp3"></audio>

<script>
  const vehicles = document.querySelectorAll('.vehicle');
  const zones = document.querySelectorAll('.zone');
  const correctAudio = document.getElementById('correctAudio');
  const wrongAudio = document.getElementById('wrongAudio');
  const congratsScreen = document.getElementById('congratsScreen');
  const playAgainBtn = document.getElementById('playAgain');

  let correctCount = 0;

  vehicles.forEach(vehicle => {
    vehicle.addEventListener('dragstart', dragStart);
  });

  zones.forEach(zone => {
    zone.addEventListener('dragover', dragOver);
    zone.addEventListener('drop', drop);
  });

  function dragStart(e){
    e.dataTransfer.setData('text/plain', e.target.id);
  }

  function dragOver(e){
    e.preventDefault();
  }

  function drop(e){
    e.preventDefault();
    const vehicleId = e.dataTransfer.getData('text/plain');
    const vehicle = document.getElementById(vehicleId);
    const vehicleZone = vehicle.getAttribute('data-zone');
    const zoneType = e.currentTarget.getAttribute('data-zone');

    if(vehicleZone === zoneType){
      e.currentTarget.appendChild(vehicle);
      vehicle.style.cursor = "default";
      vehicle.draggable = false;
      correctAudio.currentTime = 0;
      correctAudio.play();
      correctCount++;
    } else {
      wrongAudio.currentTime = 0;
      wrongAudio.play();
    }

    if(correctCount === vehicles.length){
      showCongrats();
    }
  }

  function showCongrats(){
    congratsScreen.style.display = 'flex';
    createConfetti();
  }

  function createConfetti(){
    for(let i=0; i<100; i++){
      const confetti = document.createElement('div');
      confetti.classList.add('confetti');
      confetti.style.left = Math.random()*window.innerWidth + 'px';
      confetti.style.backgroundColor = `hsl(${Math.random()*360}, 70%, 60%)`;
      confetti.style.width = confetti.style.height = 5+Math.random()*10 + 'px';
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 3000);
    }
  }

  playAgainBtn.addEventListener('click', () => {
    vehicles.forEach(vehicle => {
      document.getElementById(vehicle.getAttribute('data-zone').toLowerCase() + 'Zone').appendChild(vehicle);
      vehicle.draggable = true;
      vehicle.style.cursor = "grab";
    });
    congratsScreen.style.display = 'none';
    correctCount = 0;
    shuffleVehicles();
  });

  function shuffleVehicles(){
    const parent = document.getElementById('vehicles');
    for (let i = parent.children.length; i >= 0; i--) {
      parent.appendChild(parent.children[Math.random() * i | 0]);
    }
  }

</script>
</body>
</html>
