<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Game</title>
<style>
    body {
        margin: 0;
        font-family: 'Comic Sans MS', cursive, sans-serif;
        background: #d0f0ff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
    }
    #gameContainer {
        width: 100%;
        max-width: 1200px;
        position: relative;
    }
    #background {
        width: 100%;
        display: block;
    }
    .vehicleTray {
        position: absolute;
        left: 10px;
        bottom: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .vehicleTray img {
        width: 80px;
        cursor: grab;
    }
    .zone {
        position: absolute;
        border: 2px dashed rgba(255,255,255,0.5);
    }
    #instruction {
        position: absolute;
        top: 5%;
        width: 100%;
        text-align: center;
        font-size: 2em;
        font-weight: bold;
        color: #000;
        text-shadow: 1px 1px 3px #fff;
    }
    #wellDone {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 3em;
        background: rgba(200,255,200,0.9);
        padding: 20px 40px;
        border-radius: 15px;
        display: none;
        text-align: center;
        z-index: 10;
    }
    #playAgainBtn {
        margin-top: 20px;
        font-size: 1.5em;
        padding: 10px 30px;
        border: none;
        background: #ffdd57;
        border-radius: 10px;
        cursor: pointer;
    }
</style>
</head>
<body>
<div id="gameContainer">
    <img id="background" src="assets/background.png" alt="background">

    <div id="instruction">Drag the vehicle to the correct transport zone</div>

    <div class="vehicleTray">
        <img src="assets/airplane.png" id="airplane" draggable="true" data-zone="air">
        <img src="assets/helicopter.png" id="helicopter" draggable="true" data-zone="air">
        <img src="assets/car.png" id="car" draggable="true" data-zone="road">
        <img src="assets/bus.png" id="bus" draggable="true" data-zone="road">
        <img src="assets/truck.png" id="truck" draggable="true" data-zone="road">
        <img src="assets/boat.png" id="boat" draggable="true" data-zone="water">
        <img src="assets/ship.png" id="ship" draggable="true" data-zone="water">
    </div>

    <!-- Zones (position aligned according to background.png) -->
    <div class="zone" id="zoneAir" style="top:5%; left:20%; width:70%; height:20%;" data-zone="air"></div>
    <div class="zone" id="zoneRoad" style="top:30%; left:20%; width:70%; height:25%;" data-zone="road"></div>
    <div class="zone" id="zoneWater" style="top:60%; left:20%; width:70%; height:25%;" data-zone="water"></div>

    <div id="wellDone">
        Well Done!<br>
        <button id="playAgainBtn">Play Again</button>
    </div>
</div>

<audio id="soundCorrect" src="assets/correct.mp3"></audio>
<audio id="soundWrong" src="assets/wrong.mp3"></audio>
<audio id="soundExcellent" src="assets/excellent.mp3"></audio>

<script>
const vehicles = document.querySelectorAll('.vehicleTray img');
const zones = document.querySelectorAll('.zone');
let placedCount = 0;

vehicles.forEach(vehicle => {
    vehicle.addEventListener('dragstart', dragStart);
});

zones.forEach(zone => {
    zone.addEventListener('dragover', dragOver);
    zone.addEventListener('drop', drop);
});

function dragStart(e) {
    e.dataTransfer.setData('text/plain', e.target.id);
}

function dragOver(e) {
    e.preventDefault();
}

function drop(e) {
    e.preventDefault();
    const vehicleId = e.dataTransfer.getData('text/plain');
    const vehicle = document.getElementById(vehicleId);
    const zoneType = e.currentTarget.getAttribute('data-zone');

    if(vehicle.getAttribute('data-zone') === zoneType) {
        e.currentTarget.appendChild(vehicle);
        vehicle.style.position = 'absolute';
        vehicle.style.left = '10px';
        vehicle.style.top = '10px';
        vehicle.draggable = false;
        document.getElementById('soundExcellent').play();
        placedCount++;
        if(placedCount === vehicles.length){
            document.getElementById('wellDone').style.display = 'block';
        }
    } else {
        document.getElementById('soundWrong').play();
    }
}

document.getElementById('playAgainBtn').addEventListener('click', () => {
    location.reload();
});
</script>
</body>
</html>
