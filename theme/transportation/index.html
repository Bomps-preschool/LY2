<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Sorting Game</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
    background-color: #d0f0ff;
  }
  #logo-slide, #game-slide, #goodjob-slide {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  #logo-slide img {
    width: 250px;
  }
  #instruction {
    background: #ffff99;
    padding: 10px 20px;
    border-radius: 10px;
    text-align: center;
    font-size: 20px;
    position: absolute;
    top: 20px;
    width: 80%;
    left: 10%;
  }
  #background {
    width: 100%;
    height: 65%;
    background: url('assets/background.png') no-repeat center center;
    background-size: contain;
    margin-top: 60px;
  }
  #vehicle-tray {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 15px;
  }
  .vehicle {
    width: 80px;
    height: 80px;
    background: #fff;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    padding: 10px;
  }
  .zone {
    position: absolute;
    border: 2px dashed transparent;
  }
  #air-zone { top: 80px; left: 20px; width: 33%; height: 300px; border-color: blue; }
  #road-zone { top: 80px; left: 33%; width: 33%; height: 300px; border-color: green; }
  #water-zone { top: 80px; left: 66%; width: 33%; height: 300px; border-color: navy; }
  #goodjob-slide {
    background: #fff5c2;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  #goodjob-slide button {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 20px;
    background: #ffdd44;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- Logo Slide -->
<div id="logo-slide">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Slide -->
<div id="game-slide">
  <div id="instruction">Tap a vehicle, then tap the correct transport zone</div>
  <div id="background"></div>
  <div id="vehicle-tray">
    <div class="vehicle" data-vehicle="airplane"><img src="assets/airplane.png" alt="Airplane" width="60"></div>
    <div class="vehicle" data-vehicle="helicopter"><img src="assets/helicopter.png" alt="Helicopter" width="60"></div>
    <div class="vehicle" data-vehicle="car"><img src="assets/car.png" alt="Car" width="60"></div>
    <div class="vehicle" data-vehicle="bus"><img src="assets/bus.png" alt="Bus" width="60"></div>
    <div class="vehicle" data-vehicle="truck"><img src="assets/truck.png" alt="Truck" width="60"></div>
    <div class="vehicle" data-vehicle="boat"><img src="assets/boat.png" alt="Boat" width="60"></div>
    <div class="vehicle" data-vehicle="ship"><img src="assets/ship.png" alt="Ship" width="60"></div>
  </div>
  <div id="air-zone" class="zone"></div>
  <div id="road-zone" class="zone"></div>
  <div id="water-zone" class="zone"></div>
</div>

<!-- Good Job Slide -->
<div id="goodjob-slide">
  <h1>Good Job!</h1>
  <button onclick="restartGame()">Play Again</button>
</div>

<audio id="correct-sound" src="assets/correct.mp3"></audio>
<audio id="wrong-sound" src="assets/wrong.mp3"></audio>
<audio id="claps-sound" src="assets/claps.mp3"></audio>

<script>
let logoSlide = document.getElementById('logo-slide');
let gameSlide = document.getElementById('game-slide');
let goodJobSlide = document.getElementById('goodjob-slide');

let vehicles = document.querySelectorAll('.vehicle');
let zones = {
  airplane: 'air-zone',
  helicopter: 'air-zone',
  car: 'road-zone',
  bus: 'road-zone',
  truck: 'road-zone',
  boat: 'water-zone',
  ship: 'water-zone'
};

let selectedVehicle = null;

function showSlide(slide) {
  logoSlide.style.display = 'none';
  gameSlide.style.display = 'none';
  goodJobSlide.style.display = 'none';
  slide.style.display = 'flex';
}

// Show logo for 5 seconds
showSlide(logoSlide);
setTimeout(() => {
  showSlide(gameSlide);
}, 5000);

// Vehicle click
vehicles.forEach(v => {
  v.addEventListener('click', () => {
    selectedVehicle = v;
  });
});

// Zone click
document.querySelectorAll('.zone').forEach(zone => {
  zone.addEventListener('click', () => {
    if (!selectedVehicle) return;
    let vehicleType = selectedVehicle.getAttribute('data-vehicle');
    let correctZone = zones[vehicleType];
    if (zone.id === correctZone) {
      let claps = document.getElementById('claps-sound');
      claps.play();
      claps.onended = () => {
        zone.appendChild(selectedVehicle);
        selectedVehicle.style.position = 'absolute';
        selectedVehicle.style.left = '10px';
        selectedVehicle.style.top = '10px';
        selectedVehicle = null;
        checkCompletion();
      };
    } else {
      document.getElementById('wrong-sound').play();
    }
  });
});

function checkCompletion() {
  let totalVehicles = Object.keys(zones).length;
  let moved = 0;
  for (let key in zones) {
    let zoneEl = document.getElementById(zones[key]);
    if (zoneEl.contains(document.querySelector(`.vehicle[data-vehicle="${key}"]`))) {
      moved++;
    }
  }
  if (moved === totalVehicles) {
    showSlide(goodJobSlide);
  }
}

function restartGame() {
  vehicles.forEach(v => document.getElementById('vehicle-tray').appendChild(v));
  showSlide(logoSlide);
  setTimeout(() => {
    showSlide(gameSlide);
  }, 5000);
}
</script>

</body>
</html>
