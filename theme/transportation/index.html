<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Game</title>
<style>
body {
  margin: 0;
  font-family: 'Arbutus', cursive;
  background: #b3e0ff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
#splash, #game, #endScreen {
  width: 100%;
  height: 100vh;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#splash img { width: 250px; margin-top: 20%; }
#instructionBox {
  position: absolute;
  top: 10px;
  background-color: #fff9a1;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 1.2em;
  text-align: center;
  z-index: 10;
}
#game {
  position: relative;
  width: 100%;
  max-width: 1000px;
  height: 100vh;
  background: url('assets/background.png') no-repeat center center;
  background-size: contain;
}
#vehicleTray {
  position: absolute;
  bottom: 20px;
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  justify-content: center;
  z-index: 10;
}
.vehicle {
  width: 80px;
  height: 80px;
  background: #fff;
  border-radius: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}
.vehicle img { max-width: 70px; max-height: 70px; }
#endScreen {
  background: #fff3b0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100vh;
  text-align: center;
}
#playAgain {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 1.2em;
  background: #ffd93d;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
.zone {
  position: absolute;
}
#airZone { top: 50px; left: 50px; width: 300px; height: 400px; }
#roadZone { top: 50px; left: 360px; width: 300px; height: 400px; }
#waterZone { top: 50px; left: 670px; width: 300px; height: 400px; }
</style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Screen -->
<div id="game">
  <div id="instructionBox">Tap a vehicle, then tap the correct transport zone</div>
  <!-- Zones -->
  <div id="airZone" class="zone"></div>
  <div id="roadZone" class="zone"></div>
  <div id="waterZone" class="zone"></div>
  <!-- Vehicle Tray -->
  <div id="vehicleTray">
    <div class="vehicle" data-type="air" id="airplane"><img src="assets/airplane.png"></div>
    <div class="vehicle" data-type="water" id="boat"><img src="assets/boat.png"></div>
    <div class="vehicle" data-type="road" id="car"><img src="assets/car.png"></div>
    <div class="vehicle" data-type="air" id="helicopter"><img src="assets/helicopter.png"></div>
    <div class="vehicle" data-type="road" id="bus"><img src="assets/bus.png"></div>
    <div class="vehicle" data-type="water" id="ship"><img src="assets/ship.png"></div>
    <div class="vehicle" data-type="road" id="truck"><img src="assets/truck.png"></div>
  </div>
</div>

<!-- End Screen -->
<div id="endScreen">
  <div>Good Job!</div>
  <button id="playAgain">Play Again</button>
</div>

<audio id="rightAudio" src="assets/correct.mp3"></audio>
<audio id="wrongAudio" src="assets/wrong.mp3"></audio>
<audio id="clapAudio" src="assets/claps.mp3"></audio>

<script>
let splash = document.getElementById('splash');
let game = document.getElementById('game');
let endScreen = document.getElementById('endScreen');
let vehicles = document.querySelectorAll('.vehicle');
let selectedVehicle = null;
let placedCount = { air:0, road:0, water:0 };

// Show splash for 5s
splash.style.display = 'flex';
setTimeout(()=> { splash.style.display='none'; game.style.display='flex'; }, 5000);

// Vehicle selection
vehicles.forEach(v=>{
  v.addEventListener('click',()=>{
    selectedVehicle = v;
  });
});

// Zone click
const zones = { air:'airZone', road:'roadZone', water:'waterZone' };
Object.keys(zones).forEach(type=>{
  document.getElementById(zones[type]).addEventListener('click',()=>{
    if(!selectedVehicle) return;
    if(selectedVehicle.dataset.type === type){
      let clone = selectedVehicle.cloneNode(true);
      let zoneDiv = document.getElementById(zones[type]);
      // Stack vertically
      clone.style.position='absolute';
      clone.style.left='10px';
      clone.style.top = (10 + placedCount[type]*90) + 'px';
      zoneDiv.appendChild(clone);
      placedCount[type]++;
      document.getElementById('rightAudio').play();
      document.getElementById('clapAudio').play();
      // Remove original from tray
      selectedVehicle.remove();
      selectedVehicle=null;

      // Check if all vehicles placed
      const totalPlaced = placedCount.air+placedCount.road+placedCount.water;
      if(totalPlaced===7){
        setTimeout(()=>{
          game.style.display='none';
          endScreen.style.display='flex';
        },500);
      }
    } else {
      document.getElementById('wrongAudio').play();
      selectedVehicle=null;
    }
  });
});

// Play Again
document.getElementById('playAgain').addEventListener('click',()=>{
  endScreen.style.display='none';
  game.style.display='flex';
  // Reset tray
  vehicles.forEach(v=> { document.getElementById('vehicleTray').appendChild(v); });
  placedCount={ air:0, road:0, water:0 };
  selectedVehicle=null;
});
</script>
</body>
</html>
