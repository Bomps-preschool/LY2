<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Game</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body, html { width: 100%; height: 100%; font-family: 'Comic Sans MS', cursive, sans-serif; background: #b3e5fc; display: flex; justify-content: center; align-items: center; }

  #game-container { width: 95vw; max-width: 1200px; height: 95vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

  #logo-slide, #game-slide, #congrats-slide { width: 100%; height: 100%; display: none; position: relative; }

  #logo-slide img { max-width: 300px; max-height: 300px; display: block; margin: auto; }

  #game-slide { display: flex; flex-direction: row; justify-content: space-between; align-items: flex-start; }
  #vehicles { display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
  #vehicles img { width: 80px; cursor: grab; transition: transform 0.2s; }
  #zones-container { position: relative; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-around; align-items: center; height: 100%; }
  .zone { border: 3px dashed #006400; width: 100%; max-width: 800px; height: 25%; background: url('assets/background-zones.png') no-repeat center center; background-size: contain; display: flex; justify-content: center; align-items: center; font-size: 1.8em; font-weight: bold; }

  #congrats-slide { display: flex; flex-direction: column; justify-content: center; align-items: center; background: #c8e6c9; }
  #congrats-slide h1 { font-size: 3em; margin-bottom: 20px; }
  #play-again { padding: 15px 30px; font-size: 1.5em; background: #ffeb3b; border: none; border-radius: 10px; cursor: pointer; }

  /* Confetti */
  .confetti { position: absolute; width: 10px; height: 10px; background: #f44336; animation: fall 3s linear infinite; }
  @keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); } 100% { transform: translateY(100vh) rotate(360deg); } }

  /* Responsive scaling */
  @media (max-width: 768px) {
    #game-slide { flex-direction: column; align-items: center; }
    #vehicles { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 15px; }
    #vehicles img { width: 60px; }
    .zone { height: 150px; font-size: 1.2em; }
  }
</style>
</head>
<body>

<div id="game-container">

  <!-- Innovine Logo Slide -->
  <div id="logo-slide">
    <img src="assets/innovine-logo.png" alt="Innovine Logo">
  </div>

  <!-- Game Slide -->
  <div id="game-slide">
    <!-- Vehicles -->
    <div id="vehicles">
      <img src="assets/airplane.png" draggable="true" data-type="air" alt="Airplane">
      <img src="assets/helicopter.png" draggable="true" data-type="air" alt="Helicopter">
      <img src="assets/car.png" draggable="true" data-type="road" alt="Car">
      <img src="assets/bus.png" draggable="true" data-type="road" alt="Bus">
      <img src="assets/truck.png" draggable="true" data-type="road" alt="Truck">
      <img src="assets/boat.png" draggable="true" data-type="water" alt="Boat">
      <img src="assets/ship.png" draggable="true" data-type="water" alt="Ship">
    </div>

    <!-- Zones -->
    <div id="zones-container">
      <div class="zone" data-type="air">Air Transport</div>
      <div class="zone" data-type="road">Road Transport</div>
      <div class="zone" data-type="water">Water Transport</div>
    </div>
  </div>

  <!-- Congrats Slide -->
  <div id="congrats-slide">
    <h1>Good Job!</h1>
    <button id="play-again">Play Again</button>
  </div>

</div>

<audio id="sound-correct" src="assets/excellent.mp3"></audio>
<audio id="sound-wrong" src="assets/wrong.mp3"></audio>

<script>
const logoSlide = document.getElementById('logo-slide');
const gameSlide = document.getElementById('game-slide');
const congratsSlide = document.getElementById('congrats-slide');
const vehicles = document.querySelectorAll('#vehicles img');
const zones = document.querySelectorAll('.zone');
const soundCorrect = document.getElementById('sound-correct');
const soundWrong = document.getElementById('sound-wrong');
const playAgain = document.getElementById('play-again');

// Show logo for 5 seconds
logoSlide.style.display = 'block';
setTimeout(() => {
  logoSlide.style.display = 'none';
  gameSlide.style.display = 'flex';
}, 5000);

// Drag & Drop
vehicles.forEach(vehicle => {
  vehicle.addEventListener('dragstart', e => {
    e.dataTransfer.setData('type', vehicle.dataset.type);
    e.dataTransfer.setData('id', vehicle.src);
  });
});

zones.forEach(zone => {
  zone.addEventListener('dragover', e => e.preventDefault());
  zone.addEventListener('drop', e => {
    e.preventDefault();
    const type = e.dataTransfer.getData('type');
    const id = e.dataTransfer.getData('id');
    const vehicleImg = document.querySelector(`#vehicles img[src="${id}"]`);
    if (zone.dataset.type === type) {
      zone.appendChild(vehicleImg);
      vehicleImg.style.width = '80%';
      vehicleImg.style.cursor = 'default';
      vehicleImg.draggable = false;
      soundCorrect.play();
      checkWin();
    } else {
      soundWrong.play();
    }
  });
});

function checkWin() {
  const allPlaced = [...vehicles].every(v => !v.draggable);
  if (allPlaced) {
    gameSlide.style.display = 'none';
    congratsSlide.style.display = 'flex';
    launchConfetti();
  }
}

// Confetti effect
function launchConfetti() {
  for (let i = 0; i < 100; i++) {
    const confetti = document.createElement('div');
    confetti.classList.add('confetti');
    confetti.style.left = Math.random() * window.innerWidth + 'px';
    confetti.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 4000);
  }
}

// Play again button
playAgain.addEventListener('click', () => location.reload());
</script>

</body>
</html>
