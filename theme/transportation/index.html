<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Helpers Game</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
    background: #ffe6cc;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  #gameContainer {
    width: 90%;
    max-width: 900px;
    text-align: center;
    position: relative;
  }
  #instruction {
    font-size: 1.5em;
    font-weight: bold;
    margin-bottom: 20px;
    background: #ffd6b3;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
  }
  #questionBox {
    background: #ff9999;
    padding: 40px 20px 60px 20px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
    margin-bottom: 20px;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  #questionText {
    font-size: 1.4em;
    font-weight: bold;
  }
  .answerBtn {
    padding: 15px 25px;
    margin: 10px;
    font-size: 1.1em;
    cursor: pointer;
    border-radius: 10px;
    border: 2px solid #444;
    background: #fff;
    transition: transform 0.2s;
  }
  .answerBtn:hover {
    transform: scale(1.05);
  }
  #playAgainBtn {
    display: none;
    margin-top: 20px;
    padding: 15px 30px;
    font-size: 1.2em;
    border-radius: 10px;
    border: none;
    background: #fff333;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="gameContainer">
  <div id="instruction">Listen to the question and choose the correct answer</div>
  
  <div id="questionBox">
    <div id="questionText"></div>
    <div id="answersContainer"></div>
  </div>

  <button id="playAgainBtn">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>

<script>
const questions = [
  {text: "Who helps you keep the surroundings clean?", audio: "assets/question-1.mp3", correct: "Sweeper", options: ["Sweeper", "Doctor", "Teacher", "Postman", "Firefighter"]},
  {text: "Who treats sick people?", audio: "assets/question-2.mp3", correct: "Doctor", options: ["Sweeper", "Doctor", "Teacher", "Postman", "Firefighter"]},
  {text: "Who teaches you at school?", audio: "assets/question-3.mp3", correct: "Teacher", options: ["Sweeper", "Doctor", "Teacher", "Postman", "Firefighter"]},
  {text: "Who delivers letters?", audio: "assets/question-4.mp3", correct: "Postman", options: ["Sweeper", "Doctor", "Teacher", "Postman", "Firefighter"]},
  {text: "Who helps you during a fire?", audio: "assets/question-5.mp3", correct: "Firefighter", options: ["Sweeper", "Doctor", "Teacher", "Postman", "Firefighter"]}
];

let currentQuestionIndex = 0;

const questionText = document.getElementById("questionText");
const answersContainer = document.getElementById("answersContainer");
const playAgainBtn = document.getElementById("playAgainBtn");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const clapSound = document.getElementById("clapSound");

function loadQuestion() {
  if(currentQuestionIndex >= questions.length){
    questionText.textContent = "Good Job!";
    answersContainer.innerHTML = "";
    playAgainBtn.style.display = "block";
    return;
  }

  const q = questions[currentQuestionIndex];
  questionText.textContent = q.text;
  answersContainer.innerHTML = "";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "answerBtn";
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(opt);
    answersContainer.appendChild(btn);
  });

  // play question audio
  const audio = new Audio(q.audio);
  audio.play();
}

function checkAnswer(selected){
  const q = questions[currentQuestionIndex];
  if(selected === q.correct){
    clapSound.play();
    clapSound.onended = () => {
      currentQuestionIndex++;
      loadQuestion();
    }
  } else {
    wrongSound.play();
  }
}

playAgainBtn.onclick = () => {
  currentQuestionIndex = 0;
  playAgainBtn.style.display = "none";
  loadQuestion();
}

window.onload = loadQuestion;
</script>

</body>
</html>
