<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Sorting Game</title>
<style>
  body { margin:0; font-family: 'Arbutus', cursive; background: #B3E5FC; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  #splash, #game, #endScreen { width:100%; height:100vh; display:none; flex-direction:column; align-items:center; justify-content:center; }
  #splash img { width:250px; height:auto; }
  #instruction { background: #FFF9C4; padding:10px 20px; font-size:1.3em; margin:10px 0; border-radius:10px; text-align:center; }
  #zones { display:flex; justify-content:center; align-items:flex-start; gap:10px; margin-top:10px; flex-wrap:wrap; }
  .zone { position:relative; width:250px; height:3000px; background-size:cover; border-radius:10px; display:flex; flex-direction:column; align-items:center; padding-top:10px; }
  #vehicles { display:flex; justify-content:center; gap:15px; flex-wrap:wrap; margin-top:20px; }
  .vehicle { width:70px; height:70px; background:#fff; border-radius:10px; display:flex; justify-content:center; align-items:center; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.2); }
  #endScreen { background:#FFF9C4; font-size:2em; justify-content:center; text-align:center; }
  #playAgain { margin-top:20px; padding:10px 20px; font-size:1.2em; background:#FFEB3B; border:none; border-radius:10px; cursor:pointer; }
</style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Screen -->
<div id="game">
  <div id="instruction">Tap a vehicle, then tap the correct transport zone</div>
  <div id="zones">
    <div id="airZone" class="zone" style="background-image:url('assets/background-air.png');"></div>
    <div id="roadZone" class="zone" style="background-image:url('assets/background-road.png');"></div>
    <div id="waterZone" class="zone" style="background-image:url('assets/background-water.png');"></div>
  </div>
  <div id="vehicles">
    <div class="vehicle" data-type="air" id="airplane"><img src="assets/airplane.png" alt="Airplane" width="70" height="70"></div>
    <div class="vehicle" data-type="water" id="boat"><img src="assets/boat.png" alt="Boat" width="70" height="70"></div>
    <div class="vehicle" data-type="road" id="car"><img src="assets/car.png" alt="Car" width="70" height="70"></div>
    <div class="vehicle" data-type="air" id="helicopter"><img src="assets/helicopter.png" alt="Helicopter" width="70" height="70"></div>
    <div class="vehicle" data-type="road" id="bus"><img src="assets/bus.png" alt="Bus" width="70" height="70"></div>
    <div class="vehicle" data-type="water" id="ship"><img src="assets/ship.png" alt="Ship" width="70" height="70"></div>
    <div class="vehicle" data-type="road" id="truck"><img src="assets/truck.png" alt="Truck" width="70" height="70"></div>
  </div>
</div>

<!-- End Screen -->
<div id="endScreen">
  <div>Good Job!</div>
  <button id="playAgain">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>
let selectedVehicle = null;
let zones = { air: document.getElementById('airZone'), road: document.getElementById('roadZone'), water: document.getElementById('waterZone') };
let vehicles = document.querySelectorAll('.vehicle');
let game = document.getElementById('game');
let splash = document.getElementById('splash');
let endScreen = document.getElementById('endScreen');
let playAgainBtn = document.getElementById('playAgain');
let correctSound = document.getElementById('correct');
let wrongSound = document.getElementById('wrong');
let clapSound = document.getElementById('clap');

// Splash Screen for 5s
splash.style.display = 'flex';
setTimeout(() => {
  splash.style.display = 'none';
  game.style.display = 'flex';
}, 5000);

// Vehicle selection
vehicles.forEach(v => {
  v.addEventListener('click', () => {
    selectedVehicle = v;
  });
});

// Zone click logic
Object.keys(zones).forEach(type => {
  zones[type].addEventListener('click', () => {
    if (!selectedVehicle) return;

    if (selectedVehicle.dataset.type === type) {
      // Move vehicle inside zone
      let img = selectedVehicle.querySelector('img');
      img.style.width = '70px';
      img.style.height = '70px';
      img.style.margin = '5px';
      img.style.display = 'block';
      zones[type].appendChild(img);

      clapSound.play();
      clapSound.onended = () => {
        // Show end screen after all vehicles are placed
        if (document.querySelectorAll('#vehicles .vehicle img').length === 0) {
          game.style.display = 'none';
          endScreen.style.display = 'flex';
        }
      }

      selectedVehicle.style.display = 'none'; 
    } else {
      wrongSound.play();
    }
    selectedVehicle = null;
  });
});

// Play Again logic
playAgainBtn.addEventListener('click', () => {
  endScreen.style.display = 'none';
  game.style.display = 'flex';
  // Reset vehicles to tray
  Object.keys(zones).forEach(type => {
    let imgs = zones[type].querySelectorAll('img');
    imgs.forEach(img => {
      img.style.width = '70px';
      img.style.height = '70px';
      img.style.margin = '0';
      img.parentElement.style.display = 'flex';
      document.getElementById(img.alt.toLowerCase()).appendChild(img);
      document.getElementById(img.alt.toLowerCase()).style.display = 'flex';
    });
  });
});
</script>

</body>
</html>
