<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Game</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #b3e0ff;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
#logo-slide, #game-slide, #good-job-slide {
  display: none;
  width: 100%;
  height: 100%;
  text-align: center;
  position: relative;
}
#logo-slide img { width: 300px; margin-top: 20%; }
#instruction-box {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: #ffff99;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 18px;
  z-index: 10;
}
#background-img {
  width: 100%;
  max-height: 70%;
  margin-top: 60px;
  object-fit: contain;
}
.vehicle-box {
  width: 80px;
  height: 80px;
  background: #fff;
  border-radius: 15px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  margin: 5px;
  transition: transform 0.2s;
}
.vehicle-box img { max-width: 70px; max-height: 70px; }
.vehicle-box:hover { transform: scale(1.1); }
#good-job-slide {
  background: #fff2cc;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100%;
}
#play-again-btn {
  margin-top: 20px;
  padding: 10px 20px;
  background: #ffd633;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>
<body>

<div id="logo-slide">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="game-slide">
  <div id="instruction-box">Tap a vehicle, then tap the correct transport zone</div>
  <img id="background-img" src="assets/background.png" alt="Background">

  <!-- Zones coordinates -->
  <div id="airZone" class="zone" style="position:absolute; top:80px; left:50px; width:300px; height:250px;"></div>
  <div id="roadZone" class="zone" style="position:absolute; top:80px; left:400px; width:300px; height:250px;"></div>
  <div id="waterZone" class="zone" style="position:absolute; top:80px; left:750px; width:300px; height:250px;"></div>

  <div id="vehicles-container">
    <div class="vehicle-box" data-zone="airZone"><img src="assets/airplane.png"></div>
    <div class="vehicle-box" data-zone="airZone"><img src="assets/helicopter.png"></div>
    <div class="vehicle-box" data-zone="roadZone"><img src="assets/car.png"></div>
    <div class="vehicle-box" data-zone="roadZone"><img src="assets/bus.png"></div>
    <div class="vehicle-box" data-zone="roadZone"><img src="assets/truck.png"></div>
    <div class="vehicle-box" data-zone="waterZone"><img src="assets/boat.png"></div>
    <div class="vehicle-box" data-zone="waterZone"><img src="assets/ship.png"></div>
  </div>
</div>

<div id="good-job-slide">
  <h1>Good Job!</h1>
  <button id="play-again-btn">Play Again</button>
</div>

<audio id="rightAudio" src="assets/correct.mp3"></audio>
<audio id="wrongAudio" src="assets/wrong.mp3"></audio>
<audio id="clapAudio" src="assets/claps.mp3"></audio>

<script>
const logoSlide = document.getElementById('logo-slide');
const gameSlide = document.getElementById('game-slide');
const goodJobSlide = document.getElementById('good-job-slide');
const vehicles = document.querySelectorAll('.vehicle-box');

let selectedVehicle = null;

// Show logo for 5s
logoSlide.style.display = 'block';
setTimeout(() => {
  logoSlide.style.display = 'none';
  gameSlide.style.display = 'block';
}, 5000);

// Vehicle click
vehicles.forEach(v => {
  v.addEventListener('click', () => {
    selectedVehicle = v;
  });
});

// Zone click
document.querySelectorAll('.zone').forEach(zone => {
  zone.addEventListener('click', () => {
    if(!selectedVehicle) return;
    const correctZone = selectedVehicle.dataset.zone;

    if(zone.id === correctZone){
      const clone = selectedVehicle.cloneNode(true);
      // Place the clone randomly inside the zone
      const rect = zone.getBoundingClientRect();
      clone.style.position = 'absolute';
      clone.style.left = (rect.left + Math.random()*(rect.width-80)) + 'px';
      clone.style.top = (rect.top + Math.random()*(rect.height-80)) + 'px';
      clone.style.zIndex = 5;
      document.body.appendChild(clone);

      document.getElementById('rightAudio').play();
      document.getElementById('clapAudio').play();

      // Remove original from tray
      selectedVehicle.remove();
      selectedVehicle = null;

      // Check if all vehicles are placed
      if(document.querySelectorAll('.vehicle-box').length === 0){
        setTimeout(()=> {
          gameSlide.style.display = 'none';
          goodJobSlide.style.display = 'flex';
        }, 500);
      }
    } else {
      document.getElementById('wrongAudio').play();
      selectedVehicle = null;
    }
  });
});

// Play again
document.getElementById('play-again-btn').addEventListener('click', ()=>{
  window.location.reload();
});
</script>
</body>
</html>
