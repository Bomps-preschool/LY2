<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Sorting Game</title>
<style>
  body { margin:0; font-family: 'Arbutus', cursive; background: #B3E5FC; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  #splash, #game, #endScreen { width:100%; height:100vh; display:none; flex-direction:column; align-items:center; justify-content:center; }
  #splash img { width:250px; height:auto; }
  #instruction { background: #FFF9C4; padding:10px 20px; font-size:1.3em; margin:10px 0; border-radius:10px; text-align:center; }
  #game { position: relative; width: 100%; max-width: 1000px; height: 100vh; background: url('assets/background.png') no-repeat center center; background-size: cover; }
  #zones { display:flex; justify-content:center; align-items:flex-start; gap:10px; margin-top:10px; flex-wrap:wrap; }
  .zone { position:relative; width:300px; height:400px; border-radius:10px; display:flex; flex-direction:column; align-items:center; padding-top:10px; }
  #vehicles { display:flex; justify-content:center; gap:15px; flex-wrap:wrap; margin-top:20px; }
  .vehicle { width:80px; height:80px; background:#fff; border-radius:10px; display:flex; justify-content:center; align-items:center; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.2); }
  .vehicle img { max-width:70px; max-height:70px; }
  #endScreen { background:#FFF9C4; font-size:2em; justify-content:center; text-align:center; display:flex; flex-direction:column; align-items:center; }
  #playAgain { margin-top:20px; padding:10px 20px; font-size:1.2em; background:#FFEB3B; border:none; border-radius:10px; cursor:pointer; }
</style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Screen -->
<div id="game">
  <div id="instruction">Tap a vehicle, then tap the correct transport zone</div>
  <!-- Zones (clickable only) -->
  <div id="airZone" class="zone"></div>
  <div id="roadZone" class="zone"></div>
  <div id="waterZone" class="zone"></div>

  <!-- Vehicles Tray -->
  <div id="vehicles">
    <div class="vehicle" data-type="air" id="airplane"><img src="assets/airplane.png" alt="Airplane"></div>
    <div class="vehicle" data-type="water" id="boat"><img src="assets/boat.png" alt="Boat"></div>
    <div class="vehicle" data-type="road" id="car"><img src="assets/car.png" alt="Car"></div>
    <div class="vehicle" data-type="air" id="helicopter"><img src="assets/helicopter.png" alt="Helicopter"></div>
    <div class="vehicle" data-type="road" id="bus"><img src="assets/bus.png" alt="Bus"></div>
    <div class="vehicle" data-type="water" id="ship"><img src="assets/ship.png" alt="Ship"></div>
    <div class="vehicle" data-type="road" id="truck"><img src="assets/truck.png" alt="Truck"></div>
  </div>
</div>

<!-- End Screen -->
<div id="endScreen">
  <div>Good Job!</div>
  <button id="playAgain">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>
let selectedVehicle = null;
let zones = { air: document.getElementById('airZone'), road: document.getElementById('roadZone'), water: document.getElementById('waterZone') };
let vehicles = document.querySelectorAll('.vehicle');
let game = document.getElementById('game');
let splash = document.getElementById('splash');
let endScreen = document.getElementById('endScreen');
let playAgainBtn = document.getElementById('playAgain');
let correctSound = document.getElementById('correct');
let wrongSound = document.getElementById('wrong');
let clapSound = document.getElementById('clap');
let placedCount = { air:0, road:0, water:0 };

// Splash Screen for 5s
splash.style.display = 'flex';
setTimeout(() => {
  splash.style.display = 'none';
  game.style.display = 'flex';
}, 5000);

// Vehicle selection
vehicles.forEach(v => {
  v.addEventListener('click', () => {
    selectedVehicle = v;
  });
});

// Zone click logic
Object.keys(zones).forEach(type => {
  zones[type].addEventListener('click', () => {
    if (!selectedVehicle) return;

    if (selectedVehicle.dataset.type === type) {
      let clone = selectedVehicle.cloneNode(true);
      clone.style.position = 'absolute';
      clone.style.left = '10px';
      clone.style.top = (10 + placedCount[type]*90) + 'px';
      zones[type].appendChild(clone);
      placedCount[type]++;
      correctSound.play();
      clapSound.play();
      selectedVehicle.remove();
      selectedVehicle = null;

      // Check if all vehicles placed
      const totalPlaced = placedCount.air + placedCount.road + placedCount.water;
      if (totalPlaced === 7) {
        setTimeout(() => {
          game.style.display = 'none';
          endScreen.style.display = 'flex';
        }, 500);
      }
    } else {
      wrongSound.play();
      selectedVehicle = null;
    }
  });
});

// Play Again logic
playAgainBtn.addEventListener('click', () => {
  endScreen.style.display = 'none';
  game.style.display = 'flex';
  Object.keys(zones).forEach(type => {
    zones[type].innerHTML = ''; // clear all clones
  });
  vehicles.forEach(v => v.style.display='flex'); // reset tray
  placedCount = { air:0, road:0, water:0 };
  selectedVehicle = null;
});
</script>
</body>
</html>
