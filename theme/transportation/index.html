<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Game</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        font-family: 'Comic Sans MS', sans-serif;
        overflow-x: hidden;
    }
    #logo-screen, #game-screen, #congrats-screen {
        width: 100vw;
        height: 100vh;
        display: none;
        justify-content: center;
        align-items: center;
    }
    #logo-screen img {
        max-width: 100%;
        height: 100%;
    }
    #game-screen {
        display: flex;
        flex-direction: row;
        background: #cce7ff;
        padding: 10px;
        box-sizing: border-box;
    }
    #vehicles {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 15px;
        padding: 10px;
    }
    .vehicle {
        width: 100%;
        cursor: grab;
        max-width: 50px;
        height: 100%;
    }
    #zones {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 10px;
        justify-content: space-evenly;
        background: url('assets/background-zones.png') no-repeat center/cover;
        padding: 10px;
        box-sizing: border-box;
    }
    .zone {
        flex: 1;
        border: 3px dashed #28a745;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 5px 0;
        font-weight: bold;
        font-size: 1.5rem;
        color: black;
        text-align: center;
    }
    #congrats-screen {
        background: #fceabb;
        flex-direction: column;
    }
    #confetti-canvas {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
    }
</style>
</head>
<body>

<div id="logo-screen">
    <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="game-screen">
    <div id="vehicles">
        <img src="assets/airplane.png" id="airplane" class="vehicle" draggable="true">
        <img src="assets/helicopter.png" id="helicopter" class="vehicle" draggable="true">
        <img src="assets/car.png" id="car" class="vehicle" draggable="true">
        <img src="assets/bus.png" id="bus" class="vehicle" draggable="true">
        <img src="assets/truck.png" id="truck" class="vehicle" draggable="true">
        <img src="assets/boat.png" id="boat" class="vehicle" draggable="true">
        <img src="assets/ship.png" id="ship" class="vehicle" draggable="true">
    </div>
    <div id="zones">
        <div id="zone-air" class="zone" data-accept="airplane,helicopter">Air Transport</div>
        <div id="zone-road" class="zone" data-accept="car,bus,truck">Road Transport</div>
        <div id="zone-water" class="zone" data-accept="boat,ship">Water Transport</div>
    </div>
</div>

<div id="congrats-screen">
    <h1>Good Job!</h1>
    <button onclick="restartGame()">Play Again</button>
    <canvas id="confetti-canvas"></canvas>
</div>

<audio id="audio-correct" src="assets/excellent.mp3"></audio>
<audio id="audio-wrong" src="assets/wrong.mp3"></audio>
<audio id="audio-claps" src="assets/claps.mp3"></audio>

<script>
let dragged = null;
const vehicles = document.querySelectorAll('.vehicle');
const zones = document.querySelectorAll('.zone');
const correctAudio = document.getElementById('audio-correct');
const wrongAudio = document.getElementById('audio-wrong');
const clapsAudio = document.getElementById('audio-claps');
const logoScreen = document.getElementById('logo-screen');
const gameScreen = document.getElementById('game-screen');
const congratsScreen = document.getElementById('congrats-screen');

let correctCount = 0;

function showLogo() {
    logoScreen.style.display = 'flex';
    setTimeout(() => {
        logoScreen.style.display = 'none';
        gameScreen.style.display = 'flex';
    }, 5000);
}

vehicles.forEach(vehicle => {
    vehicle.addEventListener('dragstart', e => {
        dragged = vehicle;
        setTimeout(() => { vehicle.style.display = 'none'; }, 0);
    });
    vehicle.addEventListener('dragend', e => {
        dragged.style.display = 'block';
        dragged = null;
    });
});

zones.forEach(zone => {
    zone.addEventListener('dragover', e => e.preventDefault());
    zone.addEventListener('drop', e => {
        e.preventDefault();
        if (!dragged) return;
        const accepted = zone.getAttribute('data-accept').split(',');
        if (accepted.includes(dragged.id)) {
            zone.appendChild(dragged);
            dragged.style.position = 'relative';
            dragged.style.left = '0';
            dragged.style.top = '0';
            correctAudio.play();
            correctCount++;
            checkCompletion();
        } else {
            wrongAudio.play();
            dragged.style.display = 'block';
        }
    });
});

function checkCompletion() {
    if (correctCount === vehicles.length) {
        gameScreen.style.display = 'none';
        congratsScreen.style.display = 'flex';
        startConfetti();
    }
}

function restartGame() {
    location.reload();
}

/* Confetti code */
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let confettiParticles = [];

function initConfetti() {
    confettiParticles = [];
    for (let i = 0; i < 100; i++) {
        confettiParticles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 6 + 4,
            d: Math.random() * 20 + 10,
            color: `hsl(${Math.random()*360}, 70%, 60%)`,
            tilt: Math.random() * 10 - 10,
            tiltAngleIncremental: Math.random() * 0.07 + 0.05
        });
    }
}

function drawConfetti() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confettiParticles.forEach(p => {
        ctx.beginPath();
        ctx.lineWidth = p.r;
        ctx.strokeStyle = p.color;
        ctx.moveTo(p.x + p.tilt + p.r/2, p.y);
        ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r/2);
        ctx.stroke();
    });
    updateConfetti();
    requestAnimationFrame(drawConfetti);
}

function updateConfetti() {
    confettiParticles.forEach(p => {
        p.tiltAngle += p.tiltAngleIncremental;
        p.y += (Math.cos(p.d) + 3 + p.r/2)/2;
        p.tilt = Math.sin(p.tiltAngle) * 15;
        if (p.y > canvas.height) {
            p.y = -10;
            p.x = Math.random() * canvas.width;
        }
    });
}

function startConfetti() {
    initConfetti();
    drawConfetti();
}

window.onload = showLogo;
window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
</script>

</body>
</html>
