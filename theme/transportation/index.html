<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Game</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    background-color: #f0f8ff;
    overflow: hidden;
  }

  .slide { width:100vw; height:100vh; display:none; justify-content:center; align-items:center; position:relative; }
  .active { display:flex; }

  #splash img { width:250px; height:auto; }

  #game { flex-direction: row; padding:10px; }
  #vehicles {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 15px;
    justify-content: flex-start;
    align-items: center;
    max-height: 100vh;
    overflow-y: auto;
    scroll-behavior: smooth;
    padding-top: 20px;
    background-color: #e6f7ff;
  }
  #vehicles img { width:100px; max-width:120px; cursor: grab; position: relative; }
  #vehicles p { text-align:center; font-size:16px; margin:5px 0 0 0; }

  #game-area {
    flex: 2;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    max-height: 100vh;
    overflow: auto;
  }
  #game-area img { width:100%; max-height:100vh; height:auto; pointer-events:none; }

  .drop-zone { position:absolute; border:2px dashed transparent; }

  #end { flex-direction: column; font-size:2em; color:#2e8b57; text-align:center; }
  canvas { position:absolute; top:0; left:0; pointer-events:none; }
</style>
</head>
<body>

<div class="slide active" id="splash">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div class="slide" id="game">
  <div id="vehicles">
    <div class="drag-item" data-target="airplane"><img src="assets/airplane.png" alt="Airplane"><p>Airplane</p></div>
    <div class="drag-item" data-target="car"><img src="assets/car.png" alt="Car"><p>Car</p></div>
    <div class="drag-item" data-target="bus"><img src="assets/bus.png" alt="Bus"><p>Bus</p></div>
    <div class="drag-item" data-target="truck"><img src="assets/truck.png" alt="Truck"><p>Truck</p></div>
    <div class="drag-item" data-target="boat"><img src="assets/boat.png" alt="Boat"><p>Boat</p></div>
    <div class="drag-item" data-target="helicopter"><img src="assets/helicopter.png" alt="Helicopter"><p>Helicopter</p></div>
    <div class="drag-item" data-target="ship"><img src="assets/ship.png" alt="Ship"><p>Ship</p></div>
  </div>
  <div id="game-area">
    <img src="assets/background-zones.png" alt="Background Zones">
    <div class="drop-zone" id="zone-airplane" style="top:10%; left:60%; width:100px; height:100px;"></div>
    <div class="drop-zone" id="zone-car" style="top:60%; left:20%; width:100px; height:100px;"></div>
    <div class="drop-zone" id="zone-bus" style="top:50%; left:40%; width:100px; height:100px;"></div>
    <div class="drop-zone" id="zone-truck" style="top:70%; left:50%; width:100px; height:100px;"></div>
    <div class="drop-zone" id="zone-boat" style="top:30%; left:80%; width:100px; height:100px;"></div>
    <div class="drop-zone" id="zone-helicopter" style="top:15%; left:70%; width:100px; height:100px;"></div>
    <div class="drop-zone" id="zone-ship" style="top:35%; left:75%; width:100px; height:100px;"></div>
  </div>
</div>

<div class="slide" id="end">
  <h1>Good Job!</h1>
  <canvas id="confetti"></canvas>
</div>

<audio id="audio-correct" src="assets/correct.mp3"></audio>
<audio id="audio-wrong" src="assets/wrong.mp3"></audio>
<audio id="audio-excellent" src="assets/excellent.mp3"></audio>

<script>
const slides = document.querySelectorAll('.slide');
let currentSlide = 0;

function nextSlide(){ slides[currentSlide].classList.remove('active'); currentSlide++; if(currentSlide<slides.length) slides[currentSlide].classList.add('active'); }

setTimeout(nextSlide, 5000);

// Drag & Drop Improved
const draggables = document.querySelectorAll('.drag-item');
const dropZones = document.querySelectorAll('.drop-zone');
let completed = 0;

draggables.forEach(item => {
  let offsetX, offsetY;
  item.addEventListener('mousedown', e=>{
    e.preventDefault();
    item.style.position='absolute';
    item.style.zIndex='1000';
    offsetX = e.offsetX;
    offsetY = e.offsetY;
    moveAt(e.pageX, e.pageY);

    function moveAt(pageX, pageY){
      item.style.left = pageX - offsetX + 'px';
      item.style.top = pageY - offsetY + 'px';
    }

    function onMouseMove(event){ moveAt(event.pageX, event.pageY); }
    document.addEventListener('mousemove', onMouseMove);

    item.onmouseup = function(){
      document.removeEventListener('mousemove', onMouseMove);
      item.onmouseup = null;

      let dropped=false;
      dropZones.forEach(zone=>{
        let zRect=zone.getBoundingClientRect();
        let iRect=item.getBoundingClientRect();
        if(iRect.left+iRect.width/2>zRect.left && iRect.left+iRect.width/2<zRect.right &&
           iRect.top+iRect.height/2>zRect.top && iRect.top+iRect.height/2<zRect.bottom){
          if(zone.id==='zone-'+item.dataset.target){
            item.style.left=zRect.left+'px';
            item.style.top=zRect.top+'px';
            item.style.position='absolute';
            item.style.pointerEvents='none';
            document.getElementById('audio-correct').play();
            completed++;
            dropped=true;
            if(completed===draggables.length){
              document.getElementById('audio-excellent').play();
              showEndSlide();
            }
          } else {
            document.getElementById('audio-wrong').play();
            dropped=true;
            item.style.position='relative';
            item.style.left='0px';
            item.style.top='0px';
          }
        }
      });
      if(!dropped){ item.style.position='relative'; item.style.left='0px'; item.style.top='0px'; }
    };
  });
});

function showEndSlide(){
  slides[currentSlide].classList.remove('active');
  currentSlide=slides.length-1;
  slides[currentSlide].classList.add('active');
  launchConfetti();
}

function launchConfetti(){
  const canvas=document.getElementById('confetti');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const confetti=[];
  for(let i=0;i<150;i++){
    confetti.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*6+4, d:Math.random()*20+10, color:['#ff6666','#ffcc66','#66ff66','#66ccff','#cc66ff'][Math.floor(Math.random()*5)], tilt:Math.random()*10-10, tiltAngleIncrement:Math.random()*0.07+0.05});
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confetti.forEach(c=>{
      ctx.beginPath();
      ctx.lineWidth=c.r;
      ctx.strokeStyle=c.color;
      ctx.moveTo(c.x+c.tilt+c.r/2,c.y);
      ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/2);
      ctx.stroke();
      c.tilt+=c.tiltAngleIncrement;
      c.y+=(Math.cos(c.d)+3+c.r/2)/2;
      if(c.y>canvas.height){c.y=-10;c.x=Math.random()*canvas.width;}
    });
    requestAnimationFrame(draw);
  }
  draw();
}
</script>
</body>
</html>
