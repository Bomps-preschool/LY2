<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Drag and Drop</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Comic Sans MS', cursive, sans-serif;
        background-color: #b3e5fc;
    }
    #logo-screen, #game-screen, #congrats-screen {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }
    #game-screen, #congrats-screen { display: none; }
    #game-container {
        display: flex;
        width: 95%;
        max-width: 1400px;
        margin: auto;
        gap: 20px;
    }
    .vehicles-column {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    .vehicle {
        cursor: grab;
        max-width: 120px;
        max-height: 120px;
    }
    .zones-column {
        display: flex;
        flex-direction: column;
        gap: 20px;
        flex: 1;
    }
    .zone {
        position: relative;
        border: 3px dashed #0a8;
        border-radius: 10px;
        min-height: 100px;
        background-image: url('assets/background-zones.png');
        background-size: cover;
        background-position: center;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .zone h2 {
        position: absolute;
        top: 10px;
        text-align: center;
        width: 50%;
        margin: 0;
        font-size: 1.3em;
        color: black;
    }
    #congrats-screen h1 {
        font-size: 3em;
        color: #0a8;
        margin-bottom: 20px;
    }
    #play-again {
        padding: 10px 25px;
        font-size: 1.2em;
        background-color: #ffcc00;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }
    @media (max-width: 768px) {
        #game-container { flex-direction: column; align-items: center; }
        .vehicles-column { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .vehicle { max-width: 90px; max-height: 90px; }
        .zones-column { width: 100%; }
    }
</style>
</head>
<body>

<!-- Logo Screen -->
<div id="logo-screen">
    <img src="assets/innovine-logo.png" alt="Innovine Logo" style="width: 300px;">
</div>

<!-- Game Screen -->
<div id="game-screen">
    <div id="game-container">
        <!-- Vehicles -->
        <div class="vehicles-column" id="vehicles-column">
            <img src="assets/airplane.png" class="vehicle" draggable="true" data-zone="Air Transport">
            <img src="assets/helicopter.png" class="vehicle" draggable="true" data-zone="Air Transport">
            <img src="assets/car.png" class="vehicle" draggable="true" data-zone="Road Transport">
            <img src="assets/bus.png" class="vehicle" draggable="true" data-zone="Road Transport">
            <img src="assets/truck.png" class="vehicle" draggable="true" data-zone="Road Transport">
            <img src="assets/boat.png" class="vehicle" draggable="true" data-zone="Water Transport">
            <img src="assets/ship.png" class="vehicle" draggable="true" data-zone="Water Transport">
        </div>

        <!-- Zones -->
        <div class="zones-column">
            <div class="zone" id="zone-air">
                <h2>Air Transport</h2>
            </div>
            <div class="zone" id="zone-road">
                <h2>Road Transport</h2>
            </div>
            <div class="zone" id="zone-water">
                <h2>Water Transport</h2>
            </div>
        </div>
    </div>
</div>

<!-- Congrats Screen -->
<div id="congrats-screen">
    <h1>Good Job!</h1>
    <button id="play-again">Play Again</button>
</div>

<!-- Sounds -->
<audio id="correct-sound" src="assets/excellent.mp3"></audio>
<audio id="wrong-sound" src="assets/wrong.mp3"></audio>
<audio id="clap-sound" src="assets/claps.mp3"></audio>

<script>
    // Show logo for 5 seconds
    setTimeout(() => {
        document.getElementById('logo-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
    }, 5000);

    const vehicles = document.querySelectorAll('.vehicle');
    const zones = document.querySelectorAll('.zone');
    const correctSound = document.getElementById('correct-sound');
    const wrongSound = document.getElementById('wrong-sound');
    const clapSound = document.getElementById('clap-sound');

    vehicles.forEach(vehicle => {
        vehicle.addEventListener('dragstart', e => {
            e.dataTransfer.setData('text/plain', vehicle.src);
            e.dataTransfer.setData('text/zone', vehicle.dataset.zone);
        });
    });

    zones.forEach(zone => {
        zone.addEventListener('dragover', e => e.preventDefault());
        zone.addEventListener('drop', e => {
            e.preventDefault();
            const vehicleSrc = e.dataTransfer.getData('text/plain');
            const correctZone = e.dataTransfer.getData('text/zone');

            if(correctZone === zone.querySelector('h2').innerText) {
                const img = document.createElement('img');
                img.src = vehicleSrc;
                img.style.maxWidth = '80%';
                img.style.maxHeight = '80%';
                zone.appendChild(img);
                correctSound.play();
                checkAllCorrect();
            } else {
                wrongSound.play();
            }
        });
    });

    function checkAllCorrect() {
        const air = document.querySelectorAll('#zone-air img').length;
        const road = document.querySelectorAll('#zone-road img').length;
        const water = document.querySelectorAll('#zone-water img').length;
        if(air >=2 && road >=3 && water >=2) {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('congrats-screen').style.display = 'flex';
            // optional: play clap sound here
            clapSound.play();
        }
    }

    document.getElementById('play-again').addEventListener('click', () => {
        // Reset game
        document.getElementById('congrats-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        const zoneImages = document.querySelectorAll('.zone img');
        zoneImages.forEach(img => img.remove());
        // optional: randomize vehicles order
        const column = document.getElementById('vehicles-column');
        for(let i = column.children.length; i >= 0; i--) {
            column.appendChild(column.children[Math.random() * i | 0]);
        }
    });
</script>

</body>
</html>
