<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Sorting Game</title>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
    background-color: #cce7ff;
  }

  #logoScreen, #gameScreen, #endScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
  }

  #logoScreen img {
    width: 300px;
    height: auto;
  }

  #gameScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    background: url('assets/background.png') no-repeat center center;
    background-size: cover;
  }

  #instruction {
    position: absolute;
    top: 20px;
    font-size: 2rem;
    font-weight: bold;
    text-align: center;
    width: 100%;
    color: #000;
    text-shadow: 1px 1px 2px #fff;
  }

  #zones {
    position: absolute;
    top: 10%;
    width: 100%;
    height: 70%;
  }

  .zone {
    position: absolute;
    border: 2px dashed rgba(255,255,255,0.5);
  }

  #vehicleTray {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 15px;
    background: rgba(255,255,255,0.8);
    border-top-left-radius: 10px;
    border-top-right-radius: 10px;
  }

  .vehicle {
    width: 80px;
    height: auto;
    cursor: grab;
  }

  #endScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #d4f5d4;
    font-size: 2.5rem;
    font-weight: bold;
    color: #0a5;
  }

  #playAgain {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 1.5rem;
    background-color: #ffeb3b;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- Logo Screen -->
<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Screen -->
<div id="gameScreen">
  <div id="instruction">Drag the vehicle to the correct transport zone</div>
  <div id="zones">
    <div class="zone" id="airZone" style="top:5%; left:5%; width:90%; height:25%;"></div>
    <div class="zone" id="roadZone" style="top:35%; left:5%; width:90%; height:25%;"></div>
    <div class="zone" id="waterZone" style="top:65%; left:5%; width:90%; height:25%;"></div>
  </div>
  <div id="vehicleTray">
    <img src="assets/airplane.png" id="airplane" class="vehicle" draggable="true" data-zone="airZone">
    <img src="assets/helicopter.png" id="helicopter" class="vehicle" draggable="true" data-zone="airZone">
    <img src="assets/car.png" id="car" class="vehicle" draggable="true" data-zone="roadZone">
    <img src="assets/bus.png" id="bus" class="vehicle" draggable="true" data-zone="roadZone">
    <img src="assets/truck.png" id="truck" class="vehicle" draggable="true" data-zone="roadZone">
    <img src="assets/boat.png" id="boat" class="vehicle" draggable="true" data-zone="waterZone">
    <img src="assets/ship.png" id="ship" class="vehicle" draggable="true" data-zone="waterZone">
  </div>
</div>

<!-- End Screen -->
<div id="endScreen">
  Good Job!
  <button id="playAgain">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>
<audio id="excellentSound" src="assets/excellent.mp3"></audio>

<script>
const logoScreen = document.getElementById('logoScreen');
const gameScreen = document.getElementById('gameScreen');
const endScreen = document.getElementById('endScreen');
const playAgainBtn = document.getElementById('playAgain');
const vehicles = document.querySelectorAll('.vehicle');

const correctSound = document.getElementById('correctSound');
const wrongSound = document.getElementById('wrongSound');
const clapSound = document.getElementById('clapSound');
const excellentSound = document.getElementById('excellentSound');

let correctCount = 0;

// Show logo for 5 seconds
logoScreen.style.display = 'flex';
setTimeout(() => {
  logoScreen.style.display = 'none';
  gameScreen.style.display = 'flex';
}, 5000);

// Drag & Drop
vehicles.forEach(v => {
  v.addEventListener('dragstart', dragStart);
});

function dragStart(e) {
  e.dataTransfer.setData('text/plain', e.target.id);
}

const zones = document.querySelectorAll('.zone');
zones.forEach(z => {
  z.addEventListener('dragover', e => e.preventDefault());
  z.addEventListener('drop', drop);
});

function drop(e) {
  e.preventDefault();
  const vehicleId = e.dataTransfer.getData('text');
  const vehicle = document.getElementById(vehicleId);
  const zone = e.currentTarget;

  if(vehicle.dataset.zone === zone.id){
    // Correct
    clapSound.play();
    clapSound.onended = () => {
      excellentSound.play();
      vehicle.style.pointerEvents = 'none';
      vehicle.style.opacity = '0.6';
      correctCount++;
      if(correctCount === vehicles.length){
        setTimeout(() => {
          gameScreen.style.display = 'none';
          endScreen.style.display = 'flex';
        }, 500);
      }
    };
  } else {
    wrongSound.play();
  }
}

// Play Again
playAgainBtn.addEventListener('click', () => {
  window.location.reload();
});
</script>

</body>
</html>
