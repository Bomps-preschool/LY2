<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Game</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        font-family: 'Comic Sans MS', cursive, sans-serif;
        background-color: #b3e5fc;
        overflow-x: hidden;
    }
    #logoScreen, #gameScreen, #endScreen {
        display: none;
        width: 100%;
        height: 100vh;
        position: relative;
        text-align: center;
    }
    #logoScreen img {
        width: 300px;
        margin-top: 20%;
    }
    #gameScreen {
        background: url('assets/background.png') no-repeat center center;
        background-size: cover;
    }
    #instruction {
        text-align: center;
        font-size: 2rem;
        margin: 10px 0;
        font-weight: bold;
        color: #000;
    }
    .vehicle-container {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 15px;
    }
    .vehicle {
        width: 80px;
        cursor: grab;
    }
    .zone {
        position: absolute;
        border: 2px dashed #fff;
        border-radius: 10px;
    }
    #airZone { top: 50px; left: 15%; width: 70%; height: 20%; }
    #roadZone { top: 40%; left: 15%; width: 70%; height: 20%; }
    #waterZone { top: 70%; left: 15%; width: 70%; height: 20%; }

    #endScreen {
        background-color: #c8e6c9;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    #endScreen h1 {
        font-size: 4rem;
        margin-bottom: 30px;
        text-align: center;
    }
    #playAgainBtn {
        padding: 15px 40px;
        font-size: 1.5rem;
        cursor: pointer;
        border: none;
        background-color: #ffeb3b;
        border-radius: 10px;
    }
</style>
</head>
<body>

<!-- Logo Screen -->
<div id="logoScreen">
    <img src="assets/innovine-logo.png" alt="Logo">
</div>

<!-- Game Screen -->
<div id="gameScreen">
    <div id="instruction">Drag the vehicle to the correct transport zone</div>
    
    <div id="airZone" class="zone"></div>
    <div id="roadZone" class="zone"></div>
    <div id="waterZone" class="zone"></div>
    
    <div class="vehicle-container">
        <img src="assets/airplane.png" id="airplane" class="vehicle" data-zone="airZone" draggable="true">
        <img src="assets/helicopter.png" id="helicopter" class="vehicle" data-zone="airZone" draggable="true">
        <img src="assets/car.png" id="car" class="vehicle" data-zone="roadZone" draggable="true">
        <img src="assets/bus.png" id="bus" class="vehicle" data-zone="roadZone" draggable="true">
        <img src="assets/truck.png" id="truck" class="vehicle" data-zone="roadZone" draggable="true">
        <img src="assets/boat.png" id="boat" class="vehicle" data-zone="waterZone" draggable="true">
        <img src="assets/ship.png" id="ship" class="vehicle" data-zone="waterZone" draggable="true">
    </div>
</div>

<!-- End Screen -->
<div id="endScreen">
    <h1>Good Job!</h1>
    <button id="playAgainBtn">Play Again</button>
</div>

<audio id="correctSound" src="assets/excellent.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>
const logoScreen = document.getElementById('logoScreen');
const gameScreen = document.getElementById('gameScreen');
const endScreen = document.getElementById('endScreen');
const vehicles = document.querySelectorAll('.vehicle');
const playAgainBtn = document.getElementById('playAgainBtn');
const correctSound = document.getElementById('correctSound');
const wrongSound = document.getElementById('wrongSound');

let correctCount = 0;

// Show logo first
logoScreen.style.display = 'block';
setTimeout(() => {
    logoScreen.style.display = 'none';
    gameScreen.style.display = 'block';
}, 5000);

// Drag and Drop functionality
vehicles.forEach(vehicle => {
    vehicle.addEventListener('dragstart', dragStart);
});

function dragStart(e) {
    e.dataTransfer.setData('text/plain', e.target.id);
}

// Zones accept drops
['airZone','roadZone','waterZone'].forEach(zoneId => {
    const zone = document.getElementById(zoneId);
    zone.addEventListener('dragover', e => e.preventDefault());
    zone.addEventListener('drop', drop);
});

function drop(e) {
    e.preventDefault();
    const vehicleId = e.dataTransfer.getData('text');
    const vehicle = document.getElementById(vehicleId);
    const zone = e.currentTarget;

    if (vehicle.dataset.zone === zone.id) {
        zone.appendChild(vehicle);
        vehicle.style.position = 'absolute';
        vehicle.style.top = '50%';
        vehicle.style.left = '50%';
        vehicle.style.transform = 'translate(-50%, -50%)';
        vehicle.draggable = false;
        correctSound.play();
        correctCount++;
        if (correctCount === vehicles.length) {
            gameScreen.style.display = 'none';
            endScreen.style.display = 'flex';
        }
    } else {
        wrongSound.play();
    }
}

// Play Again
playAgainBtn.addEventListener('click', () => {
    window.location.reload();
});
</script>

</body>
</html>
