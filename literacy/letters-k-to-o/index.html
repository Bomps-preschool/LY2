<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letters K–O Game</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Comic Sans MS', sans-serif;
    background-color: #d6f0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
  }

  #logoScreen, #gameScreen, #tracingScreen, #congratsScreen {
    display: none;
    width: 100%;
    max-width: 1200px;
    height: 100vh;
    position: relative;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #logoScreen img {
    width: 350px;
    height: auto;
  }

  #gameScreen {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
  }

  #box-container { flex: 1; display: flex; justify-content: center; }
  #object-container { flex: 2; display: flex; justify-content: center; align-items: center; }
  #options-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }

  .letter-box {
    background-color: #ffdc99;
    padding: 20px 25px;
    margin: 15px;
    font-size: 30px;
    cursor: pointer;
    border-radius: 10px;
    user-select: none;
  }

  #voice-btn {
    position: fixed;
    left: 20px;
    bottom: 20px;
    width: 150px;
    height: 150px;
    cursor: pointer;
  }

  .object-img, .box-img { max-width: 300px; width: 100%; max-height: 300px; }

  #tracingScreen canvas {
    border: 3px dashed #444;
    border-radius: 10px;
    touch-action: none;
  }

  #tracing-instruction {
    font-size: 36px;
    text-align: center;
    margin-bottom: 20px;
  }

  #congratsScreen {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 48px;
    color: green;
  }

  .confetti {
    width: 10px;
    height: 10px;
    position: absolute;
    background-color: red;
    animation: confetti-fall 3s linear forwards;
  }

  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(100vh) rotate(360deg); }
  }
</style>
</head>
<body>

<!-- Logo Screen -->
<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Screen -->
<div id="gameScreen">
  <div id="box-container">
    <img id="current-box" class="box-img" src="" alt="Box">
  </div>
  <div id="object-container">
    <img id="current-object" class="object-img" src="" alt="Object">
  </div>
  <div id="options-container">
    <!-- Letter options will be injected here -->
  </div>
</div>

<img id="voice-btn" src="assets/voice-icon.png" alt="Play Audio">

<!-- Tracing Screen -->
<div id="tracingScreen">
  <div id="tracing-instruction">Trace the letter</div>
  <canvas id="tracing-canvas" width="800" height="600"></canvas>
</div>

<!-- Congrats Screen -->
<div id="congratsScreen">
  <div>🎉 Well Done! 🎉</div>
  <button id="playAgainBtn">Play Again</button>
</div>

<script>
const logoScreen = document.getElementById('logoScreen');
const gameScreen = document.getElementById('gameScreen');
const tracingScreen = document.getElementById('tracingScreen');
const congratsScreen = document.getElementById('congratsScreen');
const voiceBtn = document.getElementById('voice-btn');
const optionsContainer = document.getElementById('options-container');
const currentBox = document.getElementById('current-box');
const currentObject = document.getElementById('current-object');
const playAgainBtn = document.getElementById('playAgainBtn');
const tracingCanvas = document.getElementById('tracing-canvas');
const ctx = tracingCanvas.getContext('2d');

const slides = [
  {letter:'K', box:'assets/box-k.png', object:'assets/kiwi.png', audio:'assets/letter-k.mp3', tracing:'assets/tracing-letter-k.png'},
  {letter:'L', box:'assets/box-l.png', object:'assets/lamp.png', audio:'assets/letter-l.mp3', tracing:'assets/tracing-letter-l.png'},
  {letter:'M', box:'assets/box-m.png', object:'assets/mouse.png', audio:'assets/letter-m.mp3', tracing:'assets/tracing-letter-m.png'},
  {letter:'N', box:'assets/box-n.png', object:'assets/nest.png', audio:'assets/letter-n.mp3', tracing:'assets/tracing-letter-n.png'},
  {letter:'O', box:'assets/box-o.png', object:'assets/ostrich.png', audio:'assets/letter-o.mp3', tracing:'assets/tracing-letter-o.png'}
];

let currentIndex = 0;
let audio = new Audio();
let isTracing = false;

function startGame() {
  logoScreen.style.display = 'flex';
  gameScreen.style.display = 'none';
  tracingScreen.style.display = 'none';
  congratsScreen.style.display = 'none';
  setTimeout(() => {
    logoScreen.style.display = 'none';
    nextSlide();
  }, 5000);
}

function nextSlide() {
  if(currentIndex >= slides.length){
    gameScreen.style.display = 'none';
    tracingScreen.style.display = 'none';
    showCongrats();
    return;
  }
  const slide = slides[currentIndex];
  currentBox.src = slide.box;
  currentObject.src = '';
  optionsContainer.innerHTML = '';
  gameScreen.style.display = 'flex';
  tracingScreen.style.display = 'none';

  currentBox.onclick = () => {
    currentObject.src = slide.object;
    showLetterOptions(slide);
  }
}

function showLetterOptions(slide){
  const letters = [slide.letter, 'A','G','I','P','R'].slice(0,3); // 3 options
  letters.sort(()=>Math.random()-0.5);
  optionsContainer.innerHTML = '';
  letters.forEach(l=>{
    const div = document.createElement('div');
    div.className = 'letter-box';
    div.textContent = l;
    div.onclick = () => checkAnswer(l, slide);
    optionsContainer.appendChild(div);
  });
}

function checkAnswer(letter, slide){
  if(letter === slide.letter){
    audio.src = 'assets/claps.mp3';
    audio.play();
    audio.onended = () => showTracing(slide);
  } else {
    audio.src = 'assets/wrong.mp3';
    audio.play();
  }
}

function showTracing(slide){
  isTracing = true;
  gameScreen.style.display = 'none';
  tracingScreen.style.display = 'flex';
  ctx.clearRect(0,0,tracingCanvas.width,tracingCanvas.height);
  const img = new Image();
  img.src = slide.tracing;
  img.onload = () => {
    ctx.drawImage(img, 0, 0, tracingCanvas.width, tracingCanvas.height);
  }
}

tracingCanvas.addEventListener('pointerdown', startDrawing);
tracingCanvas.addEventListener('pointermove', draw);
tracingCanvas.addEventListener('pointerup', endDrawing);
tracingCanvas.addEventListener('pointerleave', endDrawing);

let drawing=false;
function startDrawing(e){ if(!isTracing) return; drawing=true; ctx.beginPath(); ctx.moveTo(e.offsetX,e.offsetY); }
function draw(e){ if(!drawing) return; ctx.lineTo(e.offsetX,e.offsetY); ctx.strokeStyle='blue'; ctx.lineWidth=6; ctx.stroke(); }
function endDrawing(e){ if(!drawing) return; drawing=false; currentIndex++; isTracing=false; nextSlide(); }

voiceBtn.onclick = () => {
  if(currentIndex<slides.length){
    audio.src = slides[currentIndex].audio;
    audio.play();
  }
}

function showCongrats(){
  congratsScreen.style.display='flex';
  for(let i=0;i<50;i++){
    const c = document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.backgroundColor = ['#ff595e','#ffca3a','#8ac926','#1982c4','#6a4c93','#ff85a1','#00c2ff'][Math.floor(Math.random()*7)];
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}

playAgainBtn.onclick = () => {
  slides.sort(()=>Math.random()-0.5);
  currentIndex=0;
  startGame();
}

startGame();
</script>
</body>
</html>
