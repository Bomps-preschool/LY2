<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letters K to O Game</title>
<style>
* {box-sizing:border-box; margin:0; padding:0;}
body {
    font-family:'Comic Sans MS', sans-serif;
    background: linear-gradient(135deg, #d7f0e2, #ffe3e3, #fdf6d7);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow-x:hidden;
}
#logoScreen,#objectScreen,#tracingScreen,#congratsScreen {
    display:none;
    flex-direction:column;
    align-items:center;
    width:100%;
    max-width:1000px;
    padding:10px;
}
#logoScreen img {width:40vw; max-width:300px;}
#objectScreen {display:flex; flex-direction:row; justify-content:space-between; width:100%;}
#objectScreen .box-container {flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:20px;}
#objectScreen .letter-container {flex:1; display:flex; flex-direction:column; justify-content:center; gap:20px;}
.letter-btn {background:#ffdd99; font-size:2rem; padding:15px 25px; border-radius:10px; cursor:pointer; text-align:center; user-select:none;}
.letter-btn:hover {background:#ffc966;}
.object-img {width:25vw; max-width:250px; height:auto; cursor:pointer;}
#instructionText {font-size:1.5rem; margin-bottom:20px; text-align:center;}
#tracingScreen {flex-direction:column; align-items:center; gap:30px;}
#tracingCanvas {border:2px dashed #555; touch-action:none; background:#fff; max-width:80vw; height:auto;}
#nextTracingBtn,#playAgainBtn {padding:10px 25px; font-size:18px; margin-top:15px; cursor:pointer; border-radius:10px; border:none; background-color:#4CAF50; color:white;}
#nextTracingBtn:hover,#playAgainBtn:hover {background-color:#45a049;}
#voiceBtn {position:absolute; left:20px; bottom:20px; width:150px; height:150px; cursor:pointer;}
#congratsScreen {font-size:2rem; justify-content:center; text-align:center;}
.confetti {position:absolute; width:10px; height:10px; background-color:red;}
@media(max-width:768px){
    .object-img {width:40vw;}
    .letter-btn {font-size:1.5rem; padding:10px 20px;}
}
</style>
</head>
<body>

<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="objectScreen">
  <div class="box-container">
    <div id="instructionText">Tap the box, recognise the object and tap on the correct letter.</div>
    <img id="objectBox" class="object-img" src="" alt="Box">
    <img id="revealedObject" class="object-img" style="display:none;" src="" alt="Object">
  </div>
  <div class="letter-container" id="letterOptions"></div>
  <img id="voiceBtn" src="assets/voice-icon.png" alt="Voice Button">
</div>

<div id="tracingScreen">
  <h2 id="tracingInstruction">Trace the letter</h2>
  <canvas id="tracingCanvas" width="400" height="400"></canvas>
  <button id="nextTracingBtn">Next</button>
</div>

<div id="congratsScreen">
  <h1>🎉 Well Done! 🎉</h1>
  <button id="playAgainBtn">Play Again</button>
</div>

<script>
const slides = [
  {box:'assets/box-k.png', object:'assets/kiwi.png', letter:'K', letters:['B','R','K'], audio:'assets/letter-k.mp3', clap:'assets/claps.mp3', tracing:'assets/tracing-letter-k.png'},
  {box:'assets/box-l.png', object:'assets/lamp.png', letter:'L', letters:['F','L','C'], audio:'assets/letter-l.mp3', clap:'assets/claps.mp3', tracing:'assets/tracing-letter-l.png'},
  {box:'assets/box-m.png', object:'assets/mouse.png', letter:'M', letters:['M','U','D'], audio:'assets/letter-m.mp3', clap:'assets/claps.mp3', tracing:'assets/tracing-letter-m.png'},
  {box:'assets/box-n.png', object:'assets/nest.png', letter:'N', letters:['W','B','N'], audio:'assets/letter-n.mp3', clap:'assets/claps.mp3', tracing:'assets/tracing-letter-n.png'},
  {box:'assets/box-o.png', object:'assets/ostrich.png', letter:'O', letters:['H','J','O'], audio:'assets/letter-o.mp3', clap:'assets/claps.mp3', tracing:'assets/tracing-letter-o.png'}
];

let currentSlide = 0;
const logoScreen = document.getElementById('logoScreen');
const objectScreen = document.getElementById('objectScreen');
const objectBox = document.getElementById('objectBox');
const revealedObject = document.getElementById('revealedObject');
const letterOptions = document.getElementById('letterOptions');
const instructionText = document.getElementById('instructionText');
const voiceBtn = document.getElementById('voiceBtn');

const tracingScreen = document.getElementById('tracingScreen');
const tracingCanvas = document.getElementById('tracingCanvas');
const tracingInstruction = document.getElementById('tracingInstruction');
const nextTracingBtn = document.getElementById('nextTracingBtn');

const congratsScreen = document.getElementById('congratsScreen');
const playAgainBtn = document.getElementById('playAgainBtn');

function showLogo() {
  logoScreen.style.display='flex';
  objectScreen.style.display='none';
  tracingScreen.style.display='none';
  congratsScreen.style.display='none';
  setTimeout(() => { currentSlide=0; showObjectSlide(); }, 5000);
}

function showObjectSlide() {
  const slide = slides[currentSlide];
  logoScreen.style.display='none';
  objectScreen.style.display='flex';
  tracingScreen.style.display='none';
  congratsScreen.style.display='none';
  objectBox.src = slide.box;
  revealedObject.src = slide.object;
  revealedObject.style.display='none';
  letterOptions.innerHTML='';
  slide.letters.forEach(l => {
    const btn=document.createElement('div');
    btn.className='letter-btn';
    btn.innerText=l;
    btn.onclick=()=>selectLetter(l);
    letterOptions.appendChild(btn);
  });
}

// --- Click on box plays object sound ---
objectBox.onclick = () => {
  const slide = slides[currentSlide];
  revealedObject.style.display='block';
  objectBox.style.display='none';
  const objectName = slide.object.split('/').pop().split('.')[0];
  new Audio('assets/' + objectName + '.mp3').play();
};

function selectLetter(l){
  const slide = slides[currentSlide];
  if(l===slide.letter){
    new Audio(slide.clap).play();
    showTracingSlide();
  } else {
    new Audio('assets/wrong.mp3').play();
  }
}

voiceBtn.onclick = () => {
  const slide = slides[currentSlide];
  new Audio(slide.audio).play();
};

function showTracingSlide() {
  objectScreen.style.display='none';
  tracingScreen.style.display='flex';
  const slide = slides[currentSlide];
  tracingInstruction.innerText='Trace the letter ' + slide.letter;
  const ctx = tracingCanvas.getContext('2d');
  const img = new Image();
  img.src = slide.tracing;
  img.onload = () => { 
      ctx.clearRect(0,0,tracingCanvas.width,tracingCanvas.height); 
      ctx.imageSmoothingEnabled = false; // Prevent blur
      ctx.drawImage(img,0,0,tracingCanvas.width,tracingCanvas.height); 
  };
  enableTracing(ctx);
}

function enableTracing(ctx){
  let drawing=false;
  function start(e){drawing=true; draw(e);}
  function stop(){drawing=false; ctx.beginPath();}
  function draw(e){
    if(!drawing) return;
    const rect=tracingCanvas.getBoundingClientRect();
    let x=e.clientX || e.touches[0].clientX;
    let y=e.clientY || e.touches[0].clientY;
    x-=rect.left; y-=rect.top;
    ctx.lineWidth=5; ctx.lineCap='round'; ctx.strokeStyle='red';
    ctx.lineTo(x,y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x,y);
  }
  tracingCanvas.onmousedown=start; tracingCanvas.ontouchstart=start;
  tracingCanvas.onmouseup=stop; tracingCanvas.ontouchend=stop;
  tracingCanvas.onmousemove=draw; tracingCanvas.ontouchmove=draw;
}

nextTracingBtn.onclick = () => {
  currentSlide++;
  if(currentSlide<slides.length){
    objectBox.style.display='block';
    revealedObject.style.display='none';
    showObjectSlide();
  } else { showCongrats(); }
};

function showCongrats(){
  objectScreen.style.display='none';
  tracingScreen.style.display='none';
  congratsScreen.style.display='flex';
  createCrackerConfetti();
}

playAgainBtn.onclick = () => location.reload();

function createCrackerConfetti(){
  for(let i=0;i<150;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.top='-20px';
    c.style.width=Math.random()*10+5+'px';
    c.style.height=Math.random()*10+5+'px';
    c.style.background=`hsl(${Math.random()*360},70%,60%)`;
    const duration = 2 + Math.random()*2;
    c.style.transition = `top ${duration}s linear, transform ${duration}s linear`;
    document.body.appendChild(c);
    setTimeout(()=>{ 
        c.style.top='100vh'; 
        c.style.transform=`rotate(${Math.random()*720}deg)`;
    },10);
    setTimeout(()=>c.remove(), (duration+0.1)*1000);
  }
}

showLogo();
</script>
</body>
</html>
