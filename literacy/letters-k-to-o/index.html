<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peek-a-Boo Letters K-O</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Comic Sans MS', sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; background-color:#e0f2f1;}
  #logoScreen, #gameScreen, #tracingScreen, #finalScreen { display:none; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100vh; }
  #logoScreen img { max-width:300px; width:40%; height:auto; }
  #gameScreen, #tracingScreen, #finalScreen { position:relative; text-align:center; }
  #gameScreen { background:#c8f0e6; width:100%; max-width:900px; padding:20px; border-radius:20px; }
  .box { display:inline-block; cursor:pointer; margin:10px; position:relative; }
  .box img { width:120px; height:120px; }
  .object-img { width:140px; height:140px; margin-bottom:10px; display:none; }
  .letters-container { margin-top:20px; display:flex; justify-content:center; gap:20px; }
  .letter-option { background:#ffd699; padding:15px 25px; border-radius:10px; cursor:pointer; font-size:24px; }
  .letter-option:hover { background:#ffc966; }
  #voiceBtn { position:absolute; bottom:10px; left:10px; width:60px; height:60px; cursor:pointer; }
  #tracingScreen img { width:200px; height:auto; }
  #finalScreen h1 { font-size:3rem; color:green; }
  .confetti { position:absolute; width:10px; height:10px; background:red; animation:fall 3s linear infinite; }
  @keyframes fall { 0%{top:-10px;} 100%{top:100vh;} }
</style>
</head>
<body>

<!-- Logo Screen -->
<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Screen -->
<div id="gameScreen">
  <div id="instruction" style="font-size:22px; margin-bottom:20px;">Click on a box to reveal the object</div>
  <div id="boxesContainer"></div>
  <div class="letters-container" id="lettersContainer"></div>
  <img src="assets/voice-icon.png" id="voiceBtn" alt="Voice Icon">
</div>

<!-- Tracing Screen -->
<div id="tracingScreen">
  <img id="tracingImg" src="" alt="Tracing Letter">
</div>

<!-- Final Screen -->
<div id="finalScreen">
  <h1>Well Done!</h1>
  <button id="playAgainBtn" style="padding:15px 30px; font-size:20px; border:none; border-radius:10px; cursor:pointer;">Play Again</button>
</div>

<script>
const logoScreen = document.getElementById('logoScreen');
const gameScreen = document.getElementById('gameScreen');
const tracingScreen = document.getElementById('tracingScreen');
const finalScreen = document.getElementById('finalScreen');
const boxesContainer = document.getElementById('boxesContainer');
const lettersContainer = document.getElementById('lettersContainer');
const instruction = document.getElementById('instruction');
const playAgainBtn = document.getElementById('playAgainBtn');
const voiceBtn = document.getElementById('voiceBtn');
const tracingImg = document.getElementById('tracingImg');

const gameData = [
  {letter:'K', obj:'kiwi.png', audio:'letter-k.mp3', tracing:'tracing-letter-k.png'},
  {letter:'L', obj:'lamp.png', audio:'letter-l.mp3', tracing:'tracing-letter-l.png'},
  {letter:'M', obj:'mouse.png', audio:'letter-m.mp3', tracing:'tracing-letter-m.png'},
  {letter:'N', obj:'nest.png', audio:'letter-n.mp3', tracing:'tracing-letter-n.png'},
  {letter:'O', obj:'ostrich.png', audio:'letter-o.mp3', tracing:'tracing-letter-o.png'},
];

let currentIndex = 0;
let boxClicked = false;

// Shuffle helper
function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

// Start Game
function startGame() {
  logoScreen.style.display = 'flex';
  gameScreen.style.display = 'none';
  tracingScreen.style.display = 'none';
  finalScreen.style.display = 'none';
  setTimeout(() => {
    logoScreen.style.display = 'none';
    gameScreen.style.display = 'block';
    currentIndex = 0;
    showBox();
  }, 5000);
}

// Show Box
function showBox() {
  boxesContainer.innerHTML = '';
  lettersContainer.innerHTML = '';
  boxClicked = false;
  instruction.textContent = 'Click on a box to reveal the object';
  
  const current = gameData[currentIndex];
  const box = document.createElement('div');
  box.classList.add('box');
  box.innerHTML = `<img src="assets/box-${current.letter.toLowerCase()}.png"> <img class="object-img" src="assets/${current.obj}">`;
  boxesContainer.appendChild(box);

  const objectImg = box.querySelector('.object-img');

  box.addEventListener('click', () => {
    if(boxClicked) return;
    boxClicked = true;
    objectImg.style.display = 'block';
    showLetters(current.letter);
  });

  // Voice Button
  voiceBtn.onclick = () => {
    const audio = new Audio(`assets/${current.audio}`);
    audio.play();
  };
}

// Show letters
function showLetters(correctLetter) {
  lettersContainer.innerHTML = '';
  const letters = [correctLetter, 'A', 'G']; // can randomize wrong options
  shuffle(letters);
  letters.forEach(l => {
    const div = document.createElement('div');
    div.classList.add('letter-option');
    div.textContent = l;
    div.onclick = () => checkAnswer(l, correctLetter);
    lettersContainer.appendChild(div);
  });
}

// Check Answer
function checkAnswer(selected, correct) {
  if(selected === correct){
    const clap = new Audio('assets/claps.mp3');
    clap.play();
    clap.onended = () => showTracing();
  } else {
    const wrong = new Audio('assets/wrong.mp3');
    wrong.play();
  }
}

// Show Tracing
function showTracing() {
  gameScreen.style.display = 'none';
  tracingScreen.style.display = 'block';
  const current = gameData[currentIndex];
  tracingImg.src = `assets/${current.tracing}`;
  setTimeout(() => {
    tracingScreen.style.display = 'none';
    currentIndex++;
    if(currentIndex < gameData.length){
      gameScreen.style.display = 'block';
      showBox();
    } else {
      showFinal();
    }
  }, 3000);
}

// Show Final
function showFinal() {
  finalScreen.style.display = 'block';
  addConfetti();
}

// Confetti
function addConfetti() {
  for(let i=0;i<100;i++){
    const c = document.createElement('div');
    c.classList.add('confetti');
    c.style.background = `hsl(${Math.random()*360},70%,60%)`;
    c.style.left = Math.random()*100 + 'vw';
    c.style.top = Math.random()*10 + 'vh';
    c.style.width = c.style.height = (5 + Math.random()*5) + 'px';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}

// Play Again
playAgainBtn.onclick = () => {
  gameData.sort(() => Math.random()-0.5);
  startGame();
};

// Initialize
startGame();
</script>
</body>
</html>
