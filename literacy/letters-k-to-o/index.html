<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letters K to O Game</title>
<style>
  body {
    margin: 0;
    font-family: 'Comic Sans MS', sans-serif;
    background-color: #d9f2e6;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  #logoScreen, #gameScreen, #tracingScreen, #congratsScreen {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  #logoScreen img {
    width: 300px;
    height: auto;
  }

  #gameScreen {
    position: relative;
    width: 100%;
    max-width: 900px;
    height: 600px;
    background-color: #f0f5f0;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }

  #boxArea {
    display: flex;
    justify-content: center;
    align-items: center;
    flex: 1;
    height: 100%;
  }

  .letter-box {
    cursor: pointer;
    width: 200px;
    height: 200px;
  }

  #objectArea {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #objectArea img {
    max-width: 200px;
    max-height: 200px;
    display: none;
  }

  #letterOptions {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    flex: 1;
  }

  .option-btn {
    width: 80px;
    height: 80px;
    font-size: 32px;
    margin: 10px;
    border-radius: 12px;
    border: none;
    background-color: #ffd699;
    cursor: pointer;
  }

  #tracingScreen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #tracingInstruction {
    font-size: 28px;
    margin-bottom: 20px;
  }

  #tracingLetter {
    font-size: 180px;
    font-weight: bold;
    border: 2px dashed #555;
    padding: 50px;
    text-align: center;
    user-select: none;
    touch-action: none;
  }

  #nextBtn {
    margin-top: 30px;
    padding: 12px 30px;
    font-size: 20px;
    border-radius: 12px;
    cursor: pointer;
    background-color: #4CAF50;
    color: white;
    border: none;
  }

  #congratsScreen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: bold;
    color: #4CAF50;
  }

  #playAgainBtn {
    margin-top: 20px;
    padding: 12px 30px;
    font-size: 24px;
    border: none;
    border-radius: 12px;
    background-color: #ff9800;
    color: white;
    cursor: pointer;
  }

  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background-color: red;
    animation: fall 3s linear forwards;
  }

  @keyframes fall {
    to { transform: translateY(700px) rotate(360deg); opacity: 0;}
  }

</style>
</head>
<body>

<!-- Logo Screen -->
<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Screen -->
<div id="gameScreen">
  <div id="boxArea">
    <img src="assets/box-k.png" id="currentBox" class="letter-box">
  </div>
  <div id="objectArea">
    <img id="currentObject" src="assets/kiwi.png">
  </div>
  <div id="letterOptions">
    <button class="option-btn" data-letter="A">A</button>
    <button class="option-btn" data-letter="G">G</button>
    <button class="option-btn" data-letter="K">K</button>
  </div>
</div>

<!-- Tracing Screen -->
<div id="tracingScreen">
  <div id="tracingInstruction">Trace the letter K</div>
  <div id="tracingLetter">K</div>
  <button id="nextBtn">Next</button>
</div>

<!-- Congrats Screen -->
<div id="congratsScreen">
  Well Done!
  <button id="playAgainBtn">Play Again</button>
</div>

<!-- Audio -->
<audio id="letterAudio" src="assets/letter-k.mp3"></audio>
<audio id="clapAudio" src="assets/claps.mp3"></audio>
<audio id="correctAudio" src="assets/correct.mp3"></audio>
<audio id="wrongAudio" src="assets/wrong.mp3"></audio>

<script>
const logoScreen = document.getElementById('logoScreen');
const gameScreen = document.getElementById('gameScreen');
const tracingScreen = document.getElementById('tracingScreen');
const congratsScreen = document.getElementById('congratsScreen');
const currentBox = document.getElementById('currentBox');
const currentObject = document.getElementById('currentObject');
const letterOptions = document.querySelectorAll('.option-btn');
const tracingLetter = document.getElementById('tracingLetter');
const tracingInstruction = document.getElementById('tracingInstruction');
const nextBtn = document.getElementById('nextBtn');
const playAgainBtn = document.getElementById('playAgainBtn');

const letterAudio = document.getElementById('letterAudio');
const clapAudio = document.getElementById('clapAudio');
const correctAudio = document.getElementById('correctAudio');
const wrongAudio = document.getElementById('wrongAudio');

let currentLetter = 0;
const letters = ['K']; // Add L, M, N, O similarly
const objects = ['kiwi']; // Add lamp, mouse etc
const boxes = ['box-k.png']; // Add box-l.png etc

function startGame() {
  logoScreen.style.display = 'flex';
  gameScreen.style.display = 'none';
  tracingScreen.style.display = 'none';
  congratsScreen.style.display = 'none';

  setTimeout(() => {
    logoScreen.style.display = 'none';
    showLetterSlide();
  }, 5000);
}

function showLetterSlide() {
  gameScreen.style.display = 'flex';
  currentBox.src = `assets/${boxes[currentLetter]}`;
  currentObject.src = `assets/${objects[currentLetter]}`;
  currentObject.style.display = 'none';
}

currentBox.addEventListener('click', () => {
  currentObject.style.display = 'block';
});

letterOptions.forEach(btn => {
  btn.addEventListener('click', () => {
    if(btn.dataset.letter === letters[currentLetter]) {
      clapAudio.play();
      setTimeout(() => {
        showTracingSlide();
      }, 1000);
    } else {
      wrongAudio.play();
    }
  });
});

function showTracingSlide() {
  gameScreen.style.display = 'none';
  tracingScreen.style.display = 'flex';
  tracingLetter.textContent = letters[currentLetter];
  tracingInstruction.textContent = `Trace the letter ${letters[currentLetter]}`;
}

nextBtn.addEventListener('click', () => {
  currentLetter++;
  if(currentLetter < letters.length) {
    tracingScreen.style.display = 'none';
    showLetterSlide();
  } else {
    tracingScreen.style.display = 'none';
    congratsScreen.style.display = 'flex';
    createConfetti();
  }
});

playAgainBtn.addEventListener('click', () => {
  currentLetter = 0;
  congratsScreen.style.display = 'none';
  startGame();
});

// Confetti
function createConfetti() {
  for(let i=0;i<50;i++){
    const confetti = document.createElement('div');
    confetti.classList.add('confetti');
    confetti.style.left = Math.random()*100 + 'vw';
    confetti.style.background = `hsl(${Math.random()*360},80%,60%)`;
    document.body.appendChild(confetti);
    setTimeout(()=> confetti.remove(), 3000);
  }
}

startGame();
</script>

</body>
</html>
