<!-- Tracing Screen -->
<div id="tracingScreen">
  <div id="tracing-instruction">Trace the letter</div>
  <canvas id="tracing-canvas" width="800" height="600"></canvas>
  <button id="nextBtn">Next</button>
</div>

<script>
const nextBtn = document.getElementById('nextBtn');
const tracingCanvas = document.getElementById('tracing-canvas');
const ctx = tracingCanvas.getContext('2d');
let isTracing = false;

// Existing startDrawing, draw, endDrawing functions remain
let drawing = false;
function startDrawing(e){ if(!isTracing) return; drawing=true; ctx.beginPath(); ctx.moveTo(e.offsetX,e.offsetY);}
function draw(e){ if(!drawing) return; ctx.lineTo(e.offsetX,e.offsetY); ctx.strokeStyle='blue'; ctx.lineWidth=6; ctx.stroke();}
function endDrawing(e){ if(!drawing) return; drawing=false; ctx.beginPath(); }

// Updated showTracing function
function showTracing(slide){
  gameScreen.style.display='none';
  tracingScreen.style.display='flex';
  ctx.clearRect(0,0,tracingCanvas.width,tracingCanvas.height);
  const img = new Image();
  img.src = slide.tracing;
  img.onload = () => {
    ctx.drawImage(img, 0, 0, tracingCanvas.width, tracingCanvas.height);
  };
  isTracing = true;
}

// Next button only advances slide
nextBtn.onclick = () => {
  if(isTracing){
    currentIndex++;
    isTracing = false;
    if(currentIndex < slides.length){
      showObjectSlide(); // existing function to show object slide
    } else {
      showCongratsSlide(); // existing function to show final screen
    }
  }
}

// Tracing canvas event listeners
tracingCanvas.addEventListener('pointerdown', startDrawing);
tracingCanvas.addEventListener('pointermove', draw);
tracingCanvas.addEventListener('pointerup', endDrawing);
tracingCanvas.addEventListener('pointerleave', endDrawing);

// Touch support
tracingCanvas.ontouchstart = (e)=>startDrawing(e.touches[0]);
tracingCanvas.ontouchend = endDrawing;
tracingCanvas.ontouchmove = (e)=>{draw(e.touches[0]); e.preventDefault();}
</script>
