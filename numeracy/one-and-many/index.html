<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Circle Game 6-10</title>
<style>
  body {
    margin:0;
    font-family: 'Arial', sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    background: url('assets/background.png') no-repeat center center;
    background-size: cover;
  }
  #logoScreen, #gameScreen, #scoreScreen {
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:absolute;
    top:0;
    left:0;
  }
  #logoScreen img { width:200px; }
  #instruction {
    background: #fffca0;
    padding:20px 30px;
    border-radius:10px;
    font-size:36px; /* Increased font size */
    margin-bottom:20px;
    text-align:center;
    position:absolute;
    top:20px;
  }
  #numbers {
    display:flex;
    flex-direction:column;
    gap:20px;
    justify-content:center;
    margin-top:120px;
  }
  .number-row {
    display:flex;
    gap:25px;
    justify-content:center;
    flex-wrap: wrap;
  }
  .number {
    padding:18px 25px;
    font-size:42px; /* Increased font size */
    border-radius:10px;
    border:2px solid #000;
    background:white;
    cursor:pointer;
    user-select:none;
  }
  .number.correct { background:#a0ffaf; }
  .number.wrong { background:#ff9a9a; }
  #scoreScreen {
    background:#fff7e0;
    flex-direction:column;
    font-size:24px;
    display:none;
    align-items:center;
    justify-content:center;
    height:100%;
  }
  #scoreScreen button {
    padding:10px 20px;
    font-size:20px;
    background:#ffdd57;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:20px;
  }
  #confetti-canvas {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }
</style>
</head>
<body>

<!-- Innovine Logo Slide -->
<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Screen -->
<div id="gameScreen" style="display:none;">
  <div id="instruction">Tap on the correct number</div>
  <div id="numbers"></div>
</div>

<!-- Score Screen -->
<div id="scoreScreen">
  <div id="scoreText"></div>
  <canvas id="confetti-canvas"></canvas>
  <button id="playAgain">Play Again</button>
</div>

<script>
const slides = [
  {number:10, numbers:[[6,8,10,9,10],[8,10,9,10]], audio:"assets/number-10.mp3"},
  {number:8, numbers:[[7,8,9,6,8],[8,6,10,8]], audio:"assets/number-8.mp3"},
  {number:6, numbers:[[6,7,6,8],[9,6,7,6]], audio:"assets/number-6.mp3"},
  {number:9, numbers:[[9,6,7,9],[8,9,10,9]], audio:"assets/number-9.mp3"},
  {number:7, numbers:[[7,8,6,7],[9,7,6,8]], audio:"assets/number-7.mp3"}
];

let currentSlide = 0;
let circledCount = 0;

// Audio
const correctSound = new Audio("assets/correct.mp3");
const wrongSound = new Audio("assets/wrong.mp3");

// Show logo for 5s
window.onload = () => {
  setTimeout(()=> {
    document.getElementById("logoScreen").style.display="none";
    document.getElementById("gameScreen").style.display="flex";
    loadSlide(currentSlide);
  },5000);
};

function loadSlide(index){
  const slide = slides[index];
  circledCount = 0;
  const numbersDiv = document.getElementById("numbers");
  numbersDiv.innerHTML="";

  // play slide audio
  const slideAudio = new Audio(slide.audio);
  slideAudio.play();

  // instruction
  document.getElementById("instruction").textContent = `Tap on the correct number ${slide.number}`;

  // render numbers in rows
  slide.numbers.forEach(row=>{
    const rowDiv = document.createElement("div");
    rowDiv.className="number-row";
    row.forEach(n=>{
      const div = document.createElement("div");
      div.className="number";
      div.textContent=n;
      div.addEventListener("click",()=> selectNumber(div, slide.number, slide.audio));
      rowDiv.appendChild(div);
    });
    numbersDiv.appendChild(rowDiv);
  });
}

function selectNumber(el, correctNumber, audioFile){
  const n = parseInt(el.textContent);
  if(n===correctNumber && !el.classList.contains("correct")){
    el.classList.add("correct");
    correctSound.play();
    circledCount++;
    // check if all required numbers are circled
    const correctNeeded = Array.from(document.querySelectorAll(".number"))
      .filter(d=>parseInt(d.textContent)===correctNumber).length;
    if(circledCount===correctNeeded){
      correctSound.onended = ()=>{
        // play instruction for next slide
        if(currentSlide<slides.length-1){
          const nextSlideAudio = new Audio(slides[currentSlide+1].audio);
          nextSlideAudio.play();
        }
      };
      setTimeout(nextSlide,800);
      launchConfetti(); // confetti after each correct set
    }
  } else if(n!==correctNumber){
    el.classList.add("wrong");
    wrongSound.play();
    setTimeout(()=>el.classList.remove("wrong"),600);
  }
}

function nextSlide(){
  if(currentSlide<slides.length-1){
    currentSlide++;
    loadSlide(currentSlide);
  } else {
    // show score screen
    document.getElementById("gameScreen").style.display="none";
    document.getElementById("scoreText").textContent=`Well Done! You circled all numbers correctly`;
    document.getElementById("scoreScreen").style.display="flex";
    launchConfetti();
  }
}

document.getElementById("playAgain").onclick = () => {
  currentSlide=0;
  document.getElementById("scoreScreen").style.display="none";
  document.getElementById("gameScreen").style.display="flex";
  loadSlide(currentSlide);
};

// Simple confetti animation
function launchConfetti(){
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const confettis = [];
  for(let i=0;i<200;i++){
    confettis.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*6+4, d:Math.random()*20+10, color:`hsl(${Math.random()*360},100%,50%)`});
  }
  let angle = 0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confettis.forEach(c=>{
      ctx.fillStyle = c.color;
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.r, 0, 2*Math.PI);
      ctx.fill();
      c.y += 1+Math.sin(angle)*2;
      if(c.y>canvas.height){c.y=-10; c.x=Math.random()*canvas.width;}
    });
    angle += 0.01;
    requestAnimationFrame(draw);
  }
  draw();
}
</script>
</body>
</html>
